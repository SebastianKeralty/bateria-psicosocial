<script>
// ============================================================
// STATE
// ============================================================
const RISK_COLORS = {
    "Sin riesgo":        { bg: "#bbf7d0", text: "#166534", cls: "risk-sr" },
    "Riesgo bajo":       { bg: "#fef08a", text: "#854d0e", cls: "risk-rb" },
    "Riesgo medio":      { bg: "#fed7aa", text: "#9a3412", cls: "risk-rm" },
    "Riesgo alto":       { bg: "#fca5a5", text: "#991b1b", cls: "risk-ra" },
    "Riesgo muy alto":   { bg: "#f87171", text: "#7f1d1d", cls: "risk-rma" },
    "Riesgo muy bajo":   { bg: "#dbeafe", text: "#1e40af", cls: "risk-mb" },
    "Dato perdido":      { bg: "#e2e8f0", text: "#94a3b8", cls: "risk-error" },
    "ERROR":             { bg: "#e2e8f0", text: "#475569", cls: "risk-error" }
};
const RISK_ORDER = ["Sin riesgo","Riesgo bajo","Riesgo medio","Riesgo alto","Riesgo muy alto"];
const STRESS_ORDER = ["Sin riesgo","Riesgo medio","Riesgo alto","Riesgo muy alto"];
const CHART_COLORS = [
    "#1a73e8","#34a853","#fbbc04","#ea4335","#8e24aa",
    "#00acc1","#ff7043","#9ccc65","#ab47bc","#26a69a"
];

const state = {
    bateriaActiva: null,
    bateriasComparativa: [],
    charts: {},
    _drillBatteryData: null,
    _drillComparativaBaterias: null,
    _drillRows: null,
    _drillSummary: null,
    _drillType: null,
    _viewMode: 'table',
    _detailSortDir: 1,
    _sortDir: 1,
    _compSortCol: null,
    _compSortDir: 1,
    _compViewMode: 'cards'
};

function destroyChart(key) {
    if (state.charts[key]) { state.charts[key].destroy(); delete state.charts[key]; }
}

function getChartCtx(id) {
    const el = document.getElementById(id);
    if (!el) return null;
    return el.getContext('2d');
}

// ============================================================
// TAB SWITCHING
// ============================================================
const tabLabels = {
    inicio: 'Inicio',
    dashboard: 'Dashboard',
    comparativa: 'Comparativa',
    reportes: 'Reportes'
};

document.querySelectorAll('.side-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        const tab = this.dataset.tab;
        document.getElementById('tab-' + tab).classList.add('active');
        document.getElementById('topbarTitle').textContent = tabLabels[tab] || tab;
        if (tab === 'dashboard' && state.bateriaActiva) {
            document.getElementById('topbarBadge').style.display = 'inline';
            document.getElementById('topbarBadge').textContent = state.bateriaActiva.meta.fileName + ' (' + state.bateriaActiva.meta.totalRows + ' reg.)';
            document.getElementById('btnExport').style.display = 'inline-flex';
        } else if (tab === 'inicio') {
            document.getElementById('topbarBadge').style.display = 'none';
            document.getElementById('btnExport').style.display = 'none';
        } else if (tab === 'reportes') {
            document.getElementById('topbarBadge').style.display = 'none';
            document.getElementById('btnExport').style.display = 'none';
            const noData = document.getElementById('reportNoData');
            const content = document.getElementById('reportContent');
            const info = document.getElementById('reportFileInfo');
            if (state.bateriaActiva) {
                noData.style.display = 'none';
                content.style.display = 'block';
                info.textContent = 'Datos: ' + state.bateriaActiva.meta.fileName + ' (' + state.bateriaActiva.meta.totalRows + ' registros)';
            } else {
                noData.style.display = 'block';
                content.style.display = 'none';
            }
        } else {
            document.getElementById('topbarBadge').style.display = 'none';
            document.getElementById('btnExport').style.display = 'none';
        }
    });
});

function irADashboard() {
    const btn = document.querySelector('.side-btn[data-tab="dashboard"]');
    if (btn) btn.click();
}

// ============================================================
// UTILITIES
// ============================================================
function riskColor(riskLevel) {
    return RISK_COLORS[riskLevel] || RISK_COLORS["ERROR"];
}

function getRiskClass(val) {
    const c = riskColor(val);
    return c ? c.cls : 'risk-error';
}

function orderRiskKeys(dist) {
    const keys = Object.keys(dist);
    // Check which order has more matches
    const nStress = STRESS_ORDER.filter(k => keys.includes(k)).length;
    const nRegular = RISK_ORDER.filter(k => keys.includes(k)).length;
    if (nStress > nRegular && nStress > 0) {
        return STRESS_ORDER.filter(k => keys.includes(k));
    }
    if (nRegular > 0) {
        return RISK_ORDER.filter(k => keys.includes(k));
    }
    return keys;
}

function toTitleCase(str) {
    const keepLower = ['de','del','la','las','lo','los','el','ella','ellos','y','e','o','a','en','con','por','para','sin','sobre','entre','desde','hasta','al','un','una','su','sus'];
    return str.split(' ').map((word, i) => {
        const w = word.toLowerCase();
        if (i > 0 && keepLower.includes(w)) return w;
        return w.charAt(0).toUpperCase() + w.slice(1);
    }).join(' ');
}

function getFilterOptions(rows, col) {
    const set = new Set();
    for (const r of rows) {
        const v = r[col];
        if (v !== undefined && v !== null && v !== "") set.add(String(v).trim());
    }
    return Array.from(set).sort();
}

function populateFilter(selectId, col, rows) {
    const sel = document.getElementById(selectId);
    if (!sel) return;
    const current = sel.value;
    sel.innerHTML = '<option value="">Todos</option>';
    const opts = getFilterOptions(rows, col);
    opts.forEach(o => {
        const opt = document.createElement('option');
        opt.value = o; opt.textContent = o;
        sel.appendChild(opt);
    });
    if (current) sel.value = current;
}

// ============================================================
// DASHBOARD
// ============================================================
document.getElementById('inicioFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    procesarDashboard(file);
});
document.getElementById('comparativaFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    procesarComparativa(file);
});

function mostrarStatus(id, msg, tipo) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = msg;
    el.className = 'status-msg ' + tipo;
    el.style.display = 'block';
}

function procesarDashboard(file) {
    mostrarStatus('inicioStatus', 'Leyendo archivo...', 'info');
    document.getElementById('inicioSuccess').style.display = 'none';
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const result = procesarExcel(new Uint8Array(e.target.result), file.name);
            if (!result.rows || result.rows.length === 0) {
                mostrarStatus('inicioStatus', 'No se encontraron datos en las hojas esperadas (FORMA B digitacion / FORMA A Digitacion).', 'error');
                return;
            }
            state.bateriaActiva = result;
            mostrarStatus('inicioStatus', '✔ ' + result.meta.fileName + ' — ' + result.meta.totalRows + ' registros (Forma ' + result.meta.forma + ')', 'success');
            document.getElementById('inicioSuccess').style.display = 'block';
            document.getElementById('topbarBadge').style.display = 'inline';
            document.getElementById('topbarBadge').textContent = result.meta.fileName + ' (' + result.meta.totalRows + ' reg.)';
            renderDashboard();
        } catch(err) {
            mostrarStatus('inicioStatus', 'Error al procesar: ' + err.message, 'error');
            console.error(err);
        }
    };
    reader.readAsArrayBuffer(file);
}

function renderDashboard() {
    if (!state.bateriaActiva) return;
    const data = state.bateriaActiva;
    document.getElementById('dashContent').style.display = 'block';
    document.getElementById('dashNoData')?.remove();
    renderSummaryCards(data);
    populateFiltersDashboard(data.rows);
    renderChartsDashboard(data.rows, data.summary);
    renderDetailTable(data.rows, data.summary);
}

function pctCritico(dist, total) {
    if (!dist || total === 0) return 0;
    const crit = (dist["Riesgo alto"] || 0) + (dist["Riesgo muy alto"] || 0);
    return Math.round((crit / total) * 100);
}

const CRIT_RANGES = [
    { max: 29, label: "Sin riesgo", color: "#22c55e", bg: "#dcfce7", cls: "risk-sr" },
    { max: 49, label: "Riesgo bajo", color: "#84cc16", bg: "#d9f99d", cls: "risk-rb" },
    { max: 69, label: "Riesgo medio", color: "#eab308", bg: "#fef08a", cls: "risk-rm" },
    { max: 84, label: "Riesgo alto", color: "#f97316", bg: "#fed7aa", cls: "risk-ra" },
    { max: 100, label: "Riesgo muy alto", color: "#ef4444", bg: "#fca5a5", cls: "risk-rma" }
];

function clasificarCritico(pct) {
    for (const r of CRIT_RANGES) {
        if (pct <= r.max) return r;
    }
    return CRIT_RANGES[4];
}

function renderSummaryCards(data) {
    const s = data.summary;
    const container = document.getElementById('summaryCards');
    const nTotal = s.total;

    const intraPct = pctCritico(s.intraGeneral, nTotal);
    const extraPct = pctCritico(s.extraGeneral, nTotal);
    const stressPct = pctCritico(s.stress, nTotal);

    const intraR = clasificarCritico(intraPct);
    const extraR = clasificarCritico(extraPct);
    const stressR = clasificarCritico(stressPct);

    const buildCard = (num, label, sublabel, color, pct) => {
        const isTotal = label === 'Total Encuestados';
        const bgColor = isTotal ? '#eef2ff' : clasificarCritico(pct).bg;
        const borderColor = isTotal ? '#1a73e8' : color;
        return `<div style="background:${bgColor};border-radius:12px;padding:16px;box-shadow:0 2px 6px rgba(0,0,0,0.07);border-left:5px solid ${borderColor};text-align:center;display:flex;flex-direction:column;gap:6px;">
            <div style="font-size:${isTotal ? 36 : 22}px;font-weight:800;color:${isTotal ? '#1a73e8' : color};line-height:1.1;">${num}</div>
            <div style="font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:0.6px;">${label}</div>
            ${!isTotal ? `
            <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:2px;">
                <span style="font-size:11px;font-weight:600;color:#64748b;">${sublabel}</span>
            </div>
            <div style="height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-top:2px;max-width:80%;margin-left:auto;margin-right:auto;">
                <div style="height:100%;width:${pct}%;background:${color};border-radius:3px;"></div>
            </div>` : ''}
        </div>`;
    };

    container.innerHTML = `
        ${buildCard(nTotal, 'Total Encuestados', '', '#1a73e8', 0)}
        ${buildCard(intraR.label, 'Intralaboral', intraPct + '% crítico', intraR.color, intraPct)}
        ${buildCard(extraR.label, 'Extralaboral', extraPct + '% crítico', extraR.color, extraPct)}
        ${buildCard(stressR.label, 'Estrés', stressPct + '% crítico', stressR.color, stressPct)}
    `;
}

function buildDashboardFilters(rows) {
    const bar = document.getElementById('filterBar');
    bar.style.marginBottom = '14px';
    bar.innerHTML = '';

    const autoApply = () => aplicarFiltrosDashboard();

    const topRow = document.createElement('div');
    topRow.className = 'mf-quick-bar mf-row-top';

    const addSelect = (id, placeholder, col) => {
        const sel = document.createElement('select');
        sel.id = id;
        const optAll = document.createElement('option');
        optAll.value = ''; optAll.textContent = placeholder;
        sel.appendChild(optAll);
        const opts = getFilterOptions(rows, col);

            const opt = document.createElement('option');
            opt.value = o; opt.textContent = o;

        });
        sel.onchange = autoApply;
        topRow.appendChild(sel);
    };

    addSelect('dfForma', 'Forma: Todas', '_forma');
    addSelect('dfSexo', 'Sexo: Todos', '2. Sexo');
    addSelect('dfArea', '\u00c1rea: Todas', 'Unidad de An\u00e1lisis');
    addSelect('dfCargo', 'Tipo cargo: Todos', '14. Tipo de cargo');

    bar.appendChild(topRow);

    const bottomRow = document.createElement('div');
    bottomRow.className = 'mf-quick-bar mf-row-bottom';

    const inp = document.createElement('input');
    inp.id = 'dfBusqueda';
    inp.placeholder = 'Buscar (ID, nombre, cargo\u2026)';

    bottomRow.appendChild(inp);

    toggleBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="12" y1="18" x2="20" y2="18"/><circle cx="6" cy="6" r="2"/><circle cx="10" cy="12" r="2"/><circle cx="14" cy="18" r="2"/></svg>';
    toggleBtn.onclick = function() {
        const panel = document.getElementById('dfAdvancedPanel');
        if (!panel) return;
        const isOpen = panel.style.display !== 'none';
        panel.style.display = isOpen ? 'none' : 'block';
        toggleBtn.title = isOpen ? 'M\u00e1s filtros' : 'Menos filtros';
        toggleBtn.classList.toggle('open', !isOpen);
    };
    bottomRow.appendChild(toggleBtn);

    const btnL = document.createElement('button');
    btnL.className = 'btn-limpiar';
    btnL.title = 'Limpiar';
    btnL.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
    btnL.onclick = limpiarFiltrosDashboard;
    bottomRow.appendChild(btnL);

    bar.appendChild(bottomRow);

    const advPanel = document.createElement('div');
    advPanel.id = 'dfAdvancedPanel';
    advPanel.className = 'mf-advanced-panel';
    advPanel.style.display = 'none';

    const groups = [
        {
            title: 'Persona',
            cols: [
                { label: 'Estado civil', col: '4. Estado civil', id: 'dfEstadoCivil' },
                { label: 'Nivel estudios', col: '5. Nivel estudios', id: 'dfNivelEstudios' },
                { label: 'Estrato', col: '8. Estrato', id: 'dfEstrato' },
                { label: 'Tipo vivienda', col: '9. Tipo vivienda', id: 'dfTipoVivienda' }
            ]
        },
        {
            title: 'Laboral',
            cols: [
                { label: 'Antig\u00fcedad empresa', col: '12. Antig\u00fcedad en la empresa', id: 'dfAntiguedadEmp' },
                { label: 'Antig\u00fcedad cargo', col: '15. Antig\u00fcedad en el cargo', id: 'dfAntiguedadCargo' },
                { label: 'Tipo contrato', col: '17. Tipo de contrato', id: 'dfTipoContrato' },

        for (const f of group.cols) {
            const opts = getFilterOptions(rows, f.col);
            if (opts.length === 0) continue;

            wrapper.className = 'mf-field';

        bar.appendChild(advPanel);

}

function populateFiltersDashboard(rows) {
    buildDashboardFilters(rows);
}

function getFilteredRows() {
    if (!state.bateriaActiva) return [];
    let rows = state.bateriaActiva.rows;

    const q = document.getElementById('dfBusqueda')?.value?.trim().toLowerCase();
    if (q) {
        const searchCols = ["ID", "Nombre completo del trabajador", "13. Cargo", "No. Encuesta"];
        rows = rows.filter(r => searchCols.some(col =>
            String(r[col] || '').trim().toLowerCase().includes(q)
        ));
    }

    const forma = document.getElementById('dfForma')?.value;
    const sexo = document.getElementById('dfSexo')?.value;
    const area = document.getElementById('dfArea')?.value;
    const cargo = document.getElementById('dfCargo')?.value;
    if (forma) rows = rows.filter(r => String(r["_forma"] || '').trim() === forma);
    if (sexo) rows = rows.filter(r => String(r["2. Sexo"] || '').trim() === sexo);
    if (area) rows = rows.filter(r => String(r["Unidad de Análisis"] || '').trim() === area);
    if (cargo) rows = rows.filter(r => String(r["14. Tipo de cargo"] || '').trim() === cargo);

    const advMap = [
        { id: 'dfEstadoCivil', col: '4. Estado civil' },
        { id: 'dfNivelEstudios', col: '5. Nivel estudios' },
        { id: 'dfEstrato', col: '8. Estrato' },
        { id: 'dfTipoVivienda', col: '9. Tipo vivienda' },
        { id: 'dfAntiguedadEmp', col: '12. Antigüedad en la empresa' },
        { id: 'dfAntiguedadCargo', col: '15. Antigüedad en el cargo' },
        { id: 'dfTipoContrato', col: '17. Tipo de contrato' },
        { id: 'dfHorasDiarias', col: '18. Horas diarias de trabajo' },
        { id: 'dfTipoSalario', col: '19. Tipo de salario' },
        { id: 'dfNivelCargo', col: 'Nivel de cargo del trabajador' },
        { id: 'dfAreaTrabajo', col: '16. Área donde trabaja' },
        { id: 'dfCiudadRes', col: '7. Lugar de residencia: Ciudad' },
        { id: 'dfDptoRes', col: '7. Lugar de residencia: Departamento' },
        { id: 'dfCiudadTrab', col: '11. Lugar de trabajo: Ciudad' },
        { id: 'dfDptoTrab', col: '11. Lugar de trabajo: Departamento' }
    ];
    for (const f of advMap) {
        const val = document.getElementById(f.id)?.value;
        if (val) rows = rows.filter(r => String(r[f.col] || '').trim() === val);
    }

    return rows;
}

function aplicarFiltrosDashboard() {
    closeDrillModal();
    const filtered = getFilteredRows();
    const s = state.bateriaActiva ? computeSummary(filtered) : null;
    if (s) {
        renderChartsDashboard(filtered, s);
        renderDetailTable(filtered, s);
    }
}

function limpiarFiltrosDashboard() {
    const ids = ['dfForma','dfSexo','dfArea','dfCargo','dfBusqueda',
        'dfEstadoCivil','dfNivelEstudios','dfEstrato','dfTipoVivienda',
        'dfAntiguedadEmp','dfAntiguedadCargo','dfTipoContrato',
        'dfHorasDiarias','dfTipoSalario','dfNivelCargo','dfAreaTrabajo',
        'dfCiudadRes','dfDptoRes','dfCiudadTrab','dfDptoTrab'];
    ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
    });
    aplicarFiltrosDashboard();
}

function renderChartsDashboard(rows, summary) {
    if (!summary) return;

    const intraDist = summary.intraGeneral || {};
    const extraDist = summary.extraGeneral || {};
    const stressDist = summary.stress || {};

    renderClickableBarChart('intraBars', intraDist);
    renderClickableBarChart('extraBars', extraDist);
    renderClickableBarChart('stressBars', stressDist);
}

function renderDonutChart(canvasId, dist, centerPct, centerColor, centerCount) {
    destroyChart(canvasId);
    const ctx = getChartCtx(canvasId);
    if (!ctx) return;
    const keys = orderRiskKeys(dist);
    if (keys.length === 0) return;
    const values = keys.map(k => dist[k] || 0);
    const colors = keys.map(k => riskColor(k).bg);

    const centerPlugin = {
        id: 'centerText',
        afterDraw(chart) {
            const { ctx, chartArea: { left, top, right, bottom } } = chart;
            const cx = (left + right) / 2;
            const cy = (top + bottom) / 2;
            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = 'bold 26px "Segoe UI", sans-serif';
            ctx.fillStyle = centerColor || '#ef4444';
            ctx.fillText((centerCount || 0) + '', cx, cy - 14);
            ctx.font = 'bold 18px "Segoe UI", sans-serif';
            ctx.fillStyle = centerColor || '#ef4444';
            ctx.fillText((centerPct || 0) + '%', cx, cy + 10);
            ctx.font = '9px "Segoe UI", sans-serif';
            ctx.fillStyle = '#64748b';
            ctx.fillText('CR\u00cdTICO', cx, cy + 28);
            ctx.restore();
        }
    };

    state.charts[canvasId] = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: keys,
            datasets: [{
                data: values,
                backgroundColor: colors,
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            cutout: '72%',
            plugins: {
                legend: {
                    display: false
                },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            const label = context.label || '';
                            const value = context.parsed || 0;
                            const total = context.dataset.data.reduce((a, b) => a + b, 0);
                            const pct = total ? Math.round((value / total) * 100) : 0;
                            return label + ': ' + value + ' (' + pct + '%)';
                        }
                    }
                }
            }

function renderDetailTable(rows, summary) {
    const container = document.getElementById('detailTable');
    if (!summary) { container.innerHTML = ''; return; }
    const total = rows.length;

    const intraDims = summary.dimensions.filter(d => !d.name.startsWith('[Extra]') && !d.name.startsWith('[Global]'));
    const globalDims = summary.dimensions.filter(d => d.name.startsWith('[Global]'));
    const extraDims = summary.dimensions.filter(d => d.name.startsWith('[Extra]') && d.name !== '[Extra] PUNTAJE BRUTO TOTAL');
    const stressDist = summary.stress || {};

    const sortDims = (dims) => {
        if (state._detailSortDir === undefined) state._detailSortDir = 'desc';
        return [...dims].filter(d => d.risk).sort((a, b) => {
            const aPct = total ? (((a.risk["Riesgo alto"]||0)+(a.risk["Riesgo muy alto"]||0))/total)*100 : 0;
            const bPct = total ? (((b.risk["Riesgo alto"]||0)+(b.risk["Riesgo muy alto"]||0))/total)*100 : 0;
            return state._detailSortDir === 'desc' ? bPct - aPct : aPct - bPct;
        });
    };

    const buildRow = (dim) => {
        if (!dim.risk) return '';
        const pctAlto = total ? Math.round((((dim.risk["Riesgo alto"]||0)+(dim.risk["Riesgo muy alto"]||0))/total)*100) : 0;
        const rowBg = clasificarCritico(pctAlto).bg;
        const displayName = dim.name.replace('[Global] ', '').replace('[Extra] ', '');
        let r = `<tr style="background:${rowBg};"><td><strong>${displayName}</strong></td>`;
        for (const k of RISK_ORDER) {
            const v = dim.risk[k] || 0;
            const pct = total ? Math.round((v/total)*100) : 0;
            r += `<td>${v} <span style="color:#64748b;font-size:11px;">(${pct}%)</span></td>`;
        }
        const badgeClass = clasificarCritico(pctAlto).cls;
        r += `<td style="text-align:center;"><span class="badge ${badgeClass}" style="font-size:14px;padding:4px 16px;font-weight:700;">${pctAlto}%</span></td></tr>`;
        return r;
    };

    const sortIcon = state._detailSortDir === 'desc' ? '\u25BC' : '\u25B2';

    const buildTable = (title, dims) => {
        if (dims.length === 0) return '';
        let h = `<div class="card" style="margin-top:12px;"><h3>${title}</h3><div class="table-wrap"><table>
            <thead><tr><th>Dimensi\u00f3n</th>${RISK_ORDER.map(r => `<th>${r}</th>`).join('')}<th style="text-align:center;cursor:pointer;" onclick="toggleDetailSort()">Riesgo Cr\u00edtico ${sortIcon}</th></tr></thead><tbody>`;
        for (const dim of sortDims(dims)) h += buildRow(dim);
        h += '</tbody></table></div></div>';
        return h;
    };

    let html = '';
    html += buildTable('Intralaboral', intraDims);
    html += buildTable('Extralaboral', extraDims);

    const stressDims = summary.dimensions.filter(d => d.name.startsWith('[Stress]'));
    html += buildTable('Estrés', stressDims);

    container.innerHTML = html;
}

function exportarDashboard() {
    const btn = document.getElementById('btnExport');
    const dash = document.getElementById('dashContent');
    if (!dash || dash.style.display === 'none') return;

    btn.classList.add('loading');
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> Exportando...';

    // Temporarily hide click-hints
    const hints = dash.querySelectorAll('.click-hint');
    hints.forEach(h => h.style.display = 'none');

    // Ensure charts render at full resolution
    const charts = Object.values(state.charts);
    charts.forEach(c => { if (c && c.resize) c.resize(); });

    // Force any filters panel closed
    const advPanel = document.getElementById('dfAdvancedPanel');
    const advWasOpen = advPanel && advPanel.style.display !== 'none';
    if (advWasOpen) advPanel.style.display = 'none';

    html2canvas(dash, {
        scale: 2,
        useCORS: true,
        backgroundColor: '#ffffff',
        allowTaint: false,
        logging: false,
        onclone: (doc) => {
            // Re-enable hints in clone
            doc.querySelectorAll('.click-hint').forEach(h => h.style.display = '');
        }
    }).then(canvas => {
        // Restore UI
        hints.forEach(h => h.style.display = '');
        if (advWasOpen) advPanel.style.display = 'block';
        btn.classList.remove('loading');
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Exportar';

        // Download
        const link = document.createElement('a');
        link.download = state.bateriaActiva
            ? 'Dashboard_' + state.bateriaActiva.meta.fileName.replace(/\.xlsx?$/i, '') + '.png'
            : 'Dashboard.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }).catch(err => {
        hints.forEach(h => h.style.display = '');
        if (advWasOpen) advPanel.style.display = 'block';
        btn.classList.remove('loading');
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Exportar';
        console.error('Export error:', err);
        alert('Error al exportar la imagen. Revisa la consola para más detalles.');
    });
}

function rebuildDimensionOptions(type) {
    const dimSel = document.getElementById('mfDimension');
    if (!dimSel) return;
    const domain = document.getElementById('mfDominio')?.value || '';
    const currentVal = dimSel.value;
    dimSel.innerHTML = '<option value="">Dimensi\u00f3n: Todas</option>';
    let availDims = [];
    if (type === 'intra') {
        availDims = (state._drillSummary.dimensions || [])
            .filter(d => !d.name.startsWith('[Extra]') && !d.name.startsWith('[Global]') && !d.name.startsWith('[Stress]'));
        if (domain) {
            const domainDims = DOMAIN_DIMS[domain] || [];
            availDims = availDims.filter(d => domainDims.includes(d.name));
        }
        availDims = availDims.map(d => d.name);
    } else {
        availDims = (state._drillSummary.dimensions || [])
            .filter(d => d.name.startsWith('[Extra]'))
            .map(d => d.name.replace('[Extra] ', ''));
    }
    availDims.sort().forEach(d => {
        const opt = document.createElement('option');
        opt.value = d; opt.textContent = d;
        dimSel.appendChild(opt);
    });
    if (currentVal) {
        // restore if still valid
        if (Array.from(dimSel.options).some(o => o.value === currentVal)) {
            dimSel.value = currentVal;
        }
    }
}

            wrapper.appendChild(lbl);
            const sel = document.createElement('select');
            sel.id = f.id;
            const optAll = document.createElement('option');
            optAll.value = ''; optAll.textContent = 'Todos';
            sel.appendChild(optAll);
            opts.forEach(o => {
                const opt = document.createElement('option');
                opt.value = o; opt.textContent = o;
                sel.appendChild(opt);
            });
            sel.onchange = autoApply;
            wrapper.appendChild(sel);
            grid.appendChild(wrapper);
        }
        if (hasFields) {
            card.appendChild(grid);
            advGrid.appendChild(card);
        }
    }

    if (advGrid.children.length > 0) {
        advPanel.appendChild(advGrid);
        container.appendChild(advPanel);
    } else {
        toggleBtn.style.display = 'none';
    }
}

function getModalFilteredRows() {

    const q = document.getElementById('mfBusqueda')?.value?.trim().toLowerCase();

        const searchCols = ["ID", "Nombre completo del trabajador", "13. Cargo", "No. Encuesta"];

    // Quick filter selects (Layer 2)
    const area = document.getElementById('mfArea')?.value;

    if (forma) rows = rows.filter(r => String(r["_forma"] || '').trim() === forma);

    // Advanced filter selects (Layer 3)
    const advMap = [
        { id: 'mfEstadoCivil', col: '4. Estado civil' },
        { id: 'mfNivelEstudios', col: '5. Nivel estudios' },
        { id: 'mfEstrato', col: '8. Estrato' },
        { id: 'mfTipoVivienda', col: '9. Tipo vivienda' },
        { id: 'mfTipoCargo', col: '14. Tipo de cargo' },
        { id: 'mfAntiguedadEmp', col: '12. Antigüedad en la empresa' },
        { id: 'mfAntiguedadCargo', col: '15. Antigüedad en el cargo' },
        { id: 'mfTipoContrato', col: '17. Tipo de contrato' },
        { id: 'mfHorasDiarias', col: '18. Horas diarias de trabajo' },
        { id: 'mfTipoSalario', col: '19. Tipo de salario' },
        { id: 'mfNivelCargo', col: 'Nivel de cargo del trabajador' },
        { id: 'mfAreaTrabajo', col: '16. Área donde trabaja' },
        { id: 'mfCiudadRes', col: '7. Lugar de residencia: Ciudad' },
        { id: 'mfDptoRes', col: '7. Lugar de residencia: Departamento' },
        { id: 'mfCiudadTrab', col: '11. Lugar de trabajo: Ciudad' },
        { id: 'mfDptoTrab', col: '11. Lugar de trabajo: Departamento' }

function renderModalBody() {
    const type = state._drillType;
    const body = document.getElementById('modalBody');
    body.innerHTML = '';

    if (type === 'intra') renderIntraCards();
    else if (type === 'extra') renderExtraCards();
    else if (type === 'stress') renderStressCards();

    const isChart = state._viewMode === 'chart';
    if (type === 'intra') {
        if (isChart) renderIntraChart();
        else renderIntraTable();
    } else if (type === 'extra') {
        if (isChart) renderExtraChart();
        else renderExtraTable();
    } else if (type === 'stress') {
        if (isChart) renderStressChart();
        else renderStressTable();
    }
}

function renderIntraCards() {
    const summary = state._drillSummary;
    const total = summary.total;
    const container = document.getElementById('modalBody');
    const domain = document.getElementById('mfDominio')?.value || '';
    const areaVal = document.getElementById('mfArea')?.value || '';

    const intraDims = summary.dimensions.filter(d => !d.name.startsWith('[Extra]') && !d.name.startsWith('[Global]'));

    let html = '';
    if (!total) {
        html = '<p style="color:#94a3b8;text-align:center;padding:30px;">Sin datos para el filtro seleccionado.</p>';
        container.innerHTML = html;
        return;
    }

    const intraDist = summary.intraGeneral || {};
    const hasDist = Object.keys(intraDist).length > 0;

    const computeDomainRisk = (domainName) => {
        const domainDimNames = DOMAIN_DIMS[domainName] || [];
        const domainDims = intraDims.filter(d => domainDimNames.includes(d.name) && d.risk);
        if (domainDims.length === 0) return null;
        let sumPct = 0;
        for (const d of domainDims) {
            const alto = (d.risk["Riesgo alto"] || 0) + (d.risk["Riesgo muy alto"] || 0);
            sumPct += total ? (alto / total) * 100 : 0;
        }
        const pctAlto = Math.round(sumPct / domainDims.length);
        return { name: toTitleCase(domainName), pctAlto };
    };

    const pctColor = (pct) => clasificarCritico(pct).color;

    const makeHorizBar = (name, pctAlto) => {
        const barColor = pctColor(pctAlto);
        return `<div class="bar-row" style="margin-bottom:2px;">
            <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:500;margin-bottom:2px;">
                <span style="color:#334155;">${name}</span>
                <span style="font-weight:700;color:${barColor};">${pctAlto}%</span>
            </div>
            <div style="height:12px;background:#e2e8f0;border-radius:6px;overflow:hidden;">
                <div class="bar-fill" style="width:${pctAlto}%;background:${barColor};"></div>
            </div>
        </div>`;
    };

    if (hasDist) {
        const pctAltoGlobal = total ? Math.round((((intraDist["Riesgo alto"]||0)+(intraDist["Riesgo muy alto"]||0))/total)*100) : 0;

        html += '<div class="card" style="display:flex;gap:12px;padding:16px;margin-bottom:16px;align-items:stretch;">';

        html += '<div style="flex:1;display:flex;flex-direction:column;border:1px solid #e2e8f0;border-radius:8px;padding:10px;">';
        html += '<div style="background:#eef2ff;border-radius:8px;padding:8px 12px;text-align:center;margin-bottom:10px;border:1px solid #c7d2fe;">';
        html += '<div style="font-size:24px;font-weight:700;color:#1a73e8;">'+total+'</div>';
        html += '<div style="font-size:10px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Total Encuestados</div>';
        html += '</div>';
        html += '<div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:4px;">';
        const riskKeys = orderRiskKeys(intraDist);
        for (const k of riskKeys) {
            const v = intraDist[k] || 0;
            const pct = total ? Math.round((v/total)*100) : 0;
            const rc = riskColor(k);
            html += `<div class="bar-row" style="margin-bottom:2px;">
                <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:500;margin-bottom:2px;">
                    <span style="color:#334155;">${k} (${v})</span>
                    <span style="font-weight:700;color:${rc.text};">${pct}%</span>
                </div>
                <div style="height:12px;background:#e2e8f0;border-radius:6px;overflow:hidden;">
                    <div class="bar-fill" style="width:${pct}%;background:${rc.bg};"></div>
                </div>
            </div>`;
        }
        html += '</div></div>';

        html += '<div style="flex:1;display:flex;flex-direction:column;border:1px solid #e2e8f0;border-radius:8px;padding:10px;">';
        if (!domain) {
            const critColor = pctColor(pctAltoGlobal);
            html += '<div style="background:#fef2f2;border-radius:8px;padding:6px 12px;text-align:center;margin-bottom:8px;border:1px solid #fecaca;">';
            html += '<div style="font-size:28px;font-weight:800;color:' + critColor + ';line-height:1.2;">' + pctAltoGlobal + '%</div>';
            html += '<div style="font-size:9px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;">Riesgo Intralaboral</div>';
            html += '</div>';
        }
        const domainTitle = areaVal ? 'Dominios \u00b7 ' + areaVal : 'Dominios';
        html += '<div style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">' + domainTitle + '</div>';
        html += '<div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:5px;">';
        if (domain) {
            const dr = computeDomainRisk(domain);
            if (dr) {
                const heroColor = pctColor(dr.pctAlto);
                const heroBg = clasificarCritico(dr.pctAlto).bg;
                html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:${heroBg};border-radius:8px;padding:12px;text-align:center;">
                    <div style="font-size:13px;font-weight:600;color:#1e293b;margin-bottom:6px;line-height:1.3;">${dr.name}</div>
                    <div style="font-size:42px;font-weight:800;color:${heroColor};line-height:1;">${dr.pctAlto}%</div>
                    <div style="font-size:10px;font-weight:700;color:${heroColor};text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Cr\u00edtico</div>
                    <div style="width:80%;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden;">
                        <div style="height:100%;width:${dr.pctAlto}%;background:${heroColor};border-radius:4px;transition:width 0.4s ease;"></div>
                    </div>
                </div>`;
            }
        } else {
            const allDomains = Object.keys(DOMAIN_DIMS).filter(d =>
                DOMAIN_DIMS[d].some(dim => intraDims.some(a => a.name === dim))
            );
            const domainData = allDomains.map(d => computeDomainRisk(d)).filter(Boolean);
            domainData.sort((a, b) => b.pctAlto - a.pctAlto);
            for (const d of domainData) {
                html += makeHorizBar(d.name, d.pctAlto);
            }
        }
        html += '</div></div>';

        html += '</div>';
    }

    html += '<div id="belowSection"></div>';
    container.innerHTML = html;
}

function renderIntraTable() {
    const summary = state._drillSummary;
    const total = summary.total;
    const container = document.getElementById('belowSection');
    if (!container) return;
    const domain = document.getElementById('mfDominio')?.value || '';
    const intraDims = summary.dimensions.filter(d => !d.name.startsWith('[Extra]') && !d.name.startsWith('[Global]'));
    const filteredDims = domain
        ? intraDims.filter(d => (DOMAIN_DIMS[domain] || []).includes(d.name))
        : intraDims;
    const dimFilter = document.getElementById('mfDimension')?.value || '';
    const finalDims = dimFilter
        ? filteredDims.filter(d => d.name === dimFilter)
        : filteredDims;

    if (state._sortDir === undefined) state._sortDir = 'desc';
    const sortedDims = [...finalDims].filter(d => d.risk).sort((a, b) => {
        const aPct = total ? (((a.risk["Riesgo alto"]||0)+(a.risk["Riesgo muy alto"]||0))/total)*100 : 0;
        const bPct = total ? (((b.risk["Riesgo alto"]||0)+(b.risk["Riesgo muy alto"]||0))/total)*100 : 0;
        return state._sortDir === 'desc' ? bPct - aPct : aPct - bPct;
    });

    const sortIcon = state._sortDir === 'desc' ? '\u25BC' : '\u25B2';
    let html = `<div class="table-wrap"><table>
        <thead><tr><th>Dimensi\u00f3n</th>${RISK_ORDER.map(r => `<th>${r}</th>`).join('')}<th style="text-align:center;cursor:pointer;" onclick="toggleSort()">Riesgo Cr\u00edtico ${sortIcon}</th></tr></thead><tbody>`;

    for (const dim of sortedDims) {
        if (!dim.risk) continue;
        const pctAlto = total ? Math.round((((dim.risk["Riesgo alto"]||0)+(dim.risk["Riesgo muy alto"]||0))/total)*100) : 0;
        const rowBg = clasificarCritico(pctAlto).bg;
        html += `<tr style="background:${rowBg};"><td><strong>${dim.name}</strong></td>`;
        for (const r of RISK_ORDER) {
            const v = dim.risk[r] || 0;
            const pct = total ? Math.round((v/total)*100) : 0;
            html += `<td>${v} <span style="color:#64748b;font-size:11px;">(${pct}%)</span></td>`;
        }
        const badgeClass = clasificarCritico(pctAlto).cls;
        html += `<td style="text-align:center;"><span class="badge ${badgeClass}" style="font-size:14px;padding:4px 16px;font-weight:700;">${pctAlto}%</span></td></tr>`;
    }
    html += '</tbody></table></div>';
    container.innerHTML = html;
}

function renderIntraChart() {
    const summary = state._drillSummary;
    const total = summary.total;
    const container = document.getElementById('belowSection');
    if (!container) return;
    const domain = document.getElementById('mfDominio')?.value || '';
    const intraDims = summary.dimensions.filter(d => !d.name.startsWith('[Extra]') && !d.name.startsWith('[Global]'));
    const filteredDims = domain
        ? intraDims.filter(d => (DOMAIN_DIMS[domain] || []).includes(d.name))
        : intraDims;
    const dimFilter = document.getElementById('mfDimension')?.value || '';
    const finalDims = dimFilter
        ? filteredDims.filter(d => d.name === dimFilter)
        : filteredDims;

    const chartDims = [...finalDims].filter(d => d.risk).sort((a, b) => {
        const aPct = total ? (((a.risk["Riesgo alto"]||0)+(a.risk["Riesgo muy alto"]||0))/total)*100 : 0;
        const bPct = total ? (((b.risk["Riesgo alto"]||0)+(b.risk["Riesgo muy alto"]||0))/total)*100 : 0;
        return bPct - aPct;
    });

    container.innerHTML = '<div style="position:relative;"><canvas id="intraChartCanvas"></canvas></div>';
    destroyChart('intraChart');
    const ctx = getChartCtx('intraChartCanvas');
    if (!ctx || chartDims.length === 0) return;

    const labels = chartDims.map(d => d.name.length > 35 ? d.name.slice(0, 32) + '...' : d.name);
    const values = chartDims.map(d => total ? Math.round((((d.risk["Riesgo alto"]||0)+(d.risk["Riesgo muy alto"]||0))/total)*100) : 0);
    const colors = values.map(v => clasificarCritico(v).color);

    state.charts['intraChart'] = new Chart(ctx, {
        type: 'bar',
        data: { labels, datasets: [{ data: values, backgroundColor: colors, borderColor: colors, borderWidth: 1, borderRadius: 3 }] },
        options: {
            responsive: true, maintainAspectRatio: true,
            scales: {
                x: { ticks: { font: { size: 9 }, maxRotation: 45 } },
                y: { beginAtZero: true, max: 100, ticks: { font: { size: 10 }, callback: v => v + '%' } }
            },
            plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.parsed.y + '%' } } }
        }
    });
}

    const makeHorizBar = (name, pctAlto) => {

    if (hasDist) {
        html += '<div class="card" style="display:flex;gap:12px;padding:16px;margin-bottom:16px;align-items:stretch;">';

        html += '<div style="flex:1;display:flex;flex-direction:column;border:1px solid #e2e8f0;border-radius:8px;padding:10px;">';
        html += '<div style="background:#eef2ff;border-radius:8px;padding:8px 12px;text-align:center;margin-bottom:10px;border:1px solid #c7d2fe;">';

        html += '<div style="font-size:10px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Total Encuestados</div>';
        html += '</div>';
        html += '<div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:4px;">';
        const riskKeys = orderRiskKeys(extraDist);
        for (const k of riskKeys) {
            const v = extraDist[k] || 0;
            const pct = total ? Math.round((v/total)*100) : 0;
            const rc = riskColor(k);
            html += `<div class="bar-row" style="margin-bottom:2px;">
                <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:500;margin-bottom:2px;">
                    <span style="color:#334155;">${k} (${v})</span>
                    <span style="font-weight:700;color:${rc.text};">${pct}%</span>
                </div>
                <div style="height:12px;background:#e2e8f0;border-radius:6px;overflow:hidden;">
                    <div class="bar-fill" style="width:${pct}%;background:${rc.bg};"></div>
                </div>
            </div>`;

function renderStressCards() {
    const summary = state._drillSummary;
    const total = summary.total;

    const keys = orderRiskKeys(stressDist);
    const hasDist = keys.length > 0;

    const catFilter = document.getElementById('mfStressCat')?.value || '';

    let html = '';
    if (!total) {
        html = '<p style="color:#94a3b8;text-align:center;padding:30px;">Sin datos para el filtro seleccionado.</p>';
        container.innerHTML = html;
        return;
    }

    const pctColor = (pct) => clasificarCritico(pct).color;

    const makeHorizBar = (name, pctAlto) => {
        const barColor = pctColor(pctAlto);
        return `<div class="bar-row" style="margin-bottom:2px;">
            <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:500;margin-bottom:2px;">

    };

        const dim = summary.dimensions.find(d => d.name === `[Stress] ${catName}`);

        return { name: catName, pctAlto };

        html += '<div class="card" style="display:flex;gap:12px;padding:16px;margin-bottom:16px;align-items:stretch;">';

            html += `<div class="bar-row" style="margin-bottom:2px;">
                <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:500;margin-bottom:2px;">
                    <span style="color:#334155;">${k} (${v})</span>
                    <span style="font-weight:700;color:${rc.text};">${pct}%</span>
                </div>
                <div style="height:12px;background:#e2e8f0;border-radius:6px;overflow:hidden;">
                    <div class="bar-fill" style="width:${pct}%;background:${rc.bg};"></div>
                </div>

            if (cr) {

// COMPARATIVA
// ============================================================
let compBatteryIdCounter = 0;

function bLabel(b) {
    const m = b.meta;
    const name = m.name || m.fileName.replace(/\.xlsx?$/i, '');
    const year = m.year ? ' ' + m.year : '';
    return name + year;
}

function bLabelShort(b, max) {
    const l = bLabel(b);
    const m = max || 20;
    return l.length > m ? l.slice(0, m-2) + '..' : l;
}

function procesarComparativa(file) {
    mostrarStatus('compStatus', 'Leyendo archivo...', 'info');
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const result = procesarExcel(new Uint8Array(e.target.result), file.name);
            if (!result.rows || result.rows.length === 0) {
                mostrarStatus('compStatus', 'No se encontraron datos en las hojas esperadas.', 'error');
                return;
            }
            const id = ++compBatteryIdCounter;
            const baseName = file.name.replace(/\.xlsx?$/i, '');
            result.meta.id = id;
            result.meta.name = baseName;
            result.meta.year = new Date().getFullYear() + '';
            state.bateriasComparativa.push(result);
            mostrarStatus('compStatus', '✔ ' + baseName + ' (' + result.meta.totalRows + ' reg.) agregada.', 'success');
            renderBatteryList();
            actualizarComparativa();
        } catch(err) {
            mostrarStatus('compStatus', 'Error: ' + err.message, 'error');
            console.error(err);
        }
    };
    reader.readAsArrayBuffer(file);
}

function updateBatteryMeta(id, field, value) {
    const b = state.bateriasComparativa.find(x => x.meta.id === id);
    if (b && b.meta[field] !== value) { b.meta[field] = value; actualizarComparativa(); }
}

function renderBatteryList() {
    const container = document.getElementById('batteryList');
    const listContainer = document.getElementById('batteryListContainer');

    if (state.bateriasComparativa.length === 0) {
        listContainer.style.display = 'none';
        return;
    }
    listContainer.style.display = 'block';

    const sorted = [...state.bateriasComparativa].sort((a, b) => (a.meta.year || '0') > (b.meta.year || '0') ? 1 : -1);

    container.innerHTML = sorted.map(b => {
        const m = b.meta;
        const s = b.summary;
        const pctIntra = pctCriticoDist(s.intraGeneral, s.total);
        const pctExtra = pctCriticoDist(s.extraGeneral, s.total);
        const pctStress = pctCriticoDist(s.stress, s.total);
        const barColor = (pct) => clasificarCritico(pct).color;
        return `<div class="bat-card">
            <div class="bat-card-header">
                <div class="bat-card-name" style="display:flex;align-items:center;gap:6px;">
                    <input class="bat-name-input" value="${(m.name || '').replace(/"/g,'&quot;')}" onchange="updateBatteryMeta(${m.id},'name',this.value)" onclick="event.stopPropagation();" placeholder="Nombre" style="flex:1;min-width:0;">
                    <button class="btn-remove" onclick="event.stopPropagation();eliminarBateria(${m.id})" title="Eliminar" style="flex-shrink:0;font-size:14px;">✕</button>
                </div>
                <div class="bat-card-year"><input class="bat-year-input" value="${m.year || ''}" onchange="updateBatteryMeta(${m.id},'year',this.value)" onclick="event.stopPropagation();" placeholder="Año" style="width:70px;text-align:center;"></div>
                <div class="bat-card-meta">
                    <span class="tag form-${(m.forma||'').toLowerCase()}">${m.forma || '?'}</span>
                    <span class="tag">${m.totalRows} reg.</span>
                </div>
            </div>
            <div class="bat-card-body">
                <div class="bat-risk-row">
                    <span class="lbl">Intra</span>
                    <div class="bat-risk-bar-bg"><div class="bat-risk-bar-fill" style="width:${pctIntra}%;background:${barColor(pctIntra)}"></div></div>
                    <span class="pct" style="color:${barColor(pctIntra)}">${pctIntra}%</span>
                </div>
                <div class="bat-risk-row">
                    <span class="lbl">Extra</span>
                    <div class="bat-risk-bar-bg"><div class="bat-risk-bar-fill" style="width:${pctExtra}%;background:${barColor(pctExtra)}"></div></div>
                    <span class="pct" style="color:${barColor(pctExtra)}">${pctExtra}%</span>
                </div>
                <div class="bat-risk-row">
                    <span class="lbl">Estrés</span>
                    <div class="bat-risk-bar-bg"><div class="bat-risk-bar-fill" style="width:${pctStress}%;background:${barColor(pctStress)}"></div></div>
                    <span class="pct" style="color:${barColor(pctStress)}">${pctStress}%</span>
                </div>
            </div>
            <div class="bat-card-footer">${m.totalRows} registros</div>
        </div>`;
    }).join('');
}

function eliminarBateria(id) {

function getSelectedBaterias() {
    return state.bateriasComparativa; // no checkboxes — all always selected
}

function pctCriticoDist(dist, total) {
    if (!dist || !total) return 0;
    return Math.round((((dist["Riesgo alto"]||0)+(dist["Riesgo muy alto"]||0))/total)*100);
}

function actualizarComparativa() {
    const selected = getSelectedBaterias();
    const container = document.getElementById('compContent');
    const hint = document.getElementById('compHint');

    if (selected.length < 2) {
        container.style.display = 'none';
        if (hint) hint.textContent = selected.length === 1 ? 'Selecciona al menos una bater\u00eda m\u00e1s para comparar.' : 'Carga al menos 2 bater\u00edas y selecci\u00f3nalas para ver la comparativa.';
        return;
    }
    container.style.display = 'block';
    if (hint) hint.textContent = 'Comparando ' + selected.length + ' bater\u00edas.';

    renderTrendCard(selected);
    renderGroupedCompare('groupedIntra', 'intraGeneral', selected);
    renderGroupedCompare('groupedExtra', 'extraGeneral', selected);
    renderGroupedCompare('groupedStress', 'stress', selected, STRESS_ORDER);
    renderHeatmap(selected);
    renderComparisonTable(selected);
}

function renderTrendCard(baterias) {
    const container = document.getElementById('trendCard');
    const sorted = [...baterias].sort((a, b) => (a.meta.year || '0') > (b.meta.year || '0') ? 1 : -1);
    if (sorted.length < 2) { container.style.display = 'none'; return; }
    container.style.display = 'block';

    const years = [...new Set(sorted.map(b => b.meta.year).filter(Boolean))].sort();
    if (years.length < 2) { container.style.display = 'none'; return; }

    const byYear = (year) => sorted.filter(b => b.meta.year === year);
    const pctAvg = (list, key) => {
        if (!list.length) return 0;
        const sum = list.reduce((acc, b) => acc + pctCriticoDist(b.summary[key], b.summary.total), 0);
        return Math.round(sum / list.length);
    };

    let html = '<div class="bat-trend-card"><h3>📈 Tendencia por año</h3>';
    const types = [
        { key: 'intraGeneral', label: 'Intralaboral' },
        { key: 'extraGeneral', label: 'Extralaboral' },
        { key: 'stress', label: 'Estrés' }
    ];
    for (const t of types) {
        const vals = years.map(y => pctAvg(byYear(y), t.key));
        let arrow = '→';
        let arrowCls = 'flat';
        if (vals.length >= 2) {
            const last = vals[vals.length - 1];
            const prev = vals[vals.length - 2];
            if (last > prev) { arrow = '↑'; arrowCls = 'up'; }
            else if (last < prev) { arrow = '↓'; arrowCls = 'down'; }
        }
        html += `<div class="trend-row">
            <span class="trend-label">${t.label}</span>
            <span class="trend-arrow ${arrowCls}">${arrow}</span>
            <span style="color:#64748b;">${years.map((y, i) => y + ': ' + vals[i] + '%').join(' · ')}</span>
        </div>`;
    }
    html += '</div>';
    container.innerHTML = html;
}

function renderGroupedCompare(canvasId, summaryKey, baterias, riskOrder) {
    destroyChart(canvasId);
    const ctx = getChartCtx(canvasId);
    if (!ctx) return;

    const allRiskKeys = new Set();
    baterias.forEach(b => { Object.keys(b.summary[summaryKey]||{}).forEach(k => allRiskKeys.add(k)); });
    const order = riskOrder || RISK_ORDER;
    const riskLabels = order.filter(r => allRiskKeys.has(r));
    if (riskLabels.length === 0) return;

    const sorted = [...baterias].sort((a, b) => (a.meta.year || '0') > (b.meta.year || '0') ? 1 : -1);

    const datasets = sorted.map((b, i) => ({
        label: bLabelShort(b),
        data: riskLabels.map(r => {
            const t = b.meta.totalRows;
            const val = (b.summary[summaryKey] && b.summary[summaryKey][r]) || 0;
            return t ? Math.round((val / t) * 100 * 10) / 10 : 0;
        }),
        backgroundColor: CHART_COLORS[i % CHART_COLORS.length] + 'cc',
        borderColor: CHART_COLORS[i % CHART_COLORS.length],
        borderWidth: 1, borderRadius: 3
    }));

    state.charts[canvasId] = new Chart(ctx, {
        type: 'bar',
        data: { labels: riskLabels, datasets },
        options: {
            responsive: true, maintainAspectRatio: true,
            scales: {
                x: { ticks: { font: { size: 10 } } },
                y: { beginAtZero: true, max: 100, ticks: { font: { size: 10 }, callback: v => v + '%' } }
            },
            plugins: {
                legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 12, padding: 10 } },
                tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y + '%' } }
            }
        }
    });
}

function renderHeatmap(baterias) {
    const container = document.getElementById('heatmapContainer');
    const dims = baterias[0].summary.dimensions.filter(d => d.risk && Object.keys(d.risk).length > 0 && !d.name.startsWith('[Stress]'));
    if (dims.length === 0) { container.innerHTML = '<p style="color:#94a3b8;">Sin datos suficientes</p>'; return; }

    let html = '';
    for (const b of baterias) {
        html += '<div class="hm-battery-block"><h4>' + (b.meta.name || '') + ' (' + (b.meta.year || '?') + ')</h4>';
        html += '<div class="hm-battery-grid" style="grid-template-columns:200px repeat(1,1fr);">';
        for (const dim of dims) {
            const match = b.summary.dimensions.find(dd => dd.name === dim.name);
            const riskDist = match ? match.risk : {};
            const dominantRisk = orderRiskKeys(riskDist).reduce((a, b) => (riskDist[a]||0) > (riskDist[b]||0) ? a : b, '');
            const rc = riskColor(dominantRisk);
            html += '<div style="display:grid;grid-template-columns:200px 1fr;gap:2px;">';
            html += '<div class="hm-label">' + (dim.name.length > 40 ? dim.name.slice(0,37)+'...' : dim.name) + '</div>';
            html += '<div class="hm-cell ' + (rc ? rc.cls : 'risk-error') + '">' + (dominantRisk || '-') + '</div>';
            html += '</div>';
        }
        html += '</div></div>';
    }
    container.innerHTML = html;
}

    if (domain && DOMAIN_DIMS[domain]) {
        dims = dims.filter(d => DOMAIN_DIMS[domain].includes(d.name));
    }
    dims.sort((a, b) => a.name.localeCompare(b.name)).forEach(d => {

function aplicarFiltrosComparativaDrill() {
    const baterias = state._drillComparativaBaterias;
    if (!baterias) return;

    const forma = document.getElementById('mfForma')?.value;
    const sexo = document.getElementById('mfSexo')?.value;
    const area = document.getElementById('mfArea')?.value;
    const q = document.getElementById('mfBusqueda')?.value?.trim().toLowerCase();

    const advFields = [
        { id: 'mfEstadoCivil', col: '4. Estado civil' },
        { id: 'mfNivelEstudios', col: '5. Nivel estudios' },
        { id: 'mfEstrato', col: '8. Estrato' },
        { id: 'mfTipoVivienda', col: '9. Tipo vivienda' },
        { id: 'mfTipoCargo', col: '14. Tipo de cargo' },
        { id: 'mfAntiguedadEmp', col: '12. Antigüedad en la empresa' },
        { id: 'mfAntiguedadCargo', col: '15. Antigüedad en el cargo' },
        { id: 'mfTipoContrato', col: '17. Tipo de contrato' },
        { id: 'mfHorasDiarias', col: '18. Horas diarias de trabajo' },
        { id: 'mfTipoSalario', col: '19. Tipo de salario' },
        { id: 'mfNivelCargo', col: 'Nivel de cargo del trabajador' },
        { id: 'mfAreaTrabajo', col: '16. Área donde trabaja' },
        { id: 'mfCiudadRes', col: '7. Lugar de residencia: Ciudad' },
        { id: 'mfDptoRes', col: '7. Lugar de residencia: Departamento' },
        { id: 'mfCiudadTrab', col: '11. Lugar de trabajo: Ciudad' },
        { id: 'mfDptoTrab', col: '11. Lugar de trabajo: Departamento' }
    ];

    const searchCols = ["ID", "Nombre completo del trabajador", "13. Cargo", "No. Encuesta"];

    const filtered = baterias.map(b => {
        let rows = b.rows || [];
        if (forma) rows = rows.filter(r => String(r["_forma"] || '').trim() === forma);
        if (sexo) rows = rows.filter(r => String(r["2. Sexo"] || '').trim() === sexo);
        if (area) rows = rows.filter(r => String(r["Unidad de Análisis"] || '').trim() === area);
        if (q) rows = rows.filter(r => searchCols.some(col => String(r[col] || '').trim().toLowerCase().includes(q)));
        for (const f of advFields) {
            const val = document.getElementById(f.id)?.value;
            if (val) rows = rows.filter(r => String(r[f.col] || '').trim() === val);
        }
        return { battery: b, rows, summary: computeSummary(rows) };
    });

    const type = state._drillType;
    const summaryKey = type === 'intra' ? 'intraGeneral' : type === 'extra' ? 'extraGeneral' : 'stress';
    const riskOrder = type === 'stress' ? STRESS_ORDER : RISK_ORDER;
    renderComparativaDrillContent(filtered, summaryKey, riskOrder);
}

function renderComparativaDrillContent(filteredBaterias, summaryKey, riskOrder) {
    const body = document.getElementById('modalBody');
    destroyChart('comparativaLineChart');
    destroyChart('comparativaBarChart');
    body.innerHTML = '';

    if (!filteredBaterias.length) { body.innerHTML = '<p style="color:#94a3b8;padding:40px;text-align:center;">Sin datos</p>'; return; }

    const drillType = summaryKey === 'intraGeneral' ? 'intra' : summaryKey === 'extraGeneral' ? 'extra' : 'stress';

    // Normalize: handle both { battery, rows, summary } and raw battery objects
    const baterias = filteredBaterias.map(fb => fb.battery ? fb : { battery: fb, rows: fb.rows, summary: fb.summary });

    // ── Compute shared data ──
    const dimFilter = document.getElementById('mfDimension')?.value;
    const domainFilter = document.getElementById('mfDominio')?.value;
    let availableDims = baterias[0].summary.dimensions.filter(d => d.risk && Object.keys(d.risk).length > 0);
    if (drillType === 'intra') availableDims = availableDims.filter(d => !d.name.startsWith('[Extra]') && !d.name.startsWith('[Global]') && !d.name.startsWith('[Stress]'));
    else if (drillType === 'extra') availableDims = availableDims.filter(d => d.name.startsWith('[Extra]'));
    else if (drillType === 'stress') {
        availableDims = availableDims.filter(d => d.name.startsWith('[Stress]'));
        const questions = baterias[0].summary.stressQuestions || [];
        for (const q of questions) {
            const num = parseInt(q.name.replace('Estrés ', ''));
            const text = STRESS_QUESTIONS[num] || '';
            availableDims.push({
                name: q.name,
                fullName: `${num}. ${text}`,
                risk: q.risk,
                avgT: null,
                _isStressQuestion: true
            });
        }
    }
    if (domainFilter && DOMAIN_DIMS[domainFilter]) {
        availableDims = availableDims.filter(d => DOMAIN_DIMS[domainFilter].includes(d.name));
    }
    if (dimFilter) {
        availableDims = availableDims.filter(d => {
            const dName = drillType === 'extra' ? d.name.replace('[Extra] ', '') : d.name;
            return dName === dimFilter;
        });
    }
    if (availableDims.length === 0) { body.innerHTML = '<p style="color:#94a3b8;padding:40px;text-align:center;">Sin dimensiones</p>'; return; }

    // Compute critical % per battery per dimension
    const critPctMap = {};
    for (const fb of baterias) {
        const id = fb.battery.meta.id;
        critPctMap[id] = {};
        for (const dim of availableDims) {
            let match;
            if (dim._isStressQuestion) {
                match = fb.summary.stressQuestions.find(q => q.name === dim.name);
            } else {
                match = fb.summary.dimensions.find(dd => dd.name === dim.name);
            }
            const riskDist = match ? match.risk : {};
            const total = Object.values(riskDist).reduce((a, b) => a + b, 0);
            const crit = (riskDist["Riesgo alto"] || 0) + (riskDist["Riesgo muy alto"] || 0);
            critPctMap[id][dim.name] = total ? Math.round(crit / total * 100) : 0;
        }
    }

    // Sort batteries ASC by year (oldest → newest left → right)
    const sortedBaterias = [...baterias].sort((a, b) => (a.battery.meta.year || '0') > (b.battery.meta.year || '0') ? 1 : -1);

    // ── CHART MODE ──
    if (state._compViewMode === 'chart') {
        renderComparativaLineChart(sortedBaterias, availableDims, critPctMap, summaryKey, riskOrder);
        return;
    }

    // ── CARDS ──
    let cardsHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:18px;">';
    for (const fb of baterias) {
        const b = fb.battery;
        const s = fb.summary;
        const m = b.meta;
        const dist = s[summaryKey] || {};
        const distTotal = riskOrder.reduce((sum, r) => sum + (dist[r] || 0), 0);
        const critCount = (dist["Riesgo alto"] || 0) + (dist["Riesgo muy alto"] || 0);
        const totalRows = s.total || distTotal;
        const critPct = totalRows ? Math.round(critCount / totalRows * 100) : 0;
        const critColor = clasificarCritico(critPct).color;

        cardsHtml += '<div class="drill-card">';
        cardsHtml += '<div style="font-weight:700;font-size:15px;color:#1e293b;margin-bottom:4px;">' + (m.name || 'Sin nombre') + '</div>';
        cardsHtml += '<div style="margin-bottom:12px;"><span style="background:linear-gradient(135deg,#6366f1,#a78bfa);color:#fff;border-radius:6px;padding:2px 14px;font-size:12px;font-weight:700;display:inline-block;">' + (m.year || '?') + '</span></div>';
        cardsHtml += '<div style="margin-bottom:2px;font-size:34px;font-weight:800;color:' + critColor + ';line-height:1.1;">' + critPct + '%</div>';
        cardsHtml += '<div style="font-size:12px;font-weight:600;color:' + critColor + ';margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;">Crítico</div>';
        cardsHtml += '<div style="font-size:12px;color:#64748b;margin-bottom:12px;">👤 ' + totalRows + ' encuestados</div>';
        cardsHtml += '<div style="height:1px;background:#e2e8f0;margin-bottom:10px;"></div>';
        cardsHtml += '<div style="text-align:left;">';
        for (const r of riskOrder) {
            const cnt = dist[r] || 0;
            const pct = distTotal ? Math.round(cnt / distTotal * 100) : 0;
            const rc = riskColor(r);
            if (pct > 0) {
                cardsHtml += '<div class="bat-risk-row" style="margin-bottom:2px;">';
                cardsHtml += '<span class="lbl" style="font-size:11px;width:90px;">' + r + '</span>';
                cardsHtml += '<div class="bat-risk-bar-bg"><div class="bat-risk-bar-fill" style="width:' + pct + '%;background:' + (rc ? rc.bg : '#e2e8f0') + '"></div></div>';
                cardsHtml += '<span class="pct" style="font-size:11px;color:' + (rc ? rc.text : '#475569') + '">' + pct + '%</span>';
                cardsHtml += '</div>';
            }
        }
        cardsHtml += '</div></div>';
    }
    cardsHtml += '</div>';
    body.innerHTML = cardsHtml;

    // ── Sort dimensions ──
    const sortedDims = [...availableDims];
    if (state._compSortCol) {
        sortedDims.sort((a, b) => {
            let va, vb;
            if (state._compSortCol === 'dim') {
                va = a.name; vb = b.name;
                return va.localeCompare(vb) * state._compSortDir;
            } else if (state._compSortCol === 'trend') {
                const ni = sortedBaterias.length - 1, oi = sortedBaterias.length - 2;
                if (oi < 0) return 0;
                const idN = sortedBaterias[ni]?.battery?.meta?.id;
                const idO = sortedBaterias[oi]?.battery?.meta?.id;
                va = (critPctMap[idN]?.[a.name] || 0) - (critPctMap[idO]?.[a.name] || 0);
                vb = (critPctMap[idN]?.[b.name] || 0) - (critPctMap[idO]?.[b.name] || 0);
                return (va - vb) * state._compSortDir;
            } else {
                va = critPctMap[state._compSortCol]?.[a.name] || 0;
                vb = critPctMap[state._compSortCol]?.[b.name] || 0;
                return (va - vb) * state._compSortDir;
            }
        });
    }

    // ── Heatmap with sortable headers ──
    const sortInd = (col) => state._compSortCol === col ? (state._compSortDir === 1 ? ' ▴' : ' ▾') : '';

    let html = '<div class="table-wrap" style="margin-top:12px;"><table style="width:100%;border-collapse:collapse;font-size:12px;">';
    html += '<thead><tr style="background:#f1f5f9;">';
    html += '<th onclick="sortComparativaHeatmap(\'dim\')" style="cursor:pointer;padding:6px 8px;text-align:left;border-bottom:1px solid #e2e8f0;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.3px;color:#475569;user-select:none;">Dimensión' + sortInd('dim') + '</th>';
    for (const fb of sortedBaterias) {
        const colId = fb.battery.meta.id;
        const bLabel = (fb.battery.meta.year || '') + ' ' + (fb.battery.meta.name || '').substring(0,12);
        html += '<th onclick="sortComparativaHeatmap(\'' + colId + '\')" style="cursor:pointer;padding:6px 8px;text-align:center;border-bottom:1px solid #e2e8f0;font-weight:600;font-size:11px;white-space:nowrap;color:#475569;user-select:none;">' + bLabel.trim() + sortInd(colId) + '</th>';
    }
    html += '<th onclick="sortComparativaHeatmap(\'trend\')" style="cursor:pointer;padding:6px 8px;text-align:center;border-bottom:1px solid #e2e8f0;font-weight:600;font-size:11px;white-space:nowrap;color:#475569;user-select:none;">Tendencia' + sortInd('trend') + '</th>';
    html += '</tr></thead><tbody>';

    let rowNum = 0;
    for (const dim of sortedDims) {
        const rowBg = rowNum % 2 === 0 ? '#fff' : '#f8fafc';
        const displayName = dim.fullName || dim.name;
        html += '<tr style="background:' + rowBg + ';"><td style="padding:5px 8px;border-bottom:1px solid #f1f5f9;font-weight:600;color:#1e293b;font-size:12px;">' + displayName + '</td>';
        for (const fb of sortedBaterias) {
            let match;
            if (dim._isStressQuestion) {
                match = fb.summary.stressQuestions.find(q => q.name === dim.name);
            } else {
                match = fb.summary.dimensions.find(dd => dd.name === dim.name);
            }
            const riskDist = match ? match.risk : {};
            const dominantRisk = orderRiskKeys(riskDist).reduce((a, b) => (riskDist[a]||0) > (riskDist[b]||0) ? a : b, '-');
            const total = Object.values(riskDist).reduce((a, b) => a + b, 0);
            const crit = (riskDist["Riesgo alto"] || 0) + (riskDist["Riesgo muy alto"] || 0);
            const cp = total ? Math.round(crit / total * 100) : 0;
            const baremo = clasificarCritico(cp);
            html += '<td style="padding:5px 6px;border-bottom:1px solid #f1f5f9;text-align:center;background:' + baremo.bg + ';">';
            html += '<span style="font-weight:600;font-size:11px;color:' + baremo.color + ';">' + dominantRisk + '</span>';
            html += '<br><span style="font-size:10px;color:' + baremo.color + ';font-weight:500;">' + cp + '% crit.</span>';
            html += '</td>';
        }

        // Trend column (compare rightmost = newest vs second-to-last)
        if (sortedBaterias.length >= 2) {
            const ni = sortedBaterias.length - 1, oi = sortedBaterias.length - 2;
            const newest = critPctMap[sortedBaterias[ni].battery.meta.id]?.[dim.name] || 0;
            const older = critPctMap[sortedBaterias[oi].battery.meta.id]?.[dim.name] || 0;
            let arrow, arrowColor;
            if (newest > older) { arrow = '↑'; arrowColor = '#ef4444'; }
            else if (newest < older) { arrow = '↓'; arrowColor = '#22c55e'; }
            else { arrow = '→'; arrowColor = '#94a3b8'; }
            const diff = newest - older;
            html += '<td style="padding:5px 6px;border-bottom:1px solid #f1f5f9;text-align:center;font-weight:700;font-size:13px;color:' + arrowColor + ';">' + arrow + ' <span style="font-size:10px;font-weight:600;">' + (diff > 0 ? '+' : '') + diff + '%</span></td>';
        } else {
            html += '<td style="padding:5px 6px;border-bottom:1px solid #f1f5f9;text-align:center;color:#94a3b8;font-size:11px;">—</td>';
        }

        html += '</tr>';
        rowNum++;
    }
    html += '</tbody></table></div>';
    body.innerHTML += html;
}

function renderComparativaLineChart(sortedBaterias, availableDims, critPctMap, summaryKey, riskOrder) {
    const body = document.getElementById('modalBody');
    body.innerHTML = '';

    // ── Bar chart: dimensions grouped by battery ──
    const dimLabels = availableDims.map(d => {
        const label = d.fullName || d.name;

    });

        label: (fb.battery.meta.year || '') + ' ' + (fb.battery.meta.name || '').substring(0,10),
        data: availableDims.map(dim => critPctMap[fb.battery.meta.id]?.[dim.name] || 0),

    }));

    barCanvas.style.width = '100%';
    barCanvas.style.height = '300px';
    barCanvas.style.marginBottom = '16px';
    body.appendChild(barCanvas);

    destroyChart('comparativaBarChart');
    state.charts['comparativaBarChart'] = new Chart(barCanvas.getContext('2d'), {
        type: 'bar',

                x: { ticks: { font: { size: 9 } }, grid: { display: false } },

            },
            plugins: {
                legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 12, padding: 8 } },

    const ctx = lineCanvas.getContext('2d');

            label: label.length > 30 ? label.substring(0, 27) + '...' : label,
        data: sortedBaterias.map(fb => critPctMap[fb.battery.meta.id]?.[dim.name] || 0),

        backgroundColor: CHART_COLORS[i % CHART_COLORS.length] + '22',

        pointHoverRadius: 6,
        borderWidth: 2,
        tension: 0.3,
        fill: false
    };
});

    state.charts['comparativaLineChart'] = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { intersect: false, mode: 'index' },
            scales: {
                x: {
                    ticks: { font: { size: 11, weight: 'bold' } },
                    grid: { display: false }
                },
                y: {
                    beginAtZero: true,
                    max: 100,
