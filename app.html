function rebuildComparativaDimensionOptions(type, baterias) {
    const domain = document.getElementById('mfDominio')?.value;
    const dimSel = document.getElementById('mfDimension');
    if (!dimSel) return;
    const currentVal = dimSel.value;
    dimSel.innerHTML = '<option value="">Dimensi\u00f3n: Todas</option>';
    const firstSummary = baterias[0] ? baterias[0].summary : null;
    let dims = firstSummary ? firstSummary.dimensions.filter(d => !d.name.startsWith('[Extra]') && !d.name.startsWith('[Global]') && !d.name.startsWith('[Stress]')) : [];
    if (domain && DOMAIN_DIMS[domain]) {
        dims = dims.filter(d => DOMAIN_DIMS[domain].includes(d.name));
    }
    dims.sort((a, b) => a.name.localeCompare(b.name)).forEach(d => {
        const opt = document.createElement('option');
        const dimName = d && d.name ? String(d.name) : '';
        opt.value = dimName; opt.textContent = dimName;
        dimSel.appendChild(opt);
    });
    if (currentVal) dimSel.value = currentVal;
    aplicarFiltrosComparativaDrill();
}

function aplicarFiltrosComparativaDrill() {
    const baterias = state._drillComparativaBaterias;
    if (!baterias) return;

    const forma = document.getElementById('mfForma')?.value;
    const sexo = document.getElementById('mfSexo')?.value;
    const area = document.getElementById('mfArea')?.value;
    const q = document.getElementById('mfBusqueda')?.value?.trim().toLowerCase();

    const advFields = [
        { id: 'mfEstadoCivil', col: '4. Estado civil' },
        { id: 'mfNivelEstudios', col: '5. Nivel estudios' },
        { id: 'mfEstrato', col: '8. Estrato' },
        { id: 'mfTipoVivienda', col: '9. Tipo vivienda' },
        { id: 'mfTipoCargo', col: '14. Tipo de cargo' },
        { id: 'mfAntiguedadEmp', col: '12. Antigüedad en la empresa' },
        { id: 'mfAntiguedadCargo', col: '15. Antigüedad en el cargo' },
        { id: 'mfTipoContrato', col: '17. Tipo de contrato' },
        { id: 'mfHorasDiarias', col: '18. Horas diarias de trabajo' },
        { id: 'mfTipoSalario', col: '19. Tipo de salario' },
        { id: 'mfNivelCargo', col: 'Nivel de cargo del trabajador' },
        { id: 'mfAreaTrabajo', col: '16. Área donde trabaja' },
        { id: 'mfCiudadRes', col: '7. Lugar de residencia: Ciudad' },
        { id: 'mfDptoRes', col: '7. Lugar de residencia: Departamento' },
        { id: 'mfCiudadTrab', col: '11. Lugar de trabajo: Ciudad' },
        { id: 'mfDptoTrab', col: '11. Lugar de trabajo: Departamento' }
    ];

    const searchCols = ["ID", "Nombre completo del trabajador", "13. Cargo", "No. Encuesta"];

    const filtered = baterias.map(b => {
        let rows = b.rows || [];
        if (forma) rows = rows.filter(r => String(r["_forma"] || '').trim() === forma);
        if (sexo) rows = rows.filter(r => String(r["2. Sexo"] || '').trim() === sexo);
        if (area) rows = rows.filter(r => String(r["Unidad de Análisis"] || '').trim() === area);
        if (q) rows = rows.filter(r => searchCols.some(col => String(r[col] || '').trim().toLowerCase().includes(q)));
        for (const f of advFields) {
            const val = document.getElementById(f.id)?.value;
            if (val) rows = rows.filter(r => String(r[f.col] || '').trim() === val);
        }
        return { battery: b, rows, summary: computeSummary(rows) };
    });

    const type = state._drillType;
    const summaryKey = type === 'intra' ? 'intraGeneral' : type === 'extra' ? 'extraGeneral' : 'stress';
    const riskOrder = type === 'stress' ? STRESS_ORDER : RISK_ORDER;
    renderComparativaDrillContent(filtered, summaryKey, riskOrder);
}

function renderComparativaDrillContent(filteredBaterias, summaryKey, riskOrder) {
    const body = document.getElementById('modalBody');
    destroyChart('comparativaLineChart');
    destroyChart('comparativaBarChart');
    body.innerHTML = '';

    if (!filteredBaterias.length) { body.innerHTML = '<p style="color:#94a3b8;padding:40px;text-align:center;">Sin datos</p>'; return; }

    const drillType = summaryKey === 'intraGeneral' ? 'intra' : summaryKey === 'extraGeneral' ? 'extra' : 'stress';

    // Normalize: handle both { battery, rows, summary } and raw battery objects
    const baterias = filteredBaterias.map(fb => fb.battery ? fb : { battery: fb, rows: fb.rows, summary: fb.summary });

    // ── Compute shared data ──
    const dimFilter = document.getElementById('mfDimension')?.value;
    const domainFilter = document.getElementById('mfDominio')?.value;
    let availableDims = baterias[0].summary.dimensions.filter(d => d.risk && Object.keys(d.risk).length > 0);
    if (drillType === 'intra') availableDims = availableDims.filter(d => !d.name.startsWith('[Extra]') && !d.name.startsWith('[Global]') && !d.name.startsWith('[Stress]'));
    else if (drillType === 'extra') availableDims = availableDims.filter(d => d.name.startsWith('[Extra]'));
    else if (drillType === 'stress') {
        availableDims = availableDims.filter(d => d.name.startsWith('[Stress]'));
        const questions = baterias[0].summary.stressQuestions || [];
        for (const q of questions) {
            const num = parseInt(q.name.replace('Estrés ', ''));
            const text = STRESS_QUESTIONS[num] || '';
            availableDims.push({
                name: q.name,
                fullName: `${num}. ${text}`,
                risk: q.risk,
                avgT: null,
                _isStressQuestion: true
            });
        }
    }
    if (domainFilter && DOMAIN_DIMS[domainFilter]) {
        availableDims = availableDims.filter(d => DOMAIN_DIMS[domainFilter].includes(d.name));
    }
    if (dimFilter) {
        availableDims = availableDims.filter(d => {
            const dName = drillType === 'extra' ? d.name.replace('[Extra] ', '') : d.name;
            return dName === dimFilter;
        });
    }
    if (drillType === 'stress') {
        const catFilter = document.getElementById('mfStressCat')?.value;
        const qFilter = document.getElementById('mfStressQ')?.value;
        if (catFilter) {
            const qNums = STRESS_CAT_QS[catFilter] || [];
            availableDims = availableDims.filter(d => {
                if (d._isStressQuestion) {
                    const num = parseInt(d.name.replace('Estr\u00e9s ', ''));
                    return qNums.includes(num);
                }
                return d.name === '[Stress] ' + catFilter;
            });
        }
        if (qFilter) {
            const qNum = parseInt(qFilter);
            availableDims = availableDims.filter(d => {
                if (d._isStressQuestion) return parseInt(d.name.replace('Estr\u00e9s ', '')) === qNum;
                return false;
            });
        }
    }
    if (availableDims.length === 0) { body.innerHTML = '<p style="color:#94a3b8;padding:40px;text-align:center;">Sin dimensiones</p>'; return; }

    // Compute critical % per battery per dimension
    const critPctMap = {};
    for (const fb of baterias) {
        const id = fb.battery.meta.id;
        critPctMap[id] = {};
        for (const dim of availableDims) {
            let match;
            if (dim._isStressQuestion) {
                match = fb.summary.stressQuestions.find(q => q.name === dim.name);
            } else {
                match = fb.summary.dimensions.find(dd => dd.name === dim.name);
            }
            const riskDist = match ? match.risk : {};
            const total = Object.values(riskDist).reduce((a, b) => a + b, 0);
            const crit = (riskDist["Riesgo alto"] || 0) + (riskDist["Riesgo muy alto"] || 0);
            critPctMap[id][dim.name] = total ? Math.round(crit / total * 100) : 0;
        }
    }

    // Sort batteries ASC by year (oldest → newest left → right)
    const sortedBaterias = [...baterias].sort((a, b) => (a.battery.meta.year || '0') > (b.battery.meta.year || '0') ? 1 : -1);

    // ── CHART MODE ──
    if (state._compViewMode === 'chart') {
        renderComparativaLineChart(sortedBaterias, availableDims, critPctMap, summaryKey, riskOrder);
        return;
    }

    // ── CARDS ──
    let cardsHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:18px;">';
    for (const fb of baterias) {
        const b = fb.battery;
        const s = fb.summary;
        const m = b.meta;
        const dist = s[summaryKey] || {};
        const distTotal = riskOrder.reduce((sum, r) => sum + (dist[r] || 0), 0);
        const critCount = (dist["Riesgo alto"] || 0) + (dist["Riesgo muy alto"] || 0);
        const totalRows = s.total || distTotal;
        const critPct = totalRows ? Math.round(critCount / totalRows * 100) : 0;
        const critColor = clasificarCritico(critPct).color;

        cardsHtml += '<div class="drill-card">';
        cardsHtml += '<div style="font-weight:700;font-size:15px;color:#1e293b;margin-bottom:4px;">' + (m.name || 'Sin nombre') + '</div>';
        cardsHtml += '<div style="margin-bottom:12px;"><span style="background:linear-gradient(135deg,#6366f1,#a78bfa);color:#fff;border-radius:6px;padding:2px 14px;font-size:12px;font-weight:700;display:inline-block;">' + (m.year || '?') + '</span></div>';
        const titleCase = s => s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
        cardsHtml += '<div style="margin-bottom:2px;font-size:34px;font-weight:800;color:' + critColor + ';line-height:1.1;">' + critPct + '%</div>';
        cardsHtml += '<div style="font-size:12px;font-weight:600;color:' + critColor + ';margin-bottom:6px;letter-spacing:0.5px;">' + titleCase(clasificarCritico(critPct).label) + '</div>';
        cardsHtml += '<div style="font-size:12px;color:#64748b;margin-bottom:12px;">👤 ' + totalRows.toLocaleString() + ' encuestados</div>';
        cardsHtml += '<div style="height:1px;background:#e2e8f0;margin-bottom:10px;"></div>';
        cardsHtml += '<div style="text-align:left;">';
        for (const r of riskOrder) {
            const cnt = dist[r] || 0;
            const pct = distTotal ? Math.round(cnt / distTotal * 100) : 0;
            const rc = riskColor(r);
            if (pct > 0) {
                cardsHtml += '<div class="bat-risk-row" style="margin-bottom:2px;">';
                cardsHtml += '<span class="lbl" style="font-size:11px;width:90px;">' + titleCase(r) + '</span>';
                cardsHtml += '<div class="bat-risk-bar-bg"><div class="bat-risk-bar-fill" style="width:' + pct + '%;background:' + (rc ? rc.bg : '#e2e8f0') + '"></div></div>';
                cardsHtml += '<span class="pct" style="font-size:11px;color:' + (rc ? rc.text : '#475569') + '">' + pct + '%</span>';
                cardsHtml += '</div>';
            }
        }
        cardsHtml += '</div></div>';
    }
    cardsHtml += '</div>';
    body.innerHTML = cardsHtml;

    // ── Sort dimensions ──
    const sortedDims = [...availableDims];
    if (state._compSortCol) {
        sortedDims.sort((a, b) => {
            let va, vb;
            if (state._compSortCol === 'dim') {
                va = a.name; vb = b.name;
                return va.localeCompare(vb) * state._compSortDir;
            } else if (state._compSortCol === 'trend') {
                const ni = sortedBaterias.length - 1, oi = sortedBaterias.length - 2;
                if (oi < 0) return 0;
                const idN = sortedBaterias[ni]?.battery?.meta?.id;
                const idO = sortedBaterias[oi]?.battery?.meta?.id;
                va = (critPctMap[idN]?.[a.name] || 0) - (critPctMap[idO]?.[a.name] || 0);
                vb = (critPctMap[idN]?.[b.name] || 0) - (critPctMap[idO]?.[b.name] || 0);
                return (va - vb) * state._compSortDir;
            } else {
                va = critPctMap[state._compSortCol]?.[a.name] || 0;
                vb = critPctMap[state._compSortCol]?.[b.name] || 0;
                return (va - vb) * state._compSortDir;
            }
        });
    }

    // ── Heatmap with sortable headers ──
    const sortInd = (col) => state._compSortCol === col ? (state._compSortDir === 1 ? ' ▴' : ' ▾') : '';

    let html = '<div class="table-wrap" style="margin-top:12px;"><table style="width:100%;border-collapse:collapse;font-size:12px;">';
    html += '<thead><tr style="background:#f1f5f9;">';
    html += '<th onclick="sortComparativaHeatmap(\'dim\')" style="cursor:pointer;padding:6px 8px;text-align:left;border-bottom:1px solid #e2e8f0;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.3px;color:#475569;user-select:none;">Dimensión' + sortInd('dim') + '</th>';
    for (const fb of sortedBaterias) {
        const colId = fb.battery.meta.id;
        const bLabel = (fb.battery.meta.year || '') + ' ' + (fb.battery.meta.name || '').substring(0,12);
        html += '<th onclick="sortComparativaHeatmap(\'' + colId + '\')" style="cursor:pointer;padding:6px 8px;text-align:center;border-bottom:1px solid #e2e8f0;font-weight:600;font-size:11px;white-space:nowrap;color:#475569;user-select:none;">' + bLabel.trim() + sortInd(colId) + '</th>';
    }
    html += '<th onclick="sortComparativaHeatmap(\'trend\')" style="cursor:pointer;padding:6px 8px;text-align:center;border-bottom:1px solid #e2e8f0;font-weight:600;font-size:11px;white-space:nowrap;color:#475569;user-select:none;">Tendencia' + sortInd('trend') + '</th>';
    html += '</tr></thead><tbody>';

    let rowNum = 0;
    for (const dim of sortedDims) {
        const rowBg = rowNum % 2 === 0 ? '#fff' : '#f8fafc';
        const displayName = (dim.fullName || dim.name).replace('[Extra] ', '').replace('[Stress] ', '');
        html += '<tr style="background:' + rowBg + ';"><td style="padding:5px 8px;border-bottom:1px solid #f1f5f9;font-weight:600;color:#1e293b;font-size:12px;">' + displayName + '</td>';
        for (const fb of sortedBaterias) {
            let match;
            if (dim._isStressQuestion) {
                match = fb.summary.stressQuestions.find(q => q.name === dim.name);
            } else {
                match = fb.summary.dimensions.find(dd => dd.name === dim.name);
            }
            const riskDist = match ? match.risk : {};
            const total = Object.values(riskDist).reduce((a, b) => a + b, 0);
            const crit = (riskDist["Riesgo alto"] || 0) + (riskDist["Riesgo muy alto"] || 0);
            const cp = total ? Math.round(crit / total * 100) : 0;
            const titleCase = s => s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
            const baremo = clasificarCritico(cp);
            html += '<td style="padding:5px 6px;border-bottom:1px solid #f1f5f9;text-align:center;background:' + baremo.bg + ';">';
            html += '<span style="font-weight:600;font-size:11px;color:' + baremo.color + ';">' + titleCase(baremo.label) + '</span>';
            html += '<br><span style="font-size:10px;color:' + baremo.color + ';font-weight:500;">' + cp + '% crit.</span>';
            html += '</td>';
        }

        // Trend column (compare rightmost = newest vs second-to-last)
        if (sortedBaterias.length >= 2) {
            const ni = sortedBaterias.length - 1, oi = sortedBaterias.length - 2;
            const newest = critPctMap[sortedBaterias[ni].battery.meta.id]?.[dim.name] || 0;
            const older = critPctMap[sortedBaterias[oi].battery.meta.id]?.[dim.name] || 0;
            let arrow, arrowColor;
            if (newest > older) { arrow = '↑'; arrowColor = '#ef4444'; }
            else if (newest < older) { arrow = '↓'; arrowColor = '#22c55e'; }
            else { arrow = '→'; arrowColor = '#94a3b8'; }
            const diff = newest - older;
            html += '<td style="padding:5px 6px;border-bottom:1px solid #f1f5f9;text-align:center;font-weight:700;font-size:13px;color:' + arrowColor + ';">' + arrow + ' <span style="font-size:10px;font-weight:600;">' + (diff > 0 ? '+' : '') + diff + '%</span></td>';
        } else {
            html += '<td style="padding:5px 6px;border-bottom:1px solid #f1f5f9;text-align:center;color:#94a3b8;font-size:11px;">—</td>';
        }

        html += '</tr>';
        rowNum++;
    }
    html += '</tbody></table></div>';
    body.innerHTML += html;
}

function renderComparisonTable(baterias) {
    const container = document.getElementById('comparisonTable');
    const dims = baterias[0].summary.dimensions.filter(d => d.risk && Object.keys(d.risk).length > 0 && !d.name.startsWith('[Stress] '));
    if (dims.length === 0) { container.innerHTML = '<p style="color:#94a3b8;">Sin datos</p>'; return; }

    let html = '<div class="table-wrap"><table><thead><tr><th>Dimensi\u00f3n</th>';
    baterias.forEach(b => { html += `<th>${bLabelShort(b)}</th>`; });
    html += '</tr></thead><tbody>';

    for (const dim of dims) {
        html += `<tr><td><strong>${dim.name.length > 50 ? dim.name.slice(0,47)+'...' : dim.name}</strong></td>`;
        for (const b of baterias) {
            const match = b.summary.dimensions.find(dd => dd.name === dim.name);
            const tVal = match && match.avgT !== null ? match.avgT : '-';
            const riskDist = match ? match.risk : {};
            const dominantRisk = orderRiskKeys(riskDist).reduce((a, b) => (riskDist[a]||0) > (riskDist[b]||0) ? a : b, '-');
            const rc = riskColor(dominantRisk);
            const titleCase = s => s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
            html += `<td><span class="badge ${rc ? rc.cls : 'risk-error'}">${titleCase(dominantRisk)}</span> <span style="color:#64748b;font-size:12px;">${tVal !== '-' ? 'T:'+tVal : ''}</span></td>`;
        }
        html += '</tr>';
    }
    html += '</tbody></table></div>';
    container.innerHTML = html;
}

// ============================================================
// REPORTES
// ============================================================
function _showReportStatus(msg, tipo) {
    const el = document.getElementById('reportStatus');
    if (!el) return;
    el.textContent = msg;
    el.className = 'status-msg ' + tipo;
    el.style.display = 'block';
}

function _captureChart(canvasId) {
    const canvas = document.getElementById(canvasId);
    if (!canvas || !canvas.getContext) return null;
    try { return canvas.toDataURL('image/png'); } catch(e) { return null; }
}

function _dataUrlToBytes(dataUrl) {
    const bin = atob(dataUrl.split(',')[1]);
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    return buf;
}

function _downloadBlob(blob, name) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 10000);
}

let _reportHistory = [];

function _addToHistory(filename) {
    _reportHistory.push({ filename, date: new Date().toLocaleString('es-CO') });
    const cont = document.getElementById('reportHistory');
    const list = document.getElementById('reportList');
    cont.style.display = 'block';
    list.innerHTML = _reportHistory.map(r =>
        `<div class="report-item"><span class="r-name">${r.filename}</span><span class="r-meta">${r.date}</span></div>`
    ).join('');
}

function _getSelectedSections() {
    return {
        resumen: document.getElementById('rptResumen')?.checked ?? true,
        intra: document.getElementById('rptIntra')?.checked ?? true,
        extra: document.getElementById('rptExtra')?.checked ?? true,
        stress: document.getElementById('rptStress')?.checked ?? true,
        dimTable: document.getElementById('rptDimTable')?.checked ?? true
    };
}

function _loadLib(url) {
    return new Promise((resolve, reject) => {
        if (document.querySelector('script[src="' + url + '"]')) { resolve(); return; }
        const s = document.createElement('script');
        s.src = url; s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
    });
}

function generarReporte() {
    if (!state.bateriaActiva) {
        _showReportStatus('No hay datos cargados.', 'error');
        return;
    }
    const fmt = document.getElementById('reportFormat').value;
    const btn = document.getElementById('btnGenerarReporte');
    btn.disabled = true; btn.style.opacity = '0.6';
    _showReportStatus('Generando reporte...', 'info');

    setTimeout(async () => {
        try {
            const data = state.bateriaActiva;
            const s = data.summary;
            const baseName = data.meta.fileName.replace(/\.xlsx?$/i, '');
            const sections = _getSelectedSections();
            const charts = {
                intra: _captureChart('intraBars'),
                extra: _captureChart('extraBars'),
                stress: _captureChart('stressBars')
            };

            if (fmt === 'pdf') {
                await _loadLib('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
                _generarPDF(data, s, charts, baseName, sections);
            } else if (fmt === 'word') {
                await _loadLib('https://cdn.jsdelivr.net/npm/docx/build/index.umd.min.js');
                await _generarWord(data, s, charts, baseName, sections);
            } else if (fmt === 'ppt') {
                await _loadLib('https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js');
                await _generarPPT(data, s, charts, baseName, sections);
            }

            _showReportStatus('Reporte generado: ' + baseName + '.' + fmt, 'success');
            _addToHistory(baseName + '.' + fmt);
        } catch (err) {
            _showReportStatus('Error: ' + err.message, 'error');
            console.error(err);
        }
        btn.disabled = false; btn.style.opacity = '1';
    }, 150);
}

// ── PDF ──
function _generarPDF(data, s, charts, baseName, sections) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');
    const pw = 190; // page width - margins
    const margin = 10;
    let y = margin;

    const addText = (text, size, opts) => {
        if (y > 270) { doc.addPage(); y = margin; }
        doc.setFontSize(size || 11);
        doc.text(text, margin, y, opts || {});
        y += (size || 11) * 0.5;
    };

    const addLine = () => {
        if (y > 275) { doc.addPage(); y = margin; }
        doc.setDrawColor(200, 200, 200);
        doc.line(margin, y, margin + pw, y);
        y += 4;
    };

    const addImg = (dataUrl, maxH) => {
        if (!dataUrl) return;
        const imgH = maxH || 60;
        const imgW = pw;
        if (y + imgH > 275) { doc.addPage(); y = margin; }
        try { doc.addImage(dataUrl, 'PNG', margin, y, imgW, imgH); y += imgH + 4; } catch(e) {}
    };

    // Title
    doc.setFontSize(18);
    doc.text('Bater\u00eda Psicosocial - Reporte', 105, y + 6, { align: 'center' });
    y += 14;
    doc.setFontSize(10);
    doc.text('Archivo: ' + data.meta.fileName, margin, y);
    y += 5;
    doc.text('Forma: ' + data.meta.forma + ' | Encuestados: ' + s.total, margin, y);
    y += 5;
    doc.text('Generado: ' + new Date().toLocaleDateString('es-CO'), margin, y);
    y += 8;
    addLine();

    if (sections.resumen) {
        doc.setFontSize(14);
        doc.text('Resumen Ejecutivo', margin, y); y += 8;
        doc.setFontSize(11);

        const pct = (dist) => {
            if (!dist) return 0;
            return Math.round((((dist["Riesgo alto"]||0)+(dist["Riesgo muy alto"]||0))/s.total)*100);
        };
        const intraP = pct(s.intraGeneral);
        const extraP = pct(s.extraGeneral);
        const stressP = pct(s.stress);

        doc.setFont(undefined, 'bold');
        doc.text('Intralaboral: ' + intraP + '% cr\u00edtico', margin, y); y += 5;
        doc.text('Extralaboral: ' + extraP + '% cr\u00edtico', margin, y); y += 5;
        doc.text('Estr\u00e9s: ' + stressP + '% cr\u00edtico', margin, y); y += 5;
        doc.setFont(undefined, 'normal');

        // Risk distribution table for summary
        y += 2;
        addLine();
    }

    if (sections.intra && charts.intra) {
        doc.setFontSize(14);
        doc.text('Intralaboral', margin, y); y += 8;
        addImg(charts.intra, 55);
        addLine();
    }

    if (sections.extra && charts.extra) {
        doc.setFontSize(14);
        doc.text('Extralaboral', margin, y); y += 8;
        addImg(charts.extra, 55);
        addLine();
    }

    if (sections.stress && charts.stress) {
        doc.setFontSize(14);
        doc.text('Estr\u00e9s', margin, y); y += 8;
        addImg(charts.stress, 55);
        addLine();
    }

    if (sections.dimTable) {
        doc.setFontSize(14);
        doc.text('Dimensiones', margin, y); y += 8;
        doc.setFontSize(8);

        const dims = s.dimensions.filter(d => d.risk && Object.keys(d.risk).length > 0);
        for (let i = 0; i < dims.length; i += 20) {
            if (i > 0) { doc.addPage(); y = margin; }
            const chunk = dims.slice(i, i + 20);
            const colW = [70, 24, 24, 24, 24, 24];
            const headers = ['Dimensi\u00f3n', 'SR', 'RB', 'RM', 'RA', 'RMA'];

            // header
            doc.setFont(undefined, 'bold');
            let x = margin;
            headers.forEach((h, j) => {
                doc.text(h, x + 1, y);
                x += colW[j];
            });
            y += 3;
            doc.line(margin, y, margin + colW.reduce((a,b)=>a+b,0), y);
            y += 2;
            doc.setFont(undefined, 'normal');

            for (const d of chunk) {
                if (y > 275) { doc.addPage(); y = margin; }
                const name = d.name.length > 45 ? d.name.slice(0, 42) + '...' : d.name;
                let x = margin;
                doc.text(name, x + 1, y);
                x += colW[0];
                for (const r of ['Sin riesgo','Riesgo bajo','Riesgo medio','Riesgo alto','Riesgo muy alto']) {
                    const v = d.risk[r] || 0;
                    doc.text(String(v), x + 4, y);
                    x += colW[1];
                }
                y += 4;
            }
        }
    }

    const fn = 'Reporte_' + baseName + '.pdf';
    doc.save(fn);
}

// ── WORD ──
async function _generarWord(data, s, charts, baseName, sections) {
    const {
        Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
        ImageRun, AlignmentType, WidthType, BorderStyle, HeadingLevel
    } = window.docx;

    const children = [];
    const push = (el) => children.push(el);
    const heading = (txt, lvl) => push(new Paragraph({ heading: lvl || HeadingLevel.HEADING_1, children: [new TextRun({ text: txt, bold: true })] }));
    const para = (txt, opts) => push(new Paragraph({ children: [new TextRun({ text: txt, ...opts })] }));

    // Title
    push(new Paragraph({ spacing: { after: 200 }, alignment: AlignmentType.CENTER, children: [
        new TextRun({ text: 'Bater\u00eda Psicosocial - Reporte', bold: true, size: 28 })
    ]}));
    para('Archivo: ' + data.meta.fileName, { size: 22 });
    para('Forma: ' + data.meta.forma + ' | Encuestados: ' + s.total, { size: 22 });
    para('Generado: ' + new Date().toLocaleDateString('es-CO'), { size: 22 });

    // Summary
    if (sections.resumen) {
        heading('Resumen Ejecutivo', HeadingLevel.HEADING_1);
        const pct = (dist) => {
            if (!dist) return 0;
            return Math.round((((dist["Riesgo alto"]||0)+(dist["Riesgo muy alto"]||0))/s.total)*100);
        };
        para('Intralaboral: ' + pct(s.intraGeneral) + '% cr\u00edtico');
        para('Extralaboral: ' + pct(s.extraGeneral) + '% cr\u00edtico');
        para('Estr\u00e9s: ' + pct(s.stress) + '% cr\u00edtico');
    }

    // Sections with chart images
    const addChartSection = async (title, chartKey) => {
        if (!charts[chartKey]) return;
        heading(title, HeadingLevel.HEADING_1);
        const imgBuf = _dataUrlToBytes(charts[chartKey]);
        push(new Paragraph({ children: [
            new ImageRun({ data: imgBuf, transformation: { width: 500, height: 150 } })
        ]}));
    };

    if (sections.intra) await addChartSection('Intralaboral', 'intra');
    if (sections.extra) await addChartSection('Extralaboral', 'extra');
    if (sections.stress) await addChartSection('Estr\u00e9s', 'stress');

    // Dimensions table
    if (sections.dimTable) {
        heading('Dimensiones', HeadingLevel.HEADING_1);
        const dims = s.dimensions.filter(d => d.risk && Object.keys(d.risk).length > 0);
        if (dims.length > 0) {
            const riskLevels = ['Sin riesgo','Riesgo bajo','Riesgo medio','Riesgo alto','Riesgo muy alto'];
            const headerRow = new TableRow({
                tableHeader: true,
                children: ['Dimensi\u00f3n', ...riskLevels].map(h =>
                    new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: h, bold: true, size: 18 })] })] })
                )
            });
            const rows = dims.slice(0, 50).map(d =>
                new TableRow({
                    children: [d.name.slice(0, 50), ...riskLevels.map(r => String(d.risk[r] || 0))].map(c =>
                        new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: c, size: 16 })] })] })
                    )
                })
            );
            push(new Table({ rows: [headerRow, ...rows] }));
        }
    }

    const doc = new Document({ sections: [{ children }] });
    const blob = await Packer.toBlob(doc);
    _downloadBlob(blob, 'Reporte_' + baseName + '.docx');
}

// ── PPT ──
function _pctCriticoDist(dist, total) {
    if (!dist || !total) return 0;
    return Math.round((((dist["Riesgo alto"]||0)+(dist["Riesgo muy alto"]||0))/total)*100);
}

function _getAreasFromRows(rows) {
    const areas = new Set();
    rows.forEach(r => { const a = (r["Unidad de Análisis"] || '').trim(); if (a) areas.add(a); });
    return Array.from(areas).sort();
}

function _loadImageAsBase64(url) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
            const c = document.createElement('canvas');
            c.width = img.width; c.height = img.height;
            c.getContext('2d').drawImage(img, 0, 0);
            resolve(c.toDataURL('image/png'));
        };
        img.onerror = reject;
        img.src = url;
    });
}

    {
        const slide = pptx.addSlide();
        addBg(slide);
        addTitleBand(slide, 'Intralaboral', 'Dominios y dimensiones');

        const globalDims = s.dimensions.filter(d => d.name.startsWith('[Global]') && d.risk && !d.name.includes('INTRALABORAL'));
        const intraDims = s.dimensions.filter(d => !d.name.startsWith('[') && d.risk);

        const domainGroups = {
            'LIDERAZGO Y RELACIONES SOCIALES': [],
            'CONTROL SOBRE EL TRABAJO': [],
            'DEMANDAS DEL TRABAJO': [],
            'RECOMPENSAS': []
        };
        intraDims.forEach(d => {
            const n = d.name;
            if (n.includes('Liderazgo') || n.includes('Relaciones Sociales') || n.includes('Retroal') || n.includes('Relación colab')) {
                domainGroups['LIDERAZGO Y RELACIONES SOCIALES'].push(d);
            } else if (n.includes('Control') || n.includes('Oportunidades') || n.includes('Participación') || n.includes('Claridad') || n.includes('Capacitación')) {
                domainGroups['CONTROL SOBRE EL TRABAJO'].push(d);
            } else if (n.includes('Demandas') || n.includes('carga mental') || n.includes('emocionales') || n.includes('ambientales') || n.includes('jornada') || n.includes('Influencia sobre el entorno') || n.includes('Exigencias') || n.includes('Consistencia')) {

                slide.addTable([header, ...rows], { x: 0.5, y: yPos + 0.5, w: 12.3, colW, rowH: 0.18, border: { type: 'solid', pt: 0.2, color: 'e2e8f0' } });

        if (extraDims.length > 0) {
            const colW = [4.2, 0.9, 0.9, 0.9, 0.9, 0.9, 1.1];
            const header = ['Dimensión', 'SR', 'RB', 'RM', 'RA', 'RMA', 'Crítico'].map(t => ({
                text: t, options: { fontSize: 9, bold: true, color: C.white, fill: { color: C.green2 }, align: 'center', valign: 'middle' }
            }));
            const rows = extraDims.map(d => {
                const name = d.name.replace('[Extra] ', '');
                const total = Object.values(d.risk).reduce((a, b) => a + b, 0);
                const critPct = total ? Math.round(((d.risk["Riesgo alto"] || 0) + (d.risk["Riesgo muy alto"] || 0)) / total * 100) : 0;
                const cells = [{ text: name, options: { fontSize: 9, bold: true, color: C.dark, align: 'left', valign: 'middle' } }];
                ['Sin riesgo','Riesgo bajo','Riesgo medio','Riesgo alto','Riesgo muy alto'].forEach(k => {
                    cells.push({ text: String(d.risk[k] || 0), options: { fontSize: 9, color: C.dark, align: 'center', valign: 'middle' } });
                });
                cells.push({ text: critPct + '%', options: { fontSize: 9, bold: true, color: critPct > 50 ? C.a2 : critPct > 30 ? C.a1 : C.green3, align: 'center', valign: 'middle' } });
                return cells;
            });
            slide.addTable([header, ...rows], { x: 0.5, y: 1.4, w: 12.3, colW, rowH: 0.3, border: { type: 'solid', pt: 0.3, color: 'd1d5db' } });

            // Horizontal bars for each dimension
            let yPos = 1.4 + (rows.length + 1) * 0.3 + 0.4;
            slide.addText('% Crítico por Dimensión', { x: 0.5, y: yPos, w: 12, h: 0.35, fontSize: 13, bold: true, color: C.a3, fontFace: 'Arial' });
            yPos += 0.45;
            extraDims.forEach((d, i) => {
                const name = d.name.replace('[Extra] ', '');
                const total = Object.values(d.risk).reduce((a, b) => a + b, 0);
                const critPct = total ? Math.round(((d.risk["Riesgo alto"] || 0) + (d.risk["Riesgo muy alto"] || 0)) / total * 100) : 0;
                const by = yPos + i * 0.4;
                slide.addText(name, { x: 0.5, y: by, w: 3, h: 0.3, fontSize: 8, color: C.dark, valign: 'middle', fontFace: 'Arial' });
                addRiskBar(slide, 3.8, by + 0.04, 5.5, critPct, critPct > 50 ? C.a2 : critPct > 30 ? C.a1 : C.green3);
                slide.addText(critPct + '%', { x: 9.5, y: by, w: 1, h: 0.3, fontSize: 9, bold: true, color: C.dark, valign: 'middle', fontFace: 'Arial' });
            });
        }
        addNum(slide, 7, totalSlidesNum);
    }

    // ═══ SLIDE 8: ESTRÉS - CATEGORÍAS + PREGUNTAS ═══
    {
        const slide = pptx.addSlide();
        addBg(slide);
        addTitleBand(slide, 'Estrés', 'Categorías de síntomas y distribución por pregunta');

        const stressDims = s.dimensions.filter(d => d.name.startsWith('[Stress]') && d.risk);
        const stressQuestions = s.stressQuestions || [];
        const stressDist = s.stress || {};

        let yPos = 1.2;

        // Categories compact section
        if (stressDims.length > 0) {
            slide.addText('Categorías de Estrés', { x: 0.5, y: yPos, w: 5, h: 0.3, fontSize: 11, bold: true, color: C.a2, fontFace: 'Arial' });
            yPos += 0.35;
            stressDims.forEach((d, i) => {
                const name = d.name.replace('[Stress] ', '');
                const total = Object.values(d.risk).reduce((a, b) => a + b, 0);
                const critPct = total ? Math.round(((d.risk["Riesgo alto"]||0)+(d.risk["Riesgo muy alto"]||0))/total*100) : 0;
                const by = yPos + i * 0.3;
                slide.addText(name, { x: 0.5, y: by, w: 2, h: 0.25, fontSize: 8, color: C.dark, valign: 'middle', fontFace: 'Arial' });
                addStackedBar(slide, 2.7, by + 0.02, 5, 0.2, d.risk);
                slide.addText(critPct + '%', { x: 7.9, y: by, w: 0.6, h: 0.25, fontSize: 8, bold: true, color: critPct > 50 ? C.a2 : C.a1, valign: 'middle', fontFace: 'Arial' });
            });
            yPos += stressDims.length * 0.3 + 0.25;
        }

        // Stress questions chart (top 15 by critical %)
        if (stressQuestions.length > 0) {
            slide.addText('Distribución por Pregunta de Estrés (top ' + Math.min(15, stressQuestions.length) + ')', { x: 0.5, y: yPos, w: 12, h: 0.3, fontSize: 11, bold: true, color: C.a2, fontFace: 'Arial' });
            yPos += 0.35;

            const sortedQs = [...stressQuestions].map(q => {
                const total = Object.values(q.risk).reduce((a, b) => a + b, 0);
                const critPct = total ? Math.round(((q.risk["Riesgo alto"]||0)+(q.risk["Riesgo muy alto"]||0))/total*100) : 0;
                return { ...q, _crit: critPct, _total: total };
            }).sort((a, b) => b._crit - a._crit).slice(0, 15);

            sortedQs.forEach((q, i) => {
                const by = yPos + i * 0.32;
                slide.addText(q.name, { x: 0.5, y: by, w: 1.8, h: 0.28, fontSize: 6.5, color: C.dark, valign: 'middle', fontFace: 'Arial' });
                addStackedBar(slide, 2.4, by + 0.02, 6.5, 0.22, q.risk);
                const critColor = q._crit > 50 ? C.a2 : q._crit > 30 ? C.a1 : C.green3;
                slide.addText(q._crit + '%', { x: 9.1, y: by, w: 0.6, h: 0.28, fontSize: 7, bold: true, color: critColor, valign: 'middle', fontFace: 'Arial' });
                const keys = orderRiskKeys(q.risk);
                const detail = keys.filter(k => (q.risk[k] || 0) > 0).map(k => q.risk[k] + ' ' + k.charAt(0)).join(' ');
                slide.addText(detail, { x: 9.8, y: by, w: 3.2, h: 0.28, fontSize: 6, color: '94a3b8', valign: 'middle', fontFace: 'Arial' });
            });
        }

        addNum(slide, 8, totalSlidesNum);
    }

    // ═══ SLIDE 9: EN BLANCO ═══
    {
        const slide = pptx.addSlide();
        addBg(slide);
        slide.addText('[[Reservado para contenido adicional]]', { x: 0.5, y: 3.2, w: 12.33, h: 0.5, fontSize: 14, italic: true, color: '94a3b8', align: 'center', fontFace: 'Arial' });
        addNum(slide, 9, totalSlidesNum);
    }

    // ═══ SLIDE 10: ANÁLISIS POR ÁREAS ═══
    if (areas.length > 0) {
        for (let ai = 0; ai < areas.length; ai += 2) {
            const slide = pptx.addSlide();
            addBg(slide);
            addTitleBand(slide, 'Análisis por Áreas', 'Área ' + (ai + 1) + ' a ' + Math.min(ai + 2, areas.length) + ' de ' + areas.length);

            for (let j = 0; j < 2 && ai + j < areas.length; j++) {
                const areaName = areas[ai + j];
                const areaRows = data.rows.filter(r => (r["Unidad de Análisis"] || '').trim() === areaName);
                const areaSummary = computeSummary(areaRows);
                if (!areaSummary) continue;

                const xOff = j * 6.5;
                addCard(slide, 0.2 + xOff, 1.25, 6.3, 5.8);

                slide.addText(areaName, { x: 0.4 + xOff, y: 1.35, w: 5.9, h: 0.35, fontSize: 13, bold: true, color: C.green2, align: 'center', fontFace: 'Arial' });
                slide.addText(areaSummary.total + ' encuestados' + (areaSummary.total === 1 ? ' (1 persona)' : ''), { x: 0.4 + xOff, y: 1.7, w: 5.9, h: 0.25, fontSize: 9, color: C.gray, align: 'center', fontFace: 'Arial' });

                const riskItems = [
                    { l: 'Intralaboral', p: _pctCriticoDist(areaSummary.intraGeneral, areaSummary.total), dist: areaSummary.intraGeneral, c: C.a1 },
                    { l: 'Extralaboral', p: _pctCriticoDist(areaSummary.extraGeneral, areaSummary.total), dist: areaSummary.extraGeneral, c: C.a3 },
                    { l: 'Estrés', p: _pctCriticoDist(areaSummary.stress, areaSummary.total), dist: areaSummary.stress, c: C.a2 }
                ];

                riskItems.forEach((ri, riIdx) => {
                    const ry = 2.15 + riIdx * 0.5;
                    slide.addText(ri.l, { x: 0.4 + xOff, y: ry, w: 1.5, h: 0.3, fontSize: 9, color: C.dark, valign: 'middle', fontFace: 'Arial' });
                    addRiskBar(slide, 2 + xOff, ry + 0.04, 2.5, ri.p, ri.c);
                    slide.addText(ri.p + '%', { x: 4.6 + xOff, y: ry, w: 0.5, h: 0.3, fontSize: 10, bold: true, color: ri.c, valign: 'middle', fontFace: 'Arial' });
                    if (ri.dist && areaSummary.total <= 3) {
                        const keys = orderRiskKeys(ri.dist);
                        const total = keys.reduce((a, k) => a + (ri.dist[k] || 0), 0);
                        const detail = keys.filter(k => (ri.dist[k] || 0) > 0).map(k => ri.dist[k] + ' ' + k).join(', ');
                        slide.addText(detail, { x: 5.2 + xOff, y: ry, w: 1, h: 0.3, fontSize: 7, color: C.gray, valign: 'middle', fontFace: 'Arial' });
                    }
                });

                const topCriticas = areaSummary.topCriticas.slice(0, 3);
                if (topCriticas.length > 0) {
                    slide.addText('Factores más críticos:', { x: 0.4 + xOff, y: 3.7, w: 5.9, h: 0.3, fontSize: 9, bold: true, color: C.dark, fontFace: 'Arial' });
                    topCriticas.forEach((tc, tcIdx) => {
                        const ty = 4.05 + tcIdx * 0.55;
                        slide.addShape(pptx.ShapeType.roundRect, { x: 0.4 + xOff, y: ty, w: 5.9, h: 0.48, fill: { color: C.white, transparency: 60 }, rectRadius: 0.04 });
                        const dn = tc.name.replace('[Global] ', '').replace('[Extra] ', '').replace('[Stress] ', '');
                        slide.addText((tcIdx + 1) + '. ' + dn, { x: 0.5 + xOff, y: ty + 0.02, w: 5.6, h: 0.25, fontSize: 8, bold: true, color: C.dark, fontFace: 'Arial' });
                        slide.addText(tc.pctAlto + '% crítico', { x: 0.5 + xOff, y: ty + 0.26, w: 5.6, h: 0.2, fontSize: 8, color: tc.pctAlto > 50 ? C.a2 : tc.pctAlto > 30 ? C.a1 : C.gray, fontFace: 'Arial' });
                    });
                }
            }
            addNum(slide, 10, totalSlidesNum);
        }
    }

    // ═══ SLIDE 11: CONCLUSIONES ═══
    {
        const slide = pptx.addSlide();
        addBg(slide);
        addTitleBand(slide, 'Conclusiones y Recomendaciones');
        addCard(slide, 0.4, 1.3, 12.53, 1.5);
        slide.addText('Conclusiones', { x: 0.7, y: 1.4, w: 12, h: 0.35, fontSize: 14, bold: true, color: C.green2, fontFace: 'Arial' });
        slide.addText('[[Editar en PowerPoint - Describir las conclusiones del análisis]]', { x: 0.7, y: 1.85, w: 12, h: 0.8, fontSize: 11, italic: true, color: C.gray, fontFace: 'Arial' });
        addCard(slide, 0.4, 3.1, 12.53, 1.5);
        slide.addText('Recomendaciones', { x: 0.7, y: 3.2, w: 12, h: 0.35, fontSize: 14, bold: true, color: C.a1, fontFace: 'Arial' });
        slide.addText('[[Editar en PowerPoint - Detallar las recomendaciones basadas en los resultados]]', { x: 0.7, y: 3.65, w: 12, h: 0.8, fontSize: 11, italic: true, color: C.gray, fontFace: 'Arial' });
        addCard(slide, 0.4, 4.9, 12.53, 1.5);
        slide.addText('Plan de Intervención', { x: 0.7, y: 5.0, w: 12, h: 0.35, fontSize: 14, bold: true, color: C.a3, fontFace: 'Arial' });
        slide.addText('[[Editar en PowerPoint - Definir el plan de intervención con actividades, responsables y plazos]]', { x: 0.7, y: 5.45, w: 12, h: 0.8, fontSize: 11, italic: true, color: C.gray, fontFace: 'Arial' });
        addNum(slide, 11, totalSlidesNum);
    }

    pptx.writeFile({ fileName: 'Reporte_' + baseName + '.pptx' });
}

// ============================================================
// INIT - drag & drop support
document.querySelectorAll('.upload-area').forEach(zone => {
    const input = zone.querySelector('input[type="file"]');
    if (!input) return;

    input.addEventListener('click', e => e.stopPropagation());
    zone.addEventListener('click', () => input.click());

    zone.addEventListener('dragover', e => {
        e.preventDefault();
        zone.classList.add('drag-over');
    });
    zone.addEventListener('dragleave', e => {
        zone.classList.remove('drag-over');
    });
    zone.addEventListener('drop', function(e) {
        e.preventDefault();
        zone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (!file) return;
        const dt = new DataTransfer();
        dt.items.add(file);
        input.files = dt.files;
        input.dispatchEvent(new Event('change'));
    });
});
</script>
