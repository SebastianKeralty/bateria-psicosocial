<script>
// ============================================================
// STATE
// ============================================================
const RISK_COLORS = {
    "Sin riesgo":        { bg: "#bbf7d0", text: "#166534", cls: "risk-sr" },
    "Riesgo bajo":       { bg: "#fef08a", text: "#854d0e", cls: "risk-rb" },
    "Riesgo medio":      { bg: "#fed7aa", text: "#9a3412", cls: "risk-rm" },
    "Riesgo alto":       { bg: "#fca5a5", text: "#991b1b", cls: "risk-ra" },
    "Riesgo muy alto":   { bg: "#f87171", text: "#7f1d1d", cls: "risk-rma" },
    "Riesgo muy bajo":   { bg: "#dbeafe", text: "#1e40af", cls: "risk-mb" },
    "ERROR":             { bg: "#e2e8f0", text: "#475569", cls: "risk-error" }
};
const RISK_ORDER = ["Sin riesgo","Riesgo bajo","Riesgo medio","Riesgo alto","Riesgo muy alto"];
const STRESS_ORDER = ["Riesgo muy bajo","Riesgo bajo","Riesgo medio","Riesgo alto","Riesgo muy alto"];
const CHART_COLORS = [
    "#1a73e8","#34a853","#fbbc04","#ea4335","#8e24aa",
    "#00acc1","#ff7043","#9ccc65","#ab47bc","#26a69a"
];

const state = {
    bateriaActiva: null,
    bateriasComparativa: [],
    charts: {}
};

function destroyChart(key) {
    if (state.charts[key]) { state.charts[key].destroy(); delete state.charts[key]; }
}

function getChartCtx(id) {
    const el = document.getElementById(id);
    if (!el) return null;
    return el.getContext('2d');
}

// ============================================================
// TAB SWITCHING
// ============================================================
const tabLabels = {
    inicio: 'Inicio',
    dashboard: 'Dashboard',
    comparativa: 'Comparativa',
    reportes: 'Reportes'
};

document.querySelectorAll('.side-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        const tab = this.dataset.tab;
        document.getElementById('tab-' + tab).classList.add('active');
        document.getElementById('topbarTitle').textContent = tabLabels[tab] || tab;
        if (tab === 'dashboard' && state.bateriaActiva) {
            document.getElementById('topbarBadge').style.display = 'inline';
            document.getElementById('topbarBadge').textContent = state.bateriaActiva.meta.fileName + ' (' + state.bateriaActiva.meta.totalRows + ' reg.)';
        } else if (tab === 'inicio') {
            document.getElementById('topbarBadge').style.display = 'none';
        } else {
            document.getElementById('topbarBadge').style.display = 'none';
        }
    });
});

function irADashboard() {
    const btn = document.querySelector('.side-btn[data-tab="dashboard"]');
    if (btn) btn.click();
}

// ============================================================
// UTILITIES
// ============================================================
function riskColor(riskLevel) {
    return RISK_COLORS[riskLevel] || RISK_COLORS["ERROR"];
}

function getRiskClass(val) {
    const c = riskColor(val);
    return c ? c.cls : 'risk-error';
}

function orderRiskKeys(dist) {
    const keys = Object.keys(dist);
    // Check which order has more matches
    const nStress = STRESS_ORDER.filter(k => keys.includes(k)).length;
    const nRegular = RISK_ORDER.filter(k => keys.includes(k)).length;
    if (nStress > nRegular && nStress > 0) {
        return STRESS_ORDER.filter(k => keys.includes(k));
    }
    if (nRegular > 0) {
        return RISK_ORDER.filter(k => keys.includes(k));
    }
    return keys;
}

function toTitleCase(str) {
    const keepLower = ['de','del','la','las','lo','los','el','ella','ellos','y','e','o','a','en','con','por','para','sin','sobre','entre','desde','hasta','al','un','una','su','sus'];
    return str.split(' ').map((word, i) => {
        const w = word.toLowerCase();
        if (i > 0 && keepLower.includes(w)) return w;
        return w.charAt(0).toUpperCase() + w.slice(1);
    }).join(' ');
}

function getFilterOptions(rows, col) {
    const set = new Set();
    for (const r of rows) {
        const v = r[col];
        if (v !== undefined && v !== null && v !== "") set.add(String(v).trim());
    }
    return Array.from(set).sort();
}

function populateFilter(selectId, col, rows) {
    const sel = document.getElementById(selectId);
    if (!sel) return;
    const current = sel.value;
    sel.innerHTML = '<option value="">Todos</option>';
    const opts = getFilterOptions(rows, col);
    opts.forEach(o => {
        const opt = document.createElement('option');
        opt.value = o; opt.textContent = o;
        sel.appendChild(opt);
    });
    if (current) sel.value = current;
}

// ============================================================
// DASHBOARD
// ============================================================
document.getElementById('inicioFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    procesarDashboard(file);
});

function mostrarStatus(id, msg, tipo) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = msg;
    el.className = 'status-msg ' + tipo;
    el.style.display = 'block';
}

function procesarDashboard(file) {
    mostrarStatus('inicioStatus', 'Leyendo archivo...', 'info');
    document.getElementById('inicioSuccess').style.display = 'none';
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const result = procesarExcel(new Uint8Array(e.target.result), file.name);
            if (!result.rows || result.rows.length === 0) {
                mostrarStatus('inicioStatus', 'No se encontraron datos en las hojas esperadas (FORMA B digitacion / FORMA A Digitacion).', 'error');
                return;
            }
            state.bateriaActiva = result;
            mostrarStatus('inicioStatus', '✔ ' + result.meta.fileName + ' — ' + result.meta.totalRows + ' registros (Forma ' + result.meta.forma + ')', 'success');
            document.getElementById('inicioSuccess').style.display = 'block';
            document.getElementById('topbarBadge').style.display = 'inline';
            document.getElementById('topbarBadge').textContent = result.meta.fileName + ' (' + result.meta.totalRows + ' reg.)';
            renderDashboard();
        } catch(err) {
            mostrarStatus('inicioStatus', 'Error al procesar: ' + err.message, 'error');
            console.error(err);
        }
    };
    reader.readAsArrayBuffer(file);
}

function renderDashboard() {
    if (!state.bateriaActiva) return;
    const data = state.bateriaActiva;
    document.getElementById('dashContent').style.display = 'block';
    document.getElementById('dashNoData')?.remove();
    renderSummaryCards(data);
    populateFiltersDashboard(data.rows);
    renderChartsDashboard(data.rows, data.summary);
    renderDetailTable(data.rows, data.summary);
}

function pctCritico(dist, total) {
    if (!dist || total === 0) return 0;
    const crit = (dist["Riesgo alto"] || 0) + (dist["Riesgo muy alto"] || 0);
    return Math.round((crit / total) * 100);
}

const CRIT_RANGES = [
    { max: 29, label: "Sin riesgo", color: "#22c55e" },
    { max: 49, label: "Riesgo bajo", color: "#84cc16" },
    { max: 69, label: "Riesgo medio", color: "#eab308" },
    { max: 84, label: "Riesgo alto", color: "#f97316" },
    { max: 100, label: "Riesgo muy alto", color: "#ef4444" }
];

function clasificarCritico(pct) {
    for (const r of CRIT_RANGES) {
        if (pct <= r.max) return r;
    }
    return CRIT_RANGES[4];
}

function renderSummaryCards(data) {
    const s = data.summary;
    const container = document.getElementById('summaryCards');
    const nTotal = s.total;

    const intraPct = pctCritico(s.intraGeneral, nTotal);
    const extraPct = pctCritico(s.extraGeneral, nTotal);
    const stressPct = pctCritico(s.stress, nTotal);

    const intraR = clasificarCritico(intraPct);
    const extraR = clasificarCritico(extraPct);
    const stressR = clasificarCritico(stressPct);

    const buildCard = (num, label, sublabel, color, pct) => {
        const isTotal = label === 'Total Encuestados';
        const bgColor = isTotal ? '#eef2ff' : pct >= 50 ? '#fef2f2' : pct >= 25 ? '#fff7ed' : pct >= 10 ? '#fefce8' : '#f0fdf4';
        const borderColor = isTotal ? '#1a73e8' : color;
        return `<div style="background:${bgColor};border-radius:12px;padding:16px;box-shadow:0 2px 6px rgba(0,0,0,0.07);border-left:5px solid ${borderColor};text-align:center;display:flex;flex-direction:column;gap:6px;">
            <div style="font-size:${isTotal ? 36 : 22}px;font-weight:800;color:${isTotal ? '#1a73e8' : color};line-height:1.1;">${num}</div>
            <div style="font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:0.6px;">${label}</div>
            ${!isTotal ? `
            <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:2px;">
                <span style="font-size:11px;font-weight:600;color:#64748b;">${sublabel}</span>
            </div>
            <div style="height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-top:2px;max-width:80%;margin-left:auto;margin-right:auto;">
                <div style="height:100%;width:${pct}%;background:${color};border-radius:3px;"></div>
            </div>` : ''}
        </div>`;
    };

    container.innerHTML = `
        ${buildCard(nTotal, 'Total Encuestados', '', '#1a73e8', 0)}
        ${buildCard(intraR.label, 'Intralaboral', intraPct + '% crítico', intraR.color, intraPct)}
        ${buildCard(extraR.label, 'Extralaboral', extraPct + '% crítico', extraR.color, extraPct)}
        ${buildCard(stressR.label, 'Estrés', stressPct + '% crítico', stressR.color, stressPct)}
    `;
}

function buildDashboardFilters(rows) {
    const bar = document.getElementById('filterBar');
    bar.style.marginBottom = '14px';
    bar.innerHTML = '';

    const topRow = document.createElement('div');
    topRow.className = 'mf-quick-bar mf-row-top';

    const addSelect = (id, placeholder, col) => {
        const sel = document.createElement('select');
        sel.id = id;
        const optAll = document.createElement('option');
        optAll.value = ''; optAll.textContent = placeholder;
        sel.appendChild(optAll);
        const opts = getFilterOptions(rows, col);
        opts.forEach(o => {
            const opt = document.createElement('option');
            opt.value = o; opt.textContent = o;
            sel.appendChild(opt);
        });
        topRow.appendChild(sel);
    };

    addSelect('dfForma', 'Forma: Todas', '_forma');
    addSelect('dfSexo', 'Sexo: Todos', '2. Sexo');
    addSelect('dfArea', '\u00c1rea: Todas', 'Unidad de An\u00e1lisis');
    addSelect('dfCargo', 'Tipo cargo: Todos', '14. Tipo de cargo');

    bar.appendChild(topRow);

    const bottomRow = document.createElement('div');
    bottomRow.className = 'mf-quick-bar mf-row-bottom';

    const inp = document.createElement('input');
    inp.id = 'dfBusqueda';
    inp.placeholder = 'Buscar (ID, nombre, cargo\u2026)';
    inp.className = 'mf-search-input';
    bottomRow.appendChild(inp);

    const toggleBtn = document.createElement('button');
    toggleBtn.id = 'dfToggle';
    toggleBtn.className = 'mf-toggle';
    toggleBtn.title = 'M\u00e1s filtros';
    toggleBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="12" y1="18" x2="20" y2="18"/><circle cx="6" cy="6" r="2"/><circle cx="10" cy="12" r="2"/><circle cx="14" cy="18" r="2"/></svg>';
    toggleBtn.onclick = function() {
        const panel = document.getElementById('dfAdvancedPanel');
        if (!panel) return;
        const isOpen = panel.style.display !== 'none';
        panel.style.display = isOpen ? 'none' : 'block';
        toggleBtn.title = isOpen ? 'M\u00e1s filtros' : 'Menos filtros';
        toggleBtn.classList.toggle('open', !isOpen);
    };
    bottomRow.appendChild(toggleBtn);

    const btnF = document.createElement('button');
    btnF.className = 'btn-filtrar';
    btnF.title = 'Filtrar';
    btnF.style.background = 'linear-gradient(135deg,#6366f1,#06b6d4)';
    btnF.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>';
    btnF.onclick = aplicarFiltrosDashboard;
    bottomRow.appendChild(btnF);

    const btnL = document.createElement('button');
    btnL.className = 'btn-limpiar';
    btnL.title = 'Limpiar';
    btnL.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
    btnL.onclick = limpiarFiltrosDashboard;
    bottomRow.appendChild(btnL);

    bar.appendChild(bottomRow);

    const advPanel = document.createElement('div');
    advPanel.id = 'dfAdvancedPanel';
    advPanel.className = 'mf-advanced-panel';
    advPanel.style.display = 'none';

    const groups = [
        {
            title: 'Persona',
            cols: [
                { label: 'Estado civil', col: '4. Estado civil', id: 'dfEstadoCivil' },
                { label: 'Nivel estudios', col: '5. Nivel estudios', id: 'dfNivelEstudios' },
                { label: 'Estrato', col: '8. Estrato', id: 'dfEstrato' },
                { label: 'Tipo vivienda', col: '9. Tipo vivienda', id: 'dfTipoVivienda' }
            ]
        },
        {
            title: 'Laboral',
            cols: [
                { label: 'Antig\u00fcedad empresa', col: '12. Antig\u00fcedad en la empresa', id: 'dfAntiguedadEmp' },
                { label: 'Antig\u00fcedad cargo', col: '15. Antig\u00fcedad en el cargo', id: 'dfAntiguedadCargo' },
                { label: 'Tipo contrato', col: '17. Tipo de contrato', id: 'dfTipoContrato' },
                { label: 'Horas diarias', col: '18. Horas diarias de trabajo', id: 'dfHorasDiarias' },
                { label: 'Tipo salario', col: '19. Tipo de salario', id: 'dfTipoSalario' },
                { label: 'Nivel cargo', col: 'Nivel de cargo del trabajador', id: 'dfNivelCargo' },
                { label: '\u00c1rea trabajo', col: '16. \u00c1rea donde trabaja', id: 'dfAreaTrabajo' }
            ]
        },
        {
            title: 'Ubicaci\u00f3n',
            cols: [
                { label: 'Ciudad residencia', col: '7. Lugar de residencia: Ciudad', id: 'dfCiudadRes' },
                { label: 'Dpto residencia', col: '7. Lugar de residencia: Departamento', id: 'dfDptoRes' },
                { label: 'Ciudad trabajo', col: '11. Lugar de trabajo: Ciudad', id: 'dfCiudadTrab' },
                { label: 'Dpto trabajo', col: '11. Lugar de trabajo: Departamento', id: 'dfDptoTrab' }
            ]
        }
    ];

    const advGrid = document.createElement('div');
    advGrid.className = 'mf-adv-grid';
    for (const group of groups) {
        const card = document.createElement('div');
        card.className = 'mf-group-card';
        const header = document.createElement('div');
        header.className = 'mf-group-header';
        header.textContent = group.title;
        card.appendChild(header);
        const grid = document.createElement('div');
        grid.className = 'mf-group-grid';
        let hasFields = false;
        for (const f of group.cols) {
            const opts = getFilterOptions(rows, f.col);
            if (opts.length === 0) continue;
            hasFields = true;
            const wrapper = document.createElement('div');
            wrapper.className = 'mf-field';
            const lbl = document.createElement('label');
            lbl.textContent = f.label;
            wrapper.appendChild(lbl);
            const sel = document.createElement('select');
            sel.id = f.id;
            const optAll = document.createElement('option');
            optAll.value = ''; optAll.textContent = 'Todos';
            sel.appendChild(optAll);
            opts.forEach(o => {
                const opt = document.createElement('option');
                opt.value = o; opt.textContent = o;
                sel.appendChild(opt);
            });
            wrapper.appendChild(sel);
            grid.appendChild(wrapper);
        }
        if (hasFields) {
            card.appendChild(grid);
            advGrid.appendChild(card);
        }
    }
    if (advGrid.children.length > 0) {
        advPanel.appendChild(advGrid);
        bar.appendChild(advPanel);
    } else {
        toggleBtn.style.display = 'none';
    }
}

function populateFiltersDashboard(rows) {
    buildDashboardFilters(rows);
}

function getFilteredRows() {
    if (!state.bateriaActiva) return [];
    let rows = state.bateriaActiva.rows;

    const q = document.getElementById('dfBusqueda')?.value?.trim().toLowerCase();
    if (q) {
        const searchCols = ["ID", "Nombre completo del trabajador", "13. Cargo", "No. Encuesta"];
        rows = rows.filter(r => searchCols.some(col =>
            String(r[col] || '').trim().toLowerCase().includes(q)
        ));
    }

    const forma = document.getElementById('dfForma')?.value;
    const sexo = document.getElementById('dfSexo')?.value;
    const area = document.getElementById('dfArea')?.value;
    const cargo = document.getElementById('dfCargo')?.value;
    if (forma) rows = rows.filter(r => String(r["_forma"] || '').trim() === forma);
    if (sexo) rows = rows.filter(r => String(r["2. Sexo"] || '').trim() === sexo);
    if (area) rows = rows.filter(r => String(r["Unidad de Análisis"] || '').trim() === area);
    if (cargo) rows = rows.filter(r => String(r["14. Tipo de cargo"] || '').trim() === cargo);

    const advMap = [
        { id: 'dfEstadoCivil', col: '4. Estado civil' },
        { id: 'dfNivelEstudios', col: '5. Nivel estudios' },
        { id: 'dfEstrato', col: '8. Estrato' },
        { id: 'dfTipoVivienda', col: '9. Tipo vivienda' },
        { id: 'dfAntiguedadEmp', col: '12. Antigüedad en la empresa' },
        { id: 'dfAntiguedadCargo', col: '15. Antigüedad en el cargo' },
        { id: 'dfTipoContrato', col: '17. Tipo de contrato' },
        { id: 'dfHorasDiarias', col: '18. Horas diarias de trabajo' },
        { id: 'dfTipoSalario', col: '19. Tipo de salario' },
        { id: 'dfNivelCargo', col: 'Nivel de cargo del trabajador' },
        { id: 'dfAreaTrabajo', col: '16. Área donde trabaja' },
        { id: 'dfCiudadRes', col: '7. Lugar de residencia: Ciudad' },
        { id: 'dfDptoRes', col: '7. Lugar de residencia: Departamento' },
        { id: 'dfCiudadTrab', col: '11. Lugar de trabajo: Ciudad' },
        { id: 'dfDptoTrab', col: '11. Lugar de trabajo: Departamento' }
    ];
    for (const f of advMap) {
        const val = document.getElementById(f.id)?.value;
        if (val) rows = rows.filter(r => String(r[f.col] || '').trim() === val);
    }

    return rows;
}

function aplicarFiltrosDashboard() {
    closeDrillModal();
    const filtered = getFilteredRows();
    const s = state.bateriaActiva ? computeSummary(filtered) : null;
    if (s) renderChartsDashboard(filtered, s);
    if (s) renderDetailTable(filtered, s);
}

function limpiarFiltrosDashboard() {
    const ids = ['dfForma','dfSexo','dfArea','dfCargo','dfBusqueda',
        'dfEstadoCivil','dfNivelEstudios','dfEstrato','dfTipoVivienda',
        'dfAntiguedadEmp','dfAntiguedadCargo','dfTipoContrato',
        'dfHorasDiarias','dfTipoSalario','dfNivelCargo','dfAreaTrabajo',
        'dfCiudadRes','dfDptoRes','dfCiudadTrab','dfDptoTrab'];
    ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
    });
    aplicarFiltrosDashboard();
}

function renderChartsDashboard(rows, summary) {
    if (!summary) return;

    const intraDist = summary.intraGeneral || {};
    const extraDist = summary.extraGeneral || {};
    const stressDist = summary.stress || {};

    renderClickableBarChart('intraBars', intraDist);
    renderClickableBarChart('extraBars', extraDist);
    renderClickableBarChart('stressBars', stressDist);
}

function renderDonutChart(canvasId, dist, centerPct, centerColor, centerCount) {
    destroyChart(canvasId);
    const ctx = getChartCtx(canvasId);
    if (!ctx) return;
    const keys = orderRiskKeys(dist);
    if (keys.length === 0) return;
    const values = keys.map(k => dist[k] || 0);
    const colors = keys.map(k => riskColor(k).bg);

    const centerPlugin = {
        id: 'centerText',
        afterDraw(chart) {
            const { ctx, chartArea: { left, top, right, bottom } } = chart;
            const cx = (left + right) / 2;
            const cy = (top + bottom) / 2;
            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = 'bold 26px "Segoe UI", sans-serif';
            ctx.fillStyle = centerColor || '#ef4444';
            ctx.fillText((centerCount || 0) + '', cx, cy - 14);
            ctx.font = 'bold 18px "Segoe UI", sans-serif';
            ctx.fillStyle = centerColor || '#ef4444';
            ctx.fillText((centerPct || 0) + '%', cx, cy + 10);
            ctx.font = '9px "Segoe UI", sans-serif';
            ctx.fillStyle = '#64748b';
            ctx.fillText('CR\u00cdTICO', cx, cy + 28);
            ctx.restore();
        }
    };

    state.charts[canvasId] = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: keys,
            datasets: [{
                data: values,
                backgroundColor: colors,
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            cutout: '72%',
            plugins: {
                legend: {
                    display: false
                },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            const label = context.label || '';
                            const value = context.parsed || 0;
                            const total = context.dataset.data.reduce((a, b) => a + b, 0);
                            const pct = total ? Math.round((value / total) * 100) : 0;
                            return label + ': ' + value + ' (' + pct + '%)';
                        }
                    }
                }
            }
        },
        plugins: [centerPlugin]
    });
}

function renderClickableBarChart(canvasId, dist) {
    destroyChart(canvasId);
    const ctx = getChartCtx(canvasId);
    if (!ctx) return;
    const keys = orderRiskKeys(dist);
    if (keys.length === 0) return;
    const total = keys.reduce((s, k) => s + (dist[k] || 0), 0);
    const values = keys.map(k => dist[k] || 0);
    const pcts = keys.map(k => total ? Math.round((dist[k] / total) * 100) : 0);
    const colors = keys.map(k => riskColor(k).bg);
    const borders = keys.map(k => riskColor(k).text);

    state.charts[canvasId] = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: keys.map((k, i) => `${k} (${pcts[i]}%)`),
            datasets: [{
                data: values,
                backgroundColor: colors,
                borderColor: borders,
                borderWidth: 1,
                borderRadius: 4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            indexAxis: 'y',
            scales: {
                x: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 10 } } },
                y: { ticks: { font: { size: 10 } } }
            },
            plugins: { legend: { display: false } }
        }
    });

function renderDetailTable(rows, summary) {
    const container = document.getElementById('detailTable');
    if (!summary) { container.innerHTML = ''; return; }
    const total = rows.length;

    const intraDims = summary.dimensions.filter(d => !d.name.startsWith('[Extra]') && !d.name.startsWith('[Global]'));
    const globalDims = summary.dimensions.filter(d => d.name.startsWith('[Global]'));
    const extraDims = summary.dimensions.filter(d => d.name.startsWith('[Extra]'));
    const stressDist = summary.stress || {};

    const sortDims = (dims) => {
        if (state._detailSortDir === undefined) state._detailSortDir = 'desc';
        return [...dims].filter(d => d.risk).sort((a, b) => {
            const aPct = total ? (((a.risk["Riesgo alto"]||0)+(a.risk["Riesgo muy alto"]||0))/total)*100 : 0;
            const bPct = total ? (((b.risk["Riesgo alto"]||0)+(b.risk["Riesgo muy alto"]||0))/total)*100 : 0;
            return state._detailSortDir === 'desc' ? bPct - aPct : aPct - bPct;
        });
    };

    const buildRow = (dim) => {
        if (!dim.risk) return '';
        const pctAlto = total ? Math.round((((dim.risk["Riesgo alto"]||0)+(dim.risk["Riesgo muy alto"]||0))/total)*100) : 0;
        const rowBg = pctAlto >= 85 ? '#f87171' : pctAlto >= 70 ? '#fca5a5' : pctAlto >= 50 ? '#fed7aa' : pctAlto >= 30 ? '#fef08a' : '#bbf7d0';
        const displayName = dim.name.replace('[Global] ', '').replace('[Extra] ', '');
        let r = `<tr style="background:${rowBg};"><td><strong>${displayName}</strong></td>`;
        for (const k of RISK_ORDER) {
            const v = dim.risk[k] || 0;
            const pct = total ? Math.round((v/total)*100) : 0;
            r += `<td>${v} <span style="color:#64748b;font-size:11px;">(${pct}%)</span></td>`;
        }
        const badgeClass = pctAlto >= 85 ? 'risk-rma' : pctAlto >= 70 ? 'risk-ra' : pctAlto >= 50 ? 'risk-rm' : pctAlto >= 30 ? 'risk-rb' : 'risk-sr';
        r += `<td style="text-align:center;"><span class="badge ${badgeClass}" style="font-size:14px;padding:4px 16px;font-weight:700;">${pctAlto}%</span></td></tr>`;
        return r;
    };

    const sortIcon = state._detailSortDir === 'desc' ? '\u25BC' : '\u25B2';

    const buildTable = (title, dims) => {
        if (dims.length === 0) return '';
        let h = `<div class="card" style="margin-top:12px;"><h3>${title}</h3><div class="table-wrap"><table>
            <thead><tr><th>Dimensi\u00f3n</th>${RISK_ORDER.map(r => `<th>${r}</th>`).join('')}<th style="text-align:center;cursor:pointer;" onclick="toggleDetailSort()">Riesgo Cr\u00edtico ${sortIcon}</th></tr></thead><tbody>`;
        for (const dim of sortDims(dims)) h += buildRow(dim);
        h += '</tbody></table></div></div>';
        return h;
    };

    let html = '';
    html += buildTable('Intralaboral', intraDims);
    html += buildTable('Extralaboral', extraDims);

    const stressKeys = orderRiskKeys(stressDist);
    if (stressKeys.length > 0) {
        html += `<div class="card" style="margin-top:12px;"><h3>Estr\u00e9s</h3><div class="table-wrap"><table>
            <thead><tr><th>Nivel</th><th>Personas</th><th>Porcentaje</th></tr></thead><tbody>`;
        for (const k of stressKeys) {
            const v = stressDist[k] || 0;
            const pct = total ? Math.round((v/total)*100) : 0;
            const rc = riskColor(k);
            const rowBg = pct >= 30 ? '#fca5a5' : pct >= 15 ? '#fed7aa' : pct >= 5 ? '#fef08a' : '#bbf7d0';
            html += `<tr style="background:${rowBg};"><td><span class="badge ${rc.cls}">${k}</span></td><td><strong>${v}</strong></td><td><strong>${pct}%</strong></td></tr>`;
        }
        html += '</tbody></table></div></div>';
    }

    container.innerHTML = html;
}

function rebuildDimensionOptions(type) {
    const dimSel = document.getElementById('mfDimension');
    if (!dimSel) return;
    const domain = document.getElementById('mfDominio')?.value || '';
    const currentVal = dimSel.value;
    dimSel.innerHTML = '<option value="">Dimensi\u00f3n: Todas</option>';
    let availDims = [];
    if (type === 'intra') {
        availDims = (state._drillSummary.dimensions || [])
            .filter(d => !d.name.startsWith('[Extra]') && !d.name.startsWith('[Global]'));
        if (domain) {
            const domainDims = DOMAIN_DIMS[domain] || [];
            availDims = availDims.filter(d => domainDims.includes(d.name));
        }
        availDims = availDims.map(d => d.name);
    } else {
        availDims = (state._drillSummary.dimensions || [])
            .filter(d => d.name.startsWith('[Extra]'))
            .map(d => d.name.replace('[Extra] ', ''));
    }
    availDims.sort().forEach(d => {
        const opt = document.createElement('option');
        opt.value = d; opt.textContent = d;
        dimSel.appendChild(opt);
    });
    if (currentVal) {
        // restore if still valid
        if (Array.from(dimSel.options).some(o => o.value === currentVal)) {
            dimSel.value = currentVal;
        }
    }
}

let compBatteryIdCounter = 0;

function procesarComparativa(file) {
    mostrarStatus('compStatus', 'Leyendo archivo...', 'info');
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const result = procesarExcel(new Uint8Array(e.target.result), file.name);
            if (!result.rows || result.rows.length === 0) {
                mostrarStatus('compStatus', 'No se encontraron datos en las hojas esperadas.', 'error');
                return;
            }
            const id = ++compBatteryIdCounter;
            result.meta.id = id;
            state.bateriasComparativa.push(result);
            mostrarStatus('compStatus', '✔ ' + result.meta.fileName + ' (' + result.meta.totalRows + ' registros) agregada.', 'success');
            renderBatteryList();
            actualizarComparativa();
        } catch(err) {
            mostrarStatus('compStatus', 'Error: ' + err.message, 'error');
            console.error(err);
        }
    };
    reader.readAsArrayBuffer(file);
}

        return `<div class="battery-item">
            <input type="checkbox" class="comp-check" data-id="${b.meta.id}" checked onchange="actualizarComparativa()">
            <div class="info">
                <div class="name">${b.meta.fileName}</div>
                <div class="meta">Forma ${b.meta.forma} · ${b.meta.totalRows} registros</div>
            </div>
            <div class="actions">
                <button class="btn-remove" onclick="eliminarBateria(${b.meta.id})" title="Eliminar">✕</button>
            </div>
        </div>`;
    }).join('');
}

function eliminarBateria(id) {
    state.bateriasComparativa = state.bateriasComparativa.filter(b => b.meta.id !== id);
    renderBatteryList();
    actualizarComparativa();
}

function limpiarComparativa() {
    state.bateriasComparativa = [];
    renderBatteryList();
    actualizarComparativa();
    document.getElementById('compStatus').style.display = 'none';
}

function getSelectedBaterias() {
    const checkboxes = document.querySelectorAll('.comp-check:checked');
    const ids = Array.from(checkboxes).map(cb => parseInt(cb.dataset.id));
    return state.bateriasComparativa.filter(b => ids.includes(b.meta.id));
}

function actualizarComparativa() {
    const selected = getSelectedBaterias();
    const container = document.getElementById('compContent');
    const hint = document.getElementById('compHint');

    if (selected.length < 2) {
        container.style.display = 'none';
        if (hint) hint.textContent = selected.length === 1 ? 'Selecciona al menos una batería más para comparar.' : 'Selecciona al menos 2 baterías para ver la comparativa.';
        return;
    }
    container.style.display = 'block';
    if (hint) hint.textContent = 'Comparando ' + selected.length + ' baterías.';

    renderGroupedBars(selected);
    renderRadarCompare(selected);
    renderHeatmap(selected);
    renderComparisonTable(selected);
}

function renderGroupedBars(baterias) {
    destroyChart('groupedBars');
    const ctx = getChartCtx('groupedBars');
    if (!ctx) return;

    const riskKey = baterias[0].summary.intraGeneral ? 'intraGeneral' : null;
    if (!riskKey) return;
    const allRiskKeys = new Set();
    baterias.forEach(b => { Object.keys(b.summary[riskKey]||{}).forEach(k => allRiskKeys.add(k)); });
    const riskLabels = RISK_ORDER.filter(r => allRiskKeys.has(r));
    if (riskLabels.length === 0) return;

    const datasets = baterias.map((b, i) => ({
        label: b.meta.fileName.length > 20 ? b.meta.fileName.slice(0, 17) + '...' : b.meta.fileName,
        data: riskLabels.map(r => {
            const total = b.meta.totalRows;
            const val = (b.summary[riskKey] && b.summary[riskKey][r]) || 0;
            return total ? Math.round((val / total) * 100 * 10) / 10 : 0;
        }),
        backgroundColor: CHART_COLORS[i % CHART_COLORS.length] + 'cc',
        borderColor: CHART_COLORS[i % CHART_COLORS.length],
        borderWidth: 1,
        borderRadius: 3
    }));

    state.charts['groupedBars'] = new Chart(ctx, {
        type: 'bar',
        data: { labels: riskLabels, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            scales: {
                x: { ticks: { font: { size: 10 } } },
                y: { beginAtZero: true, max: 100, ticks: { font: { size: 10 }, callback: v => v + '%' } }
            },
            plugins: {
                legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 12, padding: 10 } },
                tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y + '%' } }
            }
        }
    });
}

function renderRadarCompare(baterias) {
    destroyChart('radarCompare');
    const ctx = getChartCtx('radarCompare');
    if (!ctx) return;

    const dims = baterias[0].summary.dimensions.filter(d => d.avgT !== null && !d.name.startsWith('[Global]') && !d.name.startsWith('[Extra]'));
    if (dims.length === 0) return;

    const labels = dims.map(d => d.name.length > 22 ? d.name.slice(0, 20) + '..' : d.name);
    const datasets = baterias.map((b, i) => ({
        label: b.meta.fileName.length > 20 ? b.meta.fileName.slice(0, 17) + '...' : b.meta.fileName,
        data: dims.map(d => {
            const match = b.summary.dimensions.find(dd => dd.name === d.name);
            return match ? (match.avgT || 0) : 0;
        }),
        backgroundColor: CHART_COLORS[i % CHART_COLORS.length] + '22',
        borderColor: CHART_COLORS[i % CHART_COLORS.length],
        pointBackgroundColor: CHART_COLORS[i % CHART_COLORS.length],
        pointRadius: 3,
        borderWidth: 2
    }));

    state.charts['radarCompare'] = new Chart(ctx, {
        type: 'radar',
        data: { labels, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            scales: {
                r: {
                    beginAtZero: true, max: 100,
                    ticks: { stepSize: 20, font: { size: 8 }, backdropColor: 'transparent' },
                    grid: { color: 'rgba(0,0,0,0.06)' },
                    angleLines: { color: 'rgba(0,0,0,0.06)' },
                    pointLabels: { font: { size: 8 } }
                }
            },
            plugins: {
                legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 12, padding: 10 } }
            }
        }
    });
}

function renderHeatmap(baterias) {
    const container = document.getElementById('heatmapContainer');
    const dims = baterias[0].summary.dimensions.filter(d => d.risk && Object.keys(d.risk).length > 0);
    if (dims.length === 0) { container.innerHTML = '<p style="color:#94a3b8;">Sin datos suficientes</p>'; return; }

    const selected = baterias.map(b => b.meta.id);
    const selectedBaterias = baterias;

    const headerHtml = '<div style="display:grid;grid-template-columns:200px repeat(' + selectedBaterias.length + ',1fr);gap:2px;margin-bottom:4px;font-weight:600;font-size:12px;color:#475569;">' +
        '<div class="hm-label">Dimensión</div>' +
        selectedBaterias.map(b => '<div style="text-align:center;padding:4px;">' + (b.meta.fileName.length > 18 ? b.meta.fileName.slice(0,15)+'..' : b.meta.fileName) + '</div>').join('') +
        '</div>';

    const rows = dims.map(dim => {
        const cells = selectedBaterias.map(b => {
            const match = b.summary.dimensions.find(dd => dd.name === dim.name);
            const riskDist = match ? match.risk : {};
            const dominantRisk = orderRiskKeys(riskDist).reduce((a, b) => (riskDist[a]||0) > (riskDist[b]||0) ? a : b, '');
            const rc = riskColor(dominantRisk);
            return '<div class="hm-cell ' + (rc ? rc.cls : 'risk-error') + '">' + (dominantRisk || '-') + '</div>';
        }).join('');
        return '<div style="display:grid;grid-template-columns:200px repeat(' + selectedBaterias.length + ',1fr);gap:2px;">' +
            '<div class="hm-label">' + (dim.name.length > 40 ? dim.name.slice(0,37)+'...' : dim.name) + '</div>' + cells + '</div>';
    }).join('');

    container.innerHTML = headerHtml + rows;
}

function renderComparisonTable(baterias) {
    const container = document.getElementById('comparisonTable');
    const dims = baterias[0].summary.dimensions.filter(d => d.risk && Object.keys(d.risk).length > 0);
    if (dims.length === 0) { container.innerHTML = '<p style="color:#94a3b8;">Sin datos</p>'; return; }

    let html = '<div class="table-wrap"><table><thead><tr><th>Dimensión</th>';
    baterias.forEach(b => {
        html += `<th>${b.meta.fileName.length > 20 ? b.meta.fileName.slice(0,17)+'..' : b.meta.fileName}</th>`;
    });
    html += '</tr></thead><tbody>';

    for (const dim of dims) {
        html += `<tr><td><strong>${dim.name.length > 50 ? dim.name.slice(0,47)+'...' : dim.name}</strong></td>`;
        for (const b of baterias) {
            const match = b.summary.dimensions.find(dd => dd.name === dim.name);
            const tVal = match && match.avgT !== null ? match.avgT : '-';
            const riskDist = match ? match.risk : {};
            const dominantRisk = orderRiskKeys(riskDist).reduce((a, b) => (riskDist[a]||0) > (riskDist[b]||0) ? a : b, '-');
            const rc = riskColor(dominantRisk);
            html += `<td><span class="badge ${rc ? rc.cls : 'risk-error'}">${dominantRisk}</span> <span style="color:#64748b;font-size:12px;">${tVal !== '-' ? 'T:'+tVal : ''}</span></td>`;
        }
        html += '</tr>';
    }
    html += '</tbody></table></div>';
    container.innerHTML = html;
}

// ============================================================
// INIT - drag & drop support
// ============================================================
document.querySelectorAll('.upload-area').forEach(zone => {
    const input = zone.querySelector('input[type="file"]');
    if (!input) return;

    zone.addEventListener('click', () => input.click());

    zone.addEventListener('dragover', e => {
        e.preventDefault();
        zone.classList.add('drag-over');
    });
    zone.addEventListener('dragleave', e => {
        zone.classList.remove('drag-over');
    });
    zone.addEventListener('drop', function(e) {
        e.preventDefault();
        zone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (!file) return;
        const dt = new DataTransfer();
        dt.items.add(file);
        input.files = dt.files;
        input.dispatchEvent(new Event('change'));
    });
});
</script>
