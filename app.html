<script>
// ============================================================
// STATE
// ============================================================
const RISK_COLORS = {
    "Sin riesgo":        { bg: "#bbf7d0", text: "#166534", cls: "risk-sr" },
    "Riesgo bajo":       { bg: "#fef08a", text: "#854d0e", cls: "risk-rb" },
    "Riesgo medio":      { bg: "#fed7aa", text: "#9a3412", cls: "risk-rm" },
    "Riesgo alto":       { bg: "#fca5a5", text: "#991b1b", cls: "risk-ra" },
    "Riesgo muy alto":   { bg: "#f87171", text: "#7f1d1d", cls: "risk-rma" },
    "Riesgo muy bajo":   { bg: "#dbeafe", text: "#1e40af", cls: "risk-mb" },
    "Dato perdido":      { bg: "#e2e8f0", text: "#94a3b8", cls: "risk-error" },
    "ERROR":             { bg: "#e2e8f0", text: "#475569", cls: "risk-error" }
};
const RISK_ORDER = ["Sin riesgo","Riesgo bajo","Riesgo medio","Riesgo alto","Riesgo muy alto"];
const STRESS_ORDER = ["Sin riesgo","Riesgo medio","Riesgo alto","Riesgo muy alto"];
const CHART_COLORS = [
    "#1a73e8","#34a853","#fbbc04","#ea4335","#8e24aa",
    "#00acc1","#ff7043","#9ccc65","#ab47bc","#26a69a"
];

const state = {
    bateriaActiva: null,
    bateriasComparativa: [],
    charts: {},
    _drillBatteryData: null,
    _drillComparativaBaterias: null,
    _drillRows: null,
    _drillSummary: null,
    _drillType: null,
    _viewMode: 'table',
    _detailSortDir: 1,
    _sortDir: 1,
    _compSortCol: null,
    _compSortDir: 1,
    _compViewMode: 'cards'
};

function destroyChart(key) {
    if (state.charts[key]) { state.charts[key].destroy(); delete state.charts[key]; }
}

function getChartCtx(id) {
    const el = document.getElementById(id);
    if (!el) return null;
    return el.getContext('2d');
}

// ============================================================
// TAB SWITCHING
// ============================================================
const tabLabels = {
    inicio: 'Inicio',
    baterias: 'Baterías',
    dashboard: 'Dashboard',
    comparativa: 'Comparativa',
    reportes: 'Reportes'
};

document.querySelectorAll('.side-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        const tab = this.dataset.tab;
        document.getElementById('tab-' + tab).classList.add('active');
        document.getElementById('topbarTitle').textContent = tabLabels[tab] || tab;
        if (tab === 'dashboard' && state.bateriaActiva) {
            document.getElementById('topbarBadge').style.display = 'inline';
            document.getElementById('topbarBadge').textContent = state.bateriaActiva.meta.fileName + ' (' + state.bateriaActiva.meta.totalRows + ' reg.)';
            document.getElementById('btnExport').style.display = 'inline-flex';
            // Re-render dashboard content when tab becomes visible (fixes chart rendering)
            setTimeout(() => {
                const dashEl = document.getElementById('dashContent');
                if (dashEl && dashEl.style.display !== 'none') {
                    const filtered = getFilteredRows();
                    const s = state.bateriaActiva ? computeSummary(filtered) : null;
                    if (s) renderChartsDashboard(filtered, s);
                }
            }, 200);
        } else if (tab === 'inicio') {
            document.getElementById('topbarBadge').style.display = 'none';
            document.getElementById('btnExport').style.display = 'none';
        } else if (tab === 'baterias') {
            document.getElementById('topbarBadge').style.display = 'none';
            document.getElementById('btnExport').style.display = 'none';
            renderBaterias();
        } else if (tab === 'reportes') {
            document.getElementById('topbarBadge').style.display = 'none';
            document.getElementById('btnExport').style.display = 'none';
            const noData = document.getElementById('reportNoData');
            const content = document.getElementById('reportContent');
            const info = document.getElementById('reportFileInfo');
            if (state.bateriaActiva) {
                noData.style.display = 'none';
                content.style.display = 'block';
                info.textContent = 'Datos: ' + state.bateriaActiva.meta.fileName + ' (' + state.bateriaActiva.meta.totalRows + ' registros)';
            } else {
                noData.style.display = 'block';
                content.style.display = 'none';
            }
        } else {
            document.getElementById('topbarBadge').style.display = 'none';
            document.getElementById('btnExport').style.display = 'none';
        }
    });
});

function irADashboard() {
    const btn = document.querySelector('.side-btn[data-tab="dashboard"]');
    if (btn) btn.click();
}

// ============================================================
// UTILITIES
// ============================================================
function riskColor(riskLevel) {
    return RISK_COLORS[riskLevel] || RISK_COLORS["ERROR"];
}

function getRiskClass(val) {
    const c = riskColor(val);
    return c ? c.cls : 'risk-error';
}

function orderRiskKeys(dist) {
    const keys = Object.keys(dist);
    // Check which order has more matches
    const nStress = STRESS_ORDER.filter(k => keys.includes(k)).length;
    const nRegular = RISK_ORDER.filter(k => keys.includes(k)).length;
    if (nStress > nRegular && nStress > 0) {
        return STRESS_ORDER.filter(k => keys.includes(k));
    }
    if (nRegular > 0) {
        return RISK_ORDER.filter(k => keys.includes(k));
    }
    return keys;
}

function toTitleCase(str) {
    const keepLower = ['de','del','la','las','lo','los','el','ella','ellos','y','e','o','a','en','con','por','para','sin','sobre','entre','desde','hasta','al','un','una','su','sus'];
    return str.split(' ').map((word, i) => {
        const w = word.toLowerCase();
        if (i > 0 && keepLower.includes(w)) return w;
        return w.charAt(0).toUpperCase() + w.slice(1);
    }).join(' ');
}

function getFilterOptions(rows, col) {
    const set = new Set();
    for (const r of rows) {
        const v = r[col];
        if (v !== undefined && v !== null && v !== "") set.add(String(v).trim());
    }
    return Array.from(set).sort();
}

function populateFilter(selectId, col, rows) {
    const sel = document.getElementById(selectId);
    if (!sel) return;
    const current = sel.value;
    sel.innerHTML = '<option value="">Todos</option>';
    const opts = getFilterOptions(rows, col);
    opts.forEach(o => {
        const opt = document.createElement('option');
        opt.value = o; opt.textContent = o;
        sel.appendChild(opt);
    });
    if (current) sel.value = current;
}

// ============================================================
// DASHBOARD
// ============================================================
const inicioFile = document.getElementById('inicioFile');
if (inicioFile) {
    inicioFile.addEventListener('change', function(e) {
        console.log('File selected', e.target.files[0]);
        const file = e.target.files[0];
        if (!file) return;
        procesarDashboard(file);

}
document.getElementById('bateriasFile').addEventListener('change', function(e) {

    if (!file) return;
    mostrarModalGuardar(file);

});

if (compFileEl) {
compFileEl.addEventListener('change', function(e) {

    if (files.length === 0) return;
    files.forEach((file, index) => {
        setTimeout(() => procesarComparativa(file), index * 500);
    });

}

function mostrarStatus(id, msg, tipo) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = msg;
    el.className = 'status-msg ' + tipo;
    el.style.display = 'block';
}

function showLoadingModal(msg) {
    const overlay = document.getElementById('loadingModal');
    const text = document.getElementById('loadingText');
    if (text && msg) text.textContent = msg;
    if (overlay) overlay.style.display = 'flex';
}

function hideLoadingModal() {
    const overlay = document.getElementById('loadingModal');
    if (overlay) overlay.style.display = 'none';
}

function procesarDashboard(file) {
    console.log('Processing dashboard file:', file.name);
    showLoadingModal('Leyendo y procesando archivo...');
    mostrarStatus('inicioStatus', 'Leyendo archivo...', 'info');
    const inicioSuccess = document.getElementById('inicioSuccess');
    if (inicioSuccess) inicioSuccess.style.display = 'none';
    const inicioFile = document.getElementById('inicioFile');
    if (inicioFile) inicioFile.value = '';
    
    const reader = new FileReader();
    reader.onload = function(e) {
        console.log('File read complete');
        try {
            const result = procesarExcel(new Uint8Array(e.target.result), file.name);
            console.log('Excel processed, result:', result);
            console.log('Excel processed, rows:', result.rows?.length);

            if (!result.rows || result.rows.length === 0) {
                hideLoadingModal();
                mostrarStatus('inicioStatus', 'No se encontraron datos en las hojas esperadas (FORMA B digitacion / FORMA A Digitacion). Asegúrate de que los nombres de las hojas sean correctos.', 'error');
                console.error('procesarExcel returned no rows.');
                return;
            }

            state.bateriaActiva = result;
            hideLoadingModal();
            mostrarStatus('inicioStatus', '✔ ' + result.meta.fileName + ' — ' + result.meta.totalRows + ' registros (Forma ' + result.meta.forma + ')', 'success');

            const inicioSuccess = document.getElementById('inicioSuccess');
            if (inicioSuccess) inicioSuccess.style.display = 'block';

            const topbarBadge = document.getElementById('topbarBadge');
            if (topbarBadge) {
                topbarBadge.style.display = 'inline';
                topbarBadge.textContent = result.meta.fileName + ' (' + result.meta.totalRows + ' reg.)';
            }

            console.log('Calling renderDashboard');
            renderDashboard();

            // Switch to dashboard tab automatically
            setTimeout(() => {
                irADashboard();
            }, 1500);
        } catch(err) {
            hideLoadingModal();
            console.error('Error processing:', err);
            mostrarStatus('inicioStatus', 'Error al procesar: ' + err.message, 'error');
        }
    };
    reader.onerror = function(err) {
        hideLoadingModal();
        console.error('FileReader error:', err);
        mostrarStatus('inicioStatus', 'Error al leer el archivo', 'error');
    };
    reader.readAsArrayBuffer(file);
}

// ── BATERÍAS: modal para guardar (nombre + año) ──
let _pendingFile = null;

function mostrarModalGuardar(file) {
    _pendingFile = file;
    const baseName = file.name.replace(/\.xlsx?$/i, '') || 'Bateria';
    const currentYear = new Date().getFullYear();

    const modal = document.createElement('div');
    modal.id = 'modalGuardarBateria';
    modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:6000;display:flex;align-items:center;justify-content:center;';
    modal.onclick = function(e) { if (e.target === modal) modal.remove(); };

    let yearOpts = '';
    for (let y = currentYear + 1; y >= currentYear - 5; y--) {
        yearOpts += '<option value="' + y + '"' + (y === currentYear ? ' selected' : '') + '>' + y + '</option>';
    }

    modal.innerHTML =
        '<div style="background:white;border-radius:16px;padding:32px;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3);">' +
            '<h3 style="margin:0 0 20px;color:#14532d;font-size:20px;">Guardar batería</h3>' +
            '<label style="display:block;font-weight:600;font-size:13px;color:#374151;margin-bottom:6px;">Nombre</label>' +
            '<input id="modalNombreBateria" type="text" value="' + baseName + '" style="width:100%;padding:10px 14px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;margin-bottom:16px;box-sizing:border-box;">' +
            '<label style="display:block;font-weight:600;font-size:13px;color:#374151;margin-bottom:6px;">Año</label>' +
            '<select id="modalAnioBateria" style="width:100%;padding:10px 14px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;margin-bottom:24px;box-sizing:border-box;">' + yearOpts + '</select>' +
            '<div style="display:flex;gap:10px;">' +
                '<button onclick="confirmarGuardarBateria()" style="flex:1;padding:12px;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;">Guardar</button>' +
                '<button onclick="cerrarModalGuardar()" style="padding:12px 20px;background:#f1f5f9;color:#64748b;border:none;border-radius:8px;font-size:14px;cursor:pointer;">Cancelar</button>' +
            '</div>' +
        '</div>';

    document.body.appendChild(modal);
    setTimeout(() => document.getElementById('modalNombreBateria')?.select(), 100);
}

function cerrarModalGuardar() {
    document.getElementById('modalGuardarBateria')?.remove();
    _pendingFile = null;
}

function confirmarGuardarBateria() {
    const file = _pendingFile;
    if (!file) return;
    const nombre = document.getElementById('modalNombreBateria')?.value?.trim();
    const anio = document.getElementById('modalAnioBateria')?.value;
    if (!nombre) { alert('Escribe un nombre'); return; }
    cerrarModalGuardar();
    uploadBateria(file, nombre, anio);
}

function uploadBateria(file, nombre, anio) {
    showLoadingModal('Guardando batería en Drive...');
    mostrarStatus('bateriasStatus', 'Procesando archivo...', 'info');
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const arrayBuffer = e.target.result;
            const result = procesarExcel(new Uint8Array(arrayBuffer), file.name);
            if (!result.rows || result.rows.length === 0) {
                hideLoadingModal();
                mostrarStatus('bateriasStatus', 'No se encontraron datos en las hojas esperadas.', 'error');
                return;
            }

            const bytes = new Uint8Array(arrayBuffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
            const excelBase64 = btoa(binary);

            const s = result.summary;
            const total = s.total || 1;
            const intraP = Math.round((((s.intraGeneral?.["Riesgo alto"]||0)+(s.intraGeneral?.["Riesgo muy alto"]||0))/total)*100);
            const extraP = Math.round((((s.extraGeneral?.["Riesgo alto"]||0)+(s.extraGeneral?.["Riesgo muy alto"]||0))/total)*100);
            const stressP = Math.round((((s.stress?.["Riesgo alto"]||0)+(s.stress?.["Riesgo muy alto"]||0))/total)*100);
            const psicoPct = Math.round((intraP + extraP + stressP) / 3);
            const metadata = { total: s.total, forma: result.meta.forma, intraP, extraP, stressP, psicoPct };

            google.script.run
                .withSuccessHandler(function(entry) {
                    hideLoadingModal();
                    mostrarStatus('bateriasStatus', '✔ ' + nombre + ' guardada en Drive (' + entry.total + ' registros)', 'success');
                    renderBaterias();
                })
                .withFailureHandler(function(err) {
                    hideLoadingModal();
                    const msg = err.message.includes('permissions') || err.message.includes('permisos') || err.message.includes('insufficient') ?
                        'Permisos insuficientes. Ve a la pestaña Baterías y haz clic en "Autorizar Drive".' :
                        'Error al guardar: ' + err.message;
                    mostrarStatus('bateriasStatus', msg, 'error');
                    console.error(err);
                })
                .guardarBateria(excelBase64, nombre, anio, metadata);
        } catch(err) {
            hideLoadingModal();
            mostrarStatus('bateriasStatus', 'Error al procesar: ' + err.message, 'error');
            console.error(err);
        }
    };
    reader.readAsArrayBuffer(file);
}

// ── BATERÍAS: renderizar lista ──

    const folderCfg = document.getElementById('bateriasFolderConfig');
    const uploadGroup = document.getElementById('bateriasUploadGroup');

    if (status) status.style.display = 'none';
    folderCfg.innerHTML = '';
    if (uploadGroup) uploadGroup.style.display = 'none';

    // First check folder config
    google.script.run
        .withSuccessHandler(function(folderInfo) {
            if (!folderInfo) {
                // No folder configured - show config form
                grid.innerHTML = '';
                folderCfg.innerHTML =
                    '<div class="card" style="padding:32px;text-align:center;max-width:500px;margin:0 auto;">' +
                        '<p style="font-size:48px;margin-bottom:12px;">📁</p>' +
                        '<h3 style="color:#14532d;margin-bottom:8px;">Configurar carpeta de Drive</h3>' +
                        '<p style="color:#64748b;font-size:13px;margin-bottom:16px;line-height:1.5;">' +
                            'Crea una carpeta en Drive, compártela con tu equipo y pega aquí el ID.</p>' +
                        '<input id="folderIdInput" type="text" placeholder="Pega el ID de la carpeta aquí" style="width:100%;padding:10px 14px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;margin-bottom:12px;box-sizing:border-box;">' +
                        '<div style="font-size:11px;color:#94a3b8;margin-bottom:12px;">' +
                            'El ID está en la URL: <code style="background:#f1f5f9;padding:2px 6px;border-radius:4px;">drive.google.com/drive/folders/<strong>ABC123...</strong></code>' +
                        '</div>' +
                        '<button onclick="guardarFolderId()" style="padding:10px 28px;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;">Guardar carpeta</button>' +
                    '</div>';
                return;
            }
            // Folder is configured - show upload area and battery list
            folderCfg.innerHTML =
                '<div style="display:flex;align-items:center;justify-content:space-between;background:white;border-radius:10px;border:1px solid #e2e8f0;padding:10px 16px;">' +
                    '<div style="display:flex;align-items:center;gap:8px;">' +
                        '<span style="font-size:20px;">📁</span>' +
                        '<span style="font-weight:600;color:#14532d;">' + folderInfo.name + '</span>' +
                        '<a href="' + folderInfo.url + '" target="_blank" style="font-size:11px;color:#16a34a;text-decoration:none;">↗ Abrir en Drive</a>' +
                    '</div>' +
                    '<button onclick="cambiarCarpeta()" style="padding:6px 14px;background:transparent;border:1px solid #cbd5e1;border-radius:6px;font-size:12px;color:#64748b;cursor:pointer;">Cambiar carpeta</button>' +
                '</div>';

            if (uploadGroup) uploadGroup.style.display = 'flex';

            // Load battery list
            google.script.run
                .withSuccessHandler(function(lista) {
                    _bateriasData = lista || [];
                    renderBateriasGrid();
                })
                .withFailureHandler(function(err) {
                    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#ef4444;">Error: ' + err.message + '</div>';
                })
                .listarBaterias();
        })
        .withFailureHandler(function(err) {
            grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;">' +
                '<p style="font-size:48px;margin-bottom:12px;">🔐</p>' +
                '<h3 style="color:#ef4444;margin-bottom:8px;">Permisos de Drive requeridos</h3>' +
                '<button onclick="autorizarYRecargar()" style="padding:12px 28px;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;">' +
                'Autorizar Drive y recargar</button>' +
                '<p style="color:#94a3b8;font-size:12px;margin-top:12px;">' + err.message + '</p></div>';
            console.error(err);
        })
        .obtenerInfoCarpeta();
}

    const folderId = input?.value?.trim();
    if (!folderId) return alert('Pega el ID de la carpeta');
    const btn = input.nextElementSibling?.tagName === 'BUTTON' ? input.nextElementSibling : null;
    google.script.run
        .withSuccessHandler(function(info) {
            renderBaterias();
        })
        .withFailureHandler(function(err) {
            alert('Error: ' + err.message + '\n\nVerifica que el ID sea correcto y que la carpeta exista.');
        })

}

function cambiarCarpeta() {

            '<h3 style="color:#14532d;margin-bottom:8px;">Cambiar carpeta</h3>' +
            '<p style="color:#64748b;font-size:13px;margin-bottom:12px;">Pega el nuevo ID de la carpeta de Drive</p>' +

    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;"><div class="spinner" style="width:32px;height:32px;border:4px solid #e2e8f0;border-top-color:#16a34a;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div><p style="color:#94a3b8;">Autorizando Drive...</p></div>';

function autorizarYRecargar() {
    const grid = document.getElementById('bateriasGrid');
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;"><div class="spinner" style="width:32px;height:32px;border:4px solid #e2e8f0;border-top-color:#16a34a;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div><p style="color:#94a3b8;">Autorizando Drive...</p></div>';

            renderBaterias();

        })

function renderBateriasGrid() {
    const grid = document.getElementById('bateriasGrid');
    const filter = document.getElementById('bateriasYearFilter');

    const years = [...new Set(_bateriasData.map(b => b.anio))].sort((a, b) => b - a);
    let selectedYear = filter.dataset.selected || (years.length > 0 ? years[0] : '');

    // Build year filter
    filter.innerHTML = '';
    years.forEach(y => {
        const btn = document.createElement('button');
        btn.textContent = y;
        btn.className = 'btn-year' + (y === selectedYear ? ' active' : '');
        btn.style.cssText = 'padding:6px 18px;border-radius:20px;border:1px solid #16a34a;font-weight:600;font-size:13px;cursor:pointer;background:' + (y === selectedYear ? '#16a34a' : 'transparent') + ';color:' + (y === selectedYear ? '#fff' : '#16a34a') + ';transition:all 0.2s;';
        btn.onclick = function() { filter.dataset.selected = y; renderBateriasGrid(); };
        filter.appendChild(btn);

// ── BATERÍAS: cargar desde Drive ──
function cargarBateriaDesdeDrive(id) {
    showLoadingModal('Cargando batería desde Drive...');
    google.script.run
        .withSuccessHandler(function(resp) {
            try {
                const binaryStr = atob(resp.base64);
                const bytes = new Uint8Array(binaryStr.length);
                for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
                const result = procesarExcel(bytes, resp.fileName);
                if (!result.rows || result.rows.length === 0) {
                    hideLoadingModal();
                    alert('El archivo no contiene datos válidos.');
                    return;
                }
                state.bateriaActiva = result;
                hideLoadingModal();
                // Switch to dashboard tab first so charts render in visible container
                irADashboard();
                setTimeout(() => renderDashboard(), 300);
            } catch(err) {
                hideLoadingModal();
                alert('Error al procesar: ' + err.message);
                console.error(err);
            }
        })
        .withFailureHandler(function(err) {
            hideLoadingModal();
            alert('Error al cargar batería: ' + err.message);
            console.error(err);
        })
        .cargarBateria(id);
}

// ── BATERÍAS: eliminar ──
function eliminarBateria(id) {
    if (!confirm('¿Eliminar esta batería?')) return;
    google.script.run
        .withSuccessHandler(function() {
            renderBaterias();
        })
        .withFailureHandler(function(err) {
            alert('Error al eliminar: ' + err.message);
        })
        .eliminarBateria(id);
}

function agregarDriveAComparativa() {
    const cbs = document.querySelectorAll('.comp-drive-cb:checked');
    const ids = Array.from(cbs).map(cb => cb.value);
    if (ids.length === 0) return;
    document.getElementById('compDriveSelector')?.remove();
    showLoadingModal('Agregando ' + ids.length + ' batería(s) a la comparativa...');

    let completed = 0;
    const total = ids.length;
    ids.forEach((id, idx) => {
        setTimeout(() => {
            google.script.run
                .withSuccessHandler(function(resp) {
                    try {
                        const binaryStr = atob(resp.base64);
                        const bytes = new Uint8Array(binaryStr.length);
                        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
                        const result = procesarExcel(bytes, resp.fileName);
                        if (!result.rows || result.rows.length === 0) return;
                        const newId = ++compBatteryIdCounter;
                        const baseName = resp.meta.nombre || resp.fileName.replace(/\.xlsx?$/i, '');
                        result.meta.id = newId;
                        result.meta.name = baseName;
                        result.meta.year = new Date().getFullYear() + '';
                        state.bateriasComparativa.push(result);
                        renderBatteryList();
                        actualizarComparativa();
                    } catch(err) {
                        mostrarStatus('compStatus', 'Error al procesar: ' + err.message, 'error');
                    }
                    completed++;
                    if (completed >= total) hideLoadingModal();
                })
                .withFailureHandler(function(err) {
                    mostrarStatus('compStatus', 'Error: ' + err.message, 'error');
                    completed++;
                    if (completed >= total) hideLoadingModal();
                })
                .cargarBateria(id);
        }, idx * 300);
    });
}

function pctCritico(dist, total) {
    if (!dist || total === 0) return 0;
    const crit = (dist["Riesgo alto"] || 0) + (dist["Riesgo muy alto"] || 0);
    return Math.round((crit / total) * 100);
}

const CRIT_RANGES = [
    { max: 29, label: "Sin riesgo", color: "#0ea5e9", bg: "#e0f2fe", cls: "risk-sr" },
    { max: 49, label: "Riesgo bajo", color: "#14b8a6", bg: "#ccfbf1", cls: "risk-rb" },
    { max: 69, label: "Riesgo medio", color: "#f59e0b", bg: "#fef3c7", cls: "risk-rm" },
    { max: 84, label: "Riesgo alto", color: "#f97316", bg: "#ffedd5", cls: "risk-ra" },
    { max: 100, label: "Riesgo muy alto", color: "#dc2626", bg: "#fee2e2", cls: "risk-rma" }
];

function clasificarCritico(pct) {
    for (const r of CRIT_RANGES) {
        if (pct <= r.max) return r;
    }
    return CRIT_RANGES[4];
}

function getStressPct(data) {
    const stressDist = data.summary.stress || {};
    const total = data.summary.total || 0;
    if (!total) return 0;
    const crit = (stressDist["Riesgo alto"] || 0) + (stressDist["Riesgo muy alto"] || 0);
    return Math.round((crit / total) * 100);
}

            const wrapper = document.createElement('div');
            wrapper.className = 'mf-field';
            const lbl = document.createElement('label');
            lbl.textContent = f.label;
            wrapper.appendChild(lbl);
            const sel = document.createElement('select');
            sel.id = f.id;
            const optAll = document.createElement('option');
            optAll.value = ''; optAll.textContent = 'Todos';
            sel.appendChild(optAll);
            opts.forEach(o => {
                const opt = document.createElement('option');
                opt.value = o; opt.textContent = o;
                sel.appendChild(opt);
            });
            sel.onchange = autoApply;
            wrapper.appendChild(sel);
            grid.appendChild(wrapper);
        }
        if (hasFields) {
            card.appendChild(grid);
            advGrid.appendChild(card);
        }
    }
    if (advGrid.children.length > 0) {
        advPanel.appendChild(advGrid);
        bar.appendChild(advPanel);
    } else {
        toggleBtn.style.display = 'none';
    }
}

function getFilteredRows() {
    if (!state.bateriaActiva) return [];
    let rows = state.bateriaActiva.rows;

    const q = document.getElementById('dfBusqueda')?.value?.trim().toLowerCase();
    if (q) {
        const searchCols = ["ID", "Nombre completo del trabajador", "13. Cargo", "No. Encuesta"];
        rows = rows.filter(r => searchCols.some(col =>
            String(r[col] || '').trim().toLowerCase().includes(q)
        ));
    }

    const forma = document.getElementById('dfForma')?.value;
    const sexo = document.getElementById('dfSexo')?.value;
    const area = document.getElementById('dfArea')?.value;
    const cargo = document.getElementById('dfCargo')?.value;
    if (forma) rows = rows.filter(r => String(r["_forma"] || '').trim() === forma);
    if (sexo) rows = rows.filter(r => String(r["2. Sexo"] || '').trim() === sexo);
    if (area) rows = rows.filter(r => String(r["Unidad de Análisis"] || '').trim() === area);
    if (cargo) rows = rows.filter(r => String(r["14. Tipo de cargo"] || '').trim() === cargo);

    const advMap = [
        { id: 'dfEstadoCivil', col: '4. Estado civil' },
        { id: 'dfNivelEstudios', col: '5. Nivel estudios' },
        { id: 'dfEstrato', col: '8. Estrato' },
        { id: 'dfTipoVivienda', col: '9. Tipo vivienda' },
        { id: 'dfAntiguedadEmp', col: '12. Antigüedad en la empresa' },
        { id: 'dfAntiguedadCargo', col: '15. Antigüedad en el cargo' },
        { id: 'dfTipoContrato', col: '17. Tipo de contrato' },
        { id: 'dfHorasDiarias', col: '18. Horas diarias de trabajo' },
        { id: 'dfTipoSalario', col: '19. Tipo de salario' },
        { id: 'dfNivelCargo', col: 'Nivel de cargo del trabajador' },
        { id: 'dfAreaTrabajo', col: '16. Área donde trabaja' },
        { id: 'dfCiudadRes', col: '7. Lugar de residencia: Ciudad' },
        { id: 'dfDptoRes', col: '7. Lugar de residencia: Departamento' },
        { id: 'dfCiudadTrab', col: '11. Lugar de trabajo: Ciudad' },
        { id: 'dfDptoTrab', col: '11. Lugar de trabajo: Departamento' }

        const val = document.getElementById(f.id)?.value;

function aplicarFiltrosDashboard() {
    closeDrillModal();
    const filtered = getFilteredRows();

        const nTotal = s.total;

function renderDonutChart(canvasId, dist, centerPct, centerColor, centerCount) {
    destroyChart(canvasId);
    const ctx = getChartCtx(canvasId);
    if (!ctx) return;
    const keys = orderRiskKeys(dist);
    if (keys.length === 0) return;
    const values = keys.map(k => dist[k] || 0);
    const colors = keys.map(k => riskColor(k).bg);

    const centerPlugin = {
        id: 'centerText',
        afterDraw(chart) {
            const { ctx, chartArea: { left, top, right, bottom } } = chart;
            const cx = (left + right) / 2;
            const cy = (top + bottom) / 2;
            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = 'bold 26px "Segoe UI", sans-serif';
            ctx.fillStyle = centerColor || '#ef4444';
            ctx.fillText((centerCount || 0) + '', cx, cy - 14);
            ctx.font = 'bold 18px "Segoe UI", sans-serif';
            ctx.fillStyle = centerColor || '#ef4444';
            ctx.fillText((centerPct || 0) + '%', cx, cy + 10);
            ctx.font = '9px "Segoe UI", sans-serif';
            ctx.fillStyle = '#64748b';
            ctx.fillText('CR\u00cdTICO', cx, cy + 28);
            ctx.restore();
        }
    };

    state.charts[canvasId] = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: keys,
            datasets: [{
                data: values,
                backgroundColor: colors,
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            cutout: '72%',
            plugins: {
                legend: {
                    display: false
                },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            const label = context.label || '';
                            const value = context.parsed || 0;
                            const total = context.dataset.data.reduce((a, b) => a + b, 0);
                            const pct = total ? Math.round((value / total) * 100) : 0;
                            return label + ': ' + value + ' (' + pct + '%)';
                        }
                    }
                }
            }
        },
        plugins: [centerPlugin]
    });
}

function renderClickableBarChart(canvasId, dist) {

function renderDetailTable(rows, summary) {
    const container = document.getElementById('detailTable');
    if (!summary) { container.innerHTML = ''; return; }
    const total = rows.length;

    const intraDims = summary.dimensions.filter(d => !d.name.startsWith('[Extra]') && !d.name.startsWith('[Global]') && !d.name.startsWith('[Stress]'));
    const globalDims = summary.dimensions.filter(d => d.name.startsWith('[Global]'));
    const extraDims = summary.dimensions.filter(d => d.name.startsWith('[Extra]') && d.name !== '[Extra] PUNTAJE BRUTO TOTAL');
    const stressDist = summary.stress || {};

    const sortDims = (dims) => {
        if (state._detailSortDir === undefined) state._detailSortDir = 'desc';
        return [...dims].filter(d => d.risk).sort((a, b) => {
            const aPct = total ? (((a.risk["Riesgo alto"]||0)+(a.risk["Riesgo muy alto"]||0))/total)*100 : 0;
            const bPct = total ? (((b.risk["Riesgo alto"]||0)+(b.risk["Riesgo muy alto"]||0))/total)*100 : 0;
            return state._detailSortDir === 'desc' ? bPct - aPct : aPct - bPct;
        });
    };

    const buildRow = (dim) => {
        if (!dim.risk) return '';
        const pctAlto = total ? Math.round((((dim.risk["Riesgo alto"]||0)+(dim.risk["Riesgo muy alto"]||0))/total)*100) : 0;
        const rowBg = clasificarCritico(pctAlto).bg;
        const displayName = dim.name.replace('[Global] ', '').replace('[Extra] ', '').replace('[Stress] ', '');
        let r = `<tr style="background:${rowBg};"><td><strong>${displayName}</strong></td>`;
        for (const k of RISK_ORDER) {
            const v = dim.risk[k] || 0;
            const pct = total ? Math.round((v/total)*100) : 0;
            r += `<td>${v} <span style="color:#64748b;font-size:11px;">(${pct}%)</span></td>`;
        }
        const badgeClass = clasificarCritico(pctAlto).cls;
        r += `<td style="text-align:center;"><span class="badge ${badgeClass}" style="font-size:14px;padding:4px 16px;font-weight:700;">${pctAlto}%</span></td></tr>`;
        return r;
    };

    const sortIcon = state._detailSortDir === 'desc' ? '\u25BC' : '\u25B2';

    const buildTable = (title, dims) => {
        if (dims.length === 0) return '';
        let h = `<div class="card" style="margin-top:12px;"><h3>${title}</h3><div class="table-wrap"><table>
            <thead><tr><th>Dimensi\u00f3n</th>${RISK_ORDER.map(r => `<th>${r}</th>`).join('')}<th style="text-align:center;cursor:pointer;" onclick="toggleDetailSort()">Riesgo Cr\u00edtico ${sortIcon}</th></tr></thead><tbody>`;
        for (const dim of sortDims(dims)) h += buildRow(dim);
        h += '</tbody></table></div></div>';
        return h;
    };

    let html = '';
    html += buildTable('Intralaboral', intraDims);
    html += buildTable('Extralaboral', extraDims);

    const stressDims = summary.dimensions.filter(d => d.name.startsWith('[Stress]'));
    html += buildTable('Estrés', stressDims);

    container.innerHTML = html;
}

    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> Exportando...';

    const hints = dash.querySelectorAll('.click-hint');
    hints.forEach(h => h.style.display = 'none');

    // Ensure charts render at full resolution

    charts.forEach(c => { if (c && c.resize) c.resize(); });

        btn.classList.remove('loading');
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Exportar';

        // Download
        const link = document.createElement('a');

function rebuildDimensionOptions(type) {
    const dimSel = document.getElementById('mfDimension');
    if (!dimSel) return;
    const domain = document.getElementById('mfDominio')?.value || '';
    const currentVal = dimSel.value;
    dimSel.innerHTML = '<option value="">Dimensi\u00f3n: Todas</option>';
    let availDims = [];
    if (type === 'intra') {
        availDims = (state._drillSummary.dimensions || [])
            .filter(d => !d.name.startsWith('[Extra]') && !d.name.startsWith('[Global]') && !d.name.startsWith('[Stress]'));
        if (domain) {
            const domainDims = DOMAIN_DIMS[domain] || [];
            availDims = availDims.filter(d => domainDims.includes(d.name));
        }
        availDims = availDims.map(d => d.name);
    } else {
        availDims = (state._drillSummary.dimensions || [])
            .filter(d => d.name.startsWith('[Extra]'))
            .map(d => d.name.replace('[Extra] ', ''));
    }
    availDims.sort().forEach(d => {
        const opt = document.createElement('option');
        opt.value = d; opt.textContent = d;
        dimSel.appendChild(opt);
    });
    if (currentVal) {
        // restore if still valid
        if (Array.from(dimSel.options).some(o => o.value === currentVal)) {
            dimSel.value = currentVal;
        }
    }
}

function getModalFilteredRows() {
    const src = state._drillBatteryData || state.bateriaActiva;
    let rows = src.rows;

    // Quick search (Layer 1)
    const q = document.getElementById('mfBusqueda')?.value?.trim().toLowerCase();
    if (q) {
        const searchCols = ["ID", "Nombre completo del trabajador", "13. Cargo", "No. Encuesta"];
        rows = rows.filter(r => searchCols.some(col =>
            String(r[col] || '').trim().toLowerCase().includes(q)
        ));
    }

    // Quick filter selects (Layer 2)
    const area = document.getElementById('mfArea')?.value;
    const sexo = document.getElementById('mfSexo')?.value;
    const forma = document.getElementById('mfForma')?.value;
    if (area) rows = rows.filter(r => String(r["Unidad de Análisis"] || '').trim() === area);
    if (sexo) rows = rows.filter(r => String(r["2. Sexo"] || '').trim() === sexo);
    if (forma) rows = rows.filter(r => String(r["_forma"] || '').trim() === forma);

    // Advanced filter selects (Layer 3)
    const advMap = [
        { id: 'mfEstadoCivil', col: '4. Estado civil' },
        { id: 'mfNivelEstudios', col: '5. Nivel estudios' },
        { id: 'mfEstrato', col: '8. Estrato' },
        { id: 'mfTipoVivienda', col: '9. Tipo vivienda' },
        { id: 'mfTipoCargo', col: '14. Tipo de cargo' },
        { id: 'mfAntiguedadEmp', col: '12. Antigüedad en la empresa' },
        { id: 'mfAntiguedadCargo', col: '15. Antigüedad en el cargo' },
        { id: 'mfTipoContrato', col: '17. Tipo de contrato' },
        { id: 'mfHorasDiarias', col: '18. Horas diarias de trabajo' },
        { id: 'mfTipoSalario', col: '19. Tipo de salario' },
        { id: 'mfNivelCargo', col: 'Nivel de cargo del trabajador' },
        { id: 'mfAreaTrabajo', col: '16. Área donde trabaja' },
        { id: 'mfCiudadRes', col: '7. Lugar de residencia: Ciudad' },
        { id: 'mfDptoRes', col: '7. Lugar de residencia: Departamento' },
        { id: 'mfCiudadTrab', col: '11. Lugar de trabajo: Ciudad' },
        { id: 'mfDptoTrab', col: '11. Lugar de trabajo: Departamento' }
    ];
    for (const f of advMap) {
        const val = document.getElementById(f.id)?.value;
        if (val) rows = rows.filter(r => String(r[f.col] || '').trim() === val);
    }

    return rows;
}

function aplicarFiltrosModal() {
    const filtered = getModalFilteredRows();
    state._drillRows = filtered;
    state._drillSummary = computeSummary(filtered);
    renderModalBody();
    actualizarIndicadorFiltros();
}

function actualizarIndicadorFiltros() {
    const advIds = ['mfEstadoCivil','mfNivelEstudios','mfEstrato','mfTipoVivienda',
        'mfTipoCargo','mfAntiguedadEmp','mfAntiguedadCargo','mfTipoContrato',
        'mfHorasDiarias','mfTipoSalario','mfNivelCargo','mfAreaTrabajo',
        'mfCiudadRes','mfDptoRes','mfCiudadTrab','mfDptoTrab'];
    const hasActive = advIds.some(id => {
        const el = document.getElementById(id);
        return el && el.value && el.value !== '';
    });
    const btn = document.getElementById('mfToggle');
    if (btn) btn.className = 'mf-toggle' + (hasActive ? ' active' : '');
}

function limpiarFiltrosModal() {
    const ids = ['mfArea','mfSexo','mfForma','mfDimension','mfDominio','mfBusqueda',
        'mfEstadoCivil','mfNivelEstudios','mfEstrato','mfTipoVivienda',
        'mfTipoCargo','mfAntiguedadEmp','mfAntiguedadCargo','mfTipoContrato',
        'mfHorasDiarias','mfTipoSalario','mfNivelCargo','mfAreaTrabajo',
        'mfCiudadRes','mfDptoRes','mfCiudadTrab','mfDptoTrab',
        'mfStressCat','mfStressQ'];
    ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
    });
    aplicarFiltrosModal();
}

function showDrillDown(type) {
    const data = state.bateriaActiva;
    if (!data) return;
    state._drillBatteryData = null;
    state._drillRows = data.rows;
    state._drillSummary = data.summary;
    state._drillType = type;
    state._viewMode = 'table';

    document.getElementById('drillModal').style.display = 'flex';
    document.getElementById('modalBody').innerHTML = '';
    document.getElementById('modalFilters').innerHTML = '';

    const titles = { intra: 'Intralaboral — Dominios y Dimensiones', extra: 'Extralaboral — Dimensiones', stress: 'Estrés' };
    document.getElementById('modalTitle').textContent = titles[type] || 'Detalle';

    const toggleContainer = document.getElementById('modalViewToggle');
    toggleContainer.style.display = 'inline-flex';
    toggleContainer.innerHTML = '<button class="btn-view-toggle" onclick="toggleDrillView()" title="Ver gráfica">📊 Gráfica</button>';

    state._drillComparativaBaterias = state.bateriasComparativa.slice();

function renderModalBody() {
    const type = state._drillType;
    const body = document.getElementById('modalBody');
    body.innerHTML = '';

    if (type === 'intra') renderIntraCards();
    else if (type === 'extra') renderExtraCards();
    else if (type === 'stress') renderStressCards();

    const isChart = state._viewMode === 'chart';
    if (type === 'intra') {
        if (isChart) renderIntraChart();
        else renderIntraTable();
    } else if (type === 'extra') {

}

function renderIntraCards() {
    const summary = state._drillSummary;

    const domain = document.getElementById('mfDominio')?.value || '';
    const areaVal = document.getElementById('mfArea')?.value || '';

    const intraDims = summary.dimensions.filter(d => !d.name.startsWith('[Extra]') && !d.name.startsWith('[Global]') && !d.name.startsWith('[Stress]'));

    const intraDist = summary.intraGeneral || {};
    const hasDist = Object.keys(intraDist).length > 0;

    const computeDomainRisk = (domainName) => {
        const domainDimNames = DOMAIN_DIMS[domainName] || [];
        const domainDims = intraDims.filter(d => domainDimNames.includes(d.name) && d.risk);
        if (domainDims.length === 0) return null;
        let sumPct = 0;
        for (const d of domainDims) {
            const alto = (d.risk["Riesgo alto"] || 0) + (d.risk["Riesgo muy alto"] || 0);
            sumPct += total ? (alto / total) * 100 : 0;
        }
        const pctAlto = Math.round(sumPct / domainDims.length);
        return { name: toTitleCase(domainName), pctAlto };

        html += '<div class="card" style="display:flex;gap:12px;padding:16px;margin-bottom:16px;align-items:stretch;">';

        html += '<div style="font-size:24px;font-weight:700;color:#1a73e8;">'+total+'</div>';

        html += '</div>';

        const riskKeys = orderRiskKeys(intraDist);
        for (const k of riskKeys) {
            const v = intraDist[k] || 0;
            const pct = total ? Math.round((v/total)*100) : 0;
            const rc = riskColor(k);
            html += `<div class="bar-row" style="margin-bottom:2px;">

                    <div class="bar-fill" style="width:${pct}%;background:${rc.bg};"></div>
                </div>

        if (!domain) {
            const critColor = pctColor(pctAltoGlobal);
            html += '<div style="background:#fef2f2;border-radius:8px;padding:6px 12px;text-align:center;margin-bottom:8px;border:1px solid #fecaca;">';
            html += '<div style="font-size:28px;font-weight:800;color:' + critColor + ';line-height:1.2;">' + pctAltoGlobal + '%</div>';

        html += '<div style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">' + domainTitle + '</div>';
        html += '<div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:5px;">';
        if (domain) {
            const dr = computeDomainRisk(domain);
            if (dr) {
                const heroColor = pctColor(dr.pctAlto);
                const heroBg = clasificarCritico(dr.pctAlto).bg;
                html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:${heroBg};border-radius:8px;padding:12px;text-align:center;">

        const alto = (dim.risk["Riesgo alto"] || 0) + (dim.risk["Riesgo muy alto"] || 0);
        const pctAlto = total ? Math.round((alto / total) * 100) : 0;
        return { name: catName, pctAlto };
    };

    const pctAltoGlobal = total ? Math.round((((stressDist["Riesgo alto"]||0)+(stressDist["Riesgo muy alto"]||0))/total)*100) : 0;

    if (hasDist) {
        html += '<div class="card" style="display:flex;gap:12px;padding:16px;margin-bottom:16px;align-items:stretch;">';

        html += '<div style="flex:1;display:flex;flex-direction:column;border:1px solid #e2e8f0;border-radius:8px;padding:10px;">';
        html += '<div style="background:#eef2ff;border-radius:8px;padding:8px 12px;text-align:center;margin-bottom:10px;border:1px solid #c7d2fe;">';
        html += '<div style="font-size:24px;font-weight:700;color:#1a73e8;">'+total+'</div>';
        html += '<div style="font-size:10px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Total Encuestados</div>';
        html += '</div>';
        html += '<div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:4px;">';
        const titleCase = s => s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
    for (const k of keys) {
        const v = stressDist[k] || 0;
        const pct = total ? Math.round((v/total)*100) : 0;
        const rc = riskColor(k);
        html += `<div class="bar-row" style="margin-bottom:2px;">
                <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:500;margin-bottom:2px;">
                    <span style="color:#334155;">${titleCase(k)} (${v})</span>
                    <span style="font-weight:700;color:${rc.text};">${pct}%</span>
                </div>
                <div style="height:12px;background:#e2e8f0;border-radius:6px;overflow:hidden;">
                    <div class="bar-fill" style="width:${pct}%;background:${rc.bg};"></div>
                </div>
            </div>`;
        }
        html += '</div></div>';

        html += '<div style="flex:1;display:flex;flex-direction:column;border:1px solid #e2e8f0;border-radius:8px;padding:10px;">';
        if (!catFilter) {
            const critColor = pctColor(pctAltoGlobal);
            html += '<div style="background:#fef2f2;border-radius:8px;padding:6px 12px;text-align:center;margin-bottom:8px;border:1px solid #fecaca;">';
            html += '<div style="font-size:28px;font-weight:800;color:' + critColor + ';line-height:1.2;">' + pctAltoGlobal + '%</div>';
            html += '<div style="font-size:9px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;">Riesgo Estr\u00e9s Global</div>';
            html += '</div>';
        }
        html += '<div style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">Categor\u00edas</div>';
        html += '<div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:5px;">';

        if (catFilter) {
            const cr = computeStressCatRisk(catFilter);
            if (cr) {
                const heroColor = pctColor(cr.pctAlto);
                const heroBg = clasificarCritico(cr.pctAlto).bg;
                html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:${heroBg};border-radius:8px;padding:12px;text-align:center;">
                    <div style="font-size:13px;font-weight:600;color:#1e293b;margin-bottom:6px;line-height:1.3;">${cr.name}</div>
                    <div style="font-size:42px;font-weight:800;color:${heroColor};line-height:1;">${cr.pctAlto}%</div>
                    <div style="font-size:10px;font-weight:700;color:${heroColor};text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Cr\u00edtico</div>
                    <div style="width:80%;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden;">
                        <div style="height:100%;width:${cr.pctAlto}%;background:${heroColor};border-radius:4px;transition:width 0.4s ease;"></div>
                    </div>
                </div>`;
            }
        } else {
            const catBars = catNames.map(c => computeStressCatRisk(c)).filter(Boolean);
            catBars.sort((a, b) => b.pctAlto - a.pctAlto);
            for (const c of catBars) {
                html += makeHorizBar(c.name, c.pctAlto);
            }
        }
        html += '</div></div></div>';
    }

    html += '<div id="belowSection"></div>';
    container.innerHTML = html;
}

function renderStressTable() {
    const summary = state._drillSummary;
    const total = summary.total;
    const container = document.getElementById('belowSection');
    if (!container) return;

    const catFilter = document.getElementById('mfStressCat')?.value || '';
    const qFilter = document.getElementById('mfStressQ')?.value || '';
    const stressQuestions = summary.stressQuestions || [];

    let filteredQs = stressQuestions;
    if (catFilter && STRESS_CAT_QS[catFilter]) {
        const qNums = STRESS_CAT_QS[catFilter];
        filteredQs = filteredQs.filter(q => {
            const num = parseInt(q.name.replace('Estr\u00e9s ', ''));
            return qNums.includes(num);
        });
    }
    if (qFilter) {
        filteredQs = filteredQs.filter(q => q.name === `Estr\u00e9s ${qFilter}`);
    }

    if (state._sortDir === undefined) state._sortDir = 'desc';
    filteredQs.sort((a, b) => {
        const aPct = total ? (((a.risk["Riesgo alto"]||0)+(a.risk["Riesgo muy alto"]||0))/total)*100 : 0;
        const bPct = total ? (((b.risk["Riesgo alto"]||0)+(b.risk["Riesgo muy alto"]||0))/total)*100 : 0;
        return state._sortDir === 'desc' ? bPct - aPct : aPct - bPct;
    });

    const qText = (num) => {
        const txt = STRESS_QUESTIONS[num] || '';
        return txt.length > 55 ? txt.slice(0, 52) + '...' : txt;
    };

    const sortIcon = state._sortDir === 'desc' ? '\u25BC' : '\u25B2';
    let html = `<div class="table-wrap"><table>
        <thead><tr><th>Pregunta</th>${STRESS_ORDER.map(r => `<th>${r}</th>`).join('')}<th style="text-align:center;cursor:pointer;" onclick="toggleSort()">Riesgo Cr\u00edtico ${sortIcon}</th></tr></thead><tbody>`;

    for (const q of filteredQs) {
        if (!q.risk) continue;
        const num = parseInt(q.name.replace('Estr\u00e9s ', ''));
        const fullTxt = STRESS_QUESTIONS[num] || '';
        const pctAlto = total ? Math.round((((q.risk["Riesgo alto"]||0)+(q.risk["Riesgo muy alto"]||0))/total)*100) : 0;
        const rowBg = clasificarCritico(pctAlto).bg;
        html += `<tr style="background:${rowBg};"><td><strong title="${fullTxt}">${num}. ${qText(num)}</strong></td>`;
        for (const r of STRESS_ORDER) {
            const v = q.risk[r] || 0;
            const pct = total ? Math.round((v/total)*100) : 0;
            html += `<td>${v} <span style="color:#64748b;font-size:11px;">(${pct}%)</span></td>`;
        }
        const badgeClass = clasificarCritico(pctAlto).cls;
        html += `<td style="text-align:center;"><span class="badge ${badgeClass}" style="font-size:14px;padding:4px 16px;font-weight:700;">${pctAlto}%</span></td></tr>`;
    }

    html += '</tbody></table></div>';
    container.innerHTML = html;
}

function renderStressChart() {
    const summary = state._drillSummary;
    const total = summary.total;
    const container = document.getElementById('belowSection');
    if (!container) return;

    const catFilter = document.getElementById('mfStressCat')?.value || '';
    const qFilter = document.getElementById('mfStressQ')?.value || '';

    if (!total) {
        container.innerHTML = '<p style="color:#94a3b8;text-align:center;padding:30px;">Sin datos para el filtro seleccionado.</p>';
        return;
    }

    let filteredQs = summary.stressQuestions || [];
    if (catFilter && STRESS_CAT_QS[catFilter]) {
        const qNums = STRESS_CAT_QS[catFilter];
        filteredQs = filteredQs.filter(q => {
            const num = parseInt(q.name.replace('Estr\u00e9s ', ''));
            return qNums.includes(num);
        });
    }
    if (qFilter) {
        filteredQs = filteredQs.filter(q => q.name === `Estr\u00e9s ${qFilter}`);
    }

    filteredQs.sort((a, b) => {
        const aPct = total ? (((a.risk["Riesgo alto"]||0)+(a.risk["Riesgo muy alto"]||0))/total)*100 : 0;
        const bPct = total ? (((b.risk["Riesgo alto"]||0)+(b.risk["Riesgo muy alto"]||0))/total)*100 : 0;
        return bPct - aPct;
    });

    container.innerHTML = '<div style="position:relative;"><canvas id="stressChartCanvas"></canvas></div>';

    destroyChart('stressChart');
    const ctx = getChartCtx('stressChartCanvas');
    if (!ctx) return;

    const labels = filteredQs.map(q => {
        const num = parseInt(q.name.replace('Estr\u00e9s ', ''));
        const txt = STRESS_QUESTIONS[num] || '';
        return num + '. ' + (txt.length > 35 ? txt.slice(0, 32) + '...' : txt);
    });
    const values = filteredQs.map(q => total ? Math.round((((q.risk["Riesgo alto"]||0)+(q.risk["Riesgo muy alto"]||0))/total)*100) : 0);
    const colors = values.map(v => clasificarCritico(v).color);

    state.charts['stressChart'] = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: '% Cr\u00edtico',
                data: values,
                backgroundColor: colors,
                borderColor: colors,
                borderWidth: 1,
                borderRadius: 3
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            scales: {
                x: { ticks: { font: { size: 9 }, maxRotation: 45 } },
                y: { beginAtZero: true, max: 100, ticks: { font: { size: 10 }, callback: v => v + '%' } }
            },
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: ctx => ctx.parsed.x + '%',
                        title: items => {
                            const idx = items[0].dataIndex;
                            const q = filteredQs[idx];
                            if (!q) return '';
                            const num = parseInt(q.name.replace('Estr\u00e9s ', ''));
                            return num + '. ' + (STRESS_QUESTIONS[num] || '');
                        }
                    }
                }
            }
        }
    });
}

let compBatteryIdCounter = 0;

function bLabel(b) {
    const m = b.meta;
    const name = m.name || m.fileName.replace(/\.xlsx?$/i, '');
    const year = m.year ? ' ' + m.year : '';
    return name + year;
}

function bLabelShort(b, max) {
    const l = bLabel(b);
    const m = max || 20;
    return l.length > m ? l.slice(0, m-2) + '..' : l;
}

function procesarComparativa(file) {
    showLoadingModal('Procesando archivo para comparativa...');
    mostrarStatus('compStatus', 'Leyendo archivo...', 'info');
    const compFile = document.getElementById('comparativaFile');
    if (compFile) compFile.value = '';
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const result = procesarExcel(new Uint8Array(e.target.result), file.name);
            if (!result.rows || result.rows.length === 0) {
                hideLoadingModal();
                mostrarStatus('compStatus', 'No se encontraron datos en las hojas esperadas.', 'error');
                return;
            }
            const id = ++compBatteryIdCounter;
            const baseName = file.name.replace(/\.xlsx?$/i, '');
            result.meta.id = id;
            result.meta.name = baseName;
            result.meta.year = new Date().getFullYear() + '';
            state.bateriasComparativa.push(result);
            hideLoadingModal();
            mostrarStatus('compStatus', '✔ ' + baseName + ' (' + result.meta.totalRows + ' reg.) agregada.', 'success');
            renderBatteryList();
            actualizarComparativa();
        } catch(err) {
            hideLoadingModal();
            mostrarStatus('compStatus', 'Error: ' + err.message, 'error');
            console.error(err);
        }
    };
    reader.onerror = function() {
        hideLoadingModal();
        mostrarStatus('compStatus', 'Error al leer el archivo', 'error');
    };
    reader.readAsArrayBuffer(file);
}

function updateBatteryMeta(id, field, value) {
    const b = state.bateriasComparativa.find(x => x.meta.id === id);
    if (b && b.meta[field] !== value) { b.meta[field] = value; actualizarComparativa(); }
}

function getStressPctFromBattery(b) {
    const stressDist = b.summary.stress || {};
    const total = b.summary.total || 0;
    if (!total) return 0;
    const crit = (stressDist["Riesgo alto"] || 0) + (stressDist["Riesgo muy alto"] || 0);
    return Math.round((crit / total) * 100);
}

function renderBatteryList() {
    const container = document.getElementById('batteryList');
    const listContainer = document.getElementById('batteryListContainer');

    if (state.bateriasComparativa.length === 0) {
        listContainer.style.display = 'none';
        return;
    }
    listContainer.style.display = 'block';

    const sorted = [...state.bateriasComparativa].sort((a, b) => (a.meta.year || '0') > (b.meta.year || '0') ? 1 : -1);

    container.innerHTML = sorted.map(b => {
        const m = b.meta;
        const s = b.summary;
        const pctIntra = pctCriticoDist(s.intraGeneral, s.total);
        const pctExtra = pctCriticoDist(s.extraGeneral, s.total);
        const pctStress = getStressPctFromBattery(b);
        const barGradient = (pct) => {
            const r = clasificarCritico(pct);
            const g = {
                'Sin riesgo': 'linear-gradient(135deg, #0ea5e9, #38bdf8)',
                'Riesgo bajo': 'linear-gradient(135deg, #14b8a6, #2dd4bf)',
                'Riesgo medio': 'linear-gradient(135deg, #f59e0b, #fbbf24)',
                'Riesgo alto': 'linear-gradient(135deg, #f97316, #fb923c)',
                'Riesgo muy alto': 'linear-gradient(135deg, #dc2626, #f87171)'
            };
            return g[r.label] || r.color;
        };
        const getRiskLabel = (pct) => clasificarCritico(pct).label;
        const gIntra = barGradient(pctIntra);
        const gExtra = barGradient(pctExtra);
        const gStress = barGradient(pctStress);
        const cIntra = clasificarCritico(pctIntra).color;
        const cExtra = clasificarCritico(pctExtra).color;
        const cStress = clasificarCritico(pctStress).color;
        const titleCase = s => s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
        return `<div class="bat-card" style="padding:0;overflow:hidden;">
            <div class="bat-card-header" style="padding:24px 24px 16px;background:linear-gradient(135deg,rgba(99,102,241,0.08)0%,rgba(168,85,247,0.06)100%);text-align:center;">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                    <input class="bat-name-input" value="${(m.name || '').replace(/"/g,'&quot;')}" onchange="updateBatteryMeta(${m.id},'name',this.value)" onclick="event.stopPropagation();" placeholder="Nombre de la batería" style="flex:1;min-width:0;font-size:18px;font-weight:700;text-align:center;border:none;background:transparent;color:#1e293b;padding:4px 8px;border-radius:6px;">
                    <button class="btn-remove" onclick="event.stopPropagation();eliminarBateria(${m.id})" title="Eliminar" style="flex-shrink:0;font-size:16px;margin-left:8px;">✕</button>
                </div>
                <div style="display:flex;justify-content:center;gap:12px;margin-top:12px;align-items:center;">
                    <input class="bat-year-input" value="${m.year || ''}" onchange="updateBatteryMeta(${m.id},'year',this.value)" onclick="event.stopPropagation();" placeholder="2026" style="width:60px;text-align:center;font-size:13px;font-weight:600;padding:4px 8px;border-radius:6px;">
                </div>
                <div style="margin-top:10px;font-size:14px;font-weight:700;color:#6366f1;">
                    👤 ${m.totalRows.toLocaleString()} encuestados
                </div>
            </div>
            <div class="bat-card-body" style="padding:20px 24px;">
                <div style="text-align:center;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;">Resultados de Riesgo</div>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;">
                    <div style="text-align:center;">
                        <div style="font-size:12px;font-weight:700;color:#475569;margin-bottom:8px;letter-spacing:0.5px;">INTRALABORAL</div>
                        <div style="font-size:32px;font-weight:800;color:${cIntra};line-height:1;">${pctIntra}%</div>
                        <div style="font-size:10px;font-weight:600;color:${cIntra};margin-top:4px;">${titleCase(getRiskLabel(pctIntra))}</div>
                        <div class="bat-risk-bar-bg" style="height:8px;margin-top:8px;border-radius:4px;"><div class="bat-risk-bar-fill" style="width:${pctIntra}%;background:${gIntra};border-radius:4px;"></div></div>
                    </div>
                    <div style="text-align:center;">
                        <div style="font-size:12px;font-weight:700;color:#475569;margin-bottom:8px;letter-spacing:0.5px;">EXTRALABORAL</div>
                        <div style="font-size:32px;font-weight:800;color:${cExtra};line-height:1;">${pctExtra}%</div>
                        <div style="font-size:10px;font-weight:600;color:${cExtra};margin-top:4px;">${titleCase(getRiskLabel(pctExtra))}</div>
                        <div class="bat-risk-bar-bg" style="height:8px;margin-top:8px;border-radius:4px;"><div class="bat-risk-bar-fill" style="width:${pctExtra}%;background:${gExtra};border-radius:4px;"></div></div>
                    </div>
                    <div style="text-align:center;">
                        <div style="font-size:12px;font-weight:700;color:#475569;margin-bottom:8px;letter-spacing:0.5px;">ESTRÉS</div>
                        <div style="font-size:32px;font-weight:800;color:${cStress};line-height:1;">${pctStress}%</div>
                        <div style="font-size:10px;font-weight:600;color:${cStress};margin-top:4px;">${titleCase(getRiskLabel(pctStress))}</div>
                        <div class="bat-risk-bar-bg" style="height:8px;margin-top:8px;border-radius:4px;"><div class="bat-risk-bar-fill" style="width:${pctStress}%;background:${gStress};border-radius:4px;"></div></div>
                    </div>
                </div>
            </div>
        </div>`;
    }).join('');
}

function eliminarBateria(id) {
    state.bateriasComparativa = state.bateriasComparativa.filter(b => b.meta.id !== id);
    renderBatteryList();
    actualizarComparativa();
}

function limpiarComparativa() {
    state.bateriasComparativa = [];
    renderBatteryList();
    actualizarComparativa();
    document.getElementById('compStatus').style.display = 'none';
}

function getSelectedBaterias() {
    return state.bateriasComparativa; // no checkboxes — all always selected
}

function pctCriticoDist(dist, total) {
    if (!dist || !total) return 0;
    return Math.round((((dist["Riesgo alto"]||0)+(dist["Riesgo muy alto"]||0))/total)*100);
}

function actualizarComparativa() {
    const selected = getSelectedBaterias();
    const container = document.getElementById('compContent');
    const hint = document.getElementById('compHint');

    if (selected.length < 2) {
        container.style.display = 'none';
        if (hint) hint.textContent = selected.length === 1 ? 'Selecciona al menos una bater\u00eda m\u00e1s para comparar.' : 'Carga al menos 2 bater\u00edas y selecci\u00f3nalas para ver la comparativa.';
        return;
    }
    container.style.display = 'block';
    if (hint) hint.textContent = 'Comparando ' + selected.length + ' bater\u00edas.';

    renderTrendCard(selected);
    renderGroupedCompare('groupedIntra', 'intraGeneral', selected);
    renderGroupedCompare('groupedExtra', 'extraGeneral', selected);
    renderGroupedCompare('groupedStress', 'stress', selected, STRESS_ORDER);
}

function renderTrendCard(baterias) {
    const container = document.getElementById('trendCard');
    const sorted = [...baterias].sort((a, b) => (a.meta.year || '0') > (b.meta.year || '0') ? 1 : -1);
    if (sorted.length < 2) { container.style.display = 'none'; return; }
    container.style.display = 'block';
    const years = [...new Set(sorted.map(b => b.meta.year).filter(Boolean))].sort();
    if (years.length < 2) { container.style.display = 'none'; return; }

    const byYear = (year) => sorted.filter(b => b.meta.year === year);
    const pctAvg = (list, key) => {
        if (!list.length) return 0;
        const sum = list.reduce((acc, b) => acc + pctCriticoDist(b.summary[key], b.summary.total), 0);
        return Math.round(sum / list.length);
    };

    const types = [
        { key: 'intraGeneral', label: 'Intralaboral', color: '#6366f1', bg: '#eef2ff' },
        { key: 'extraGeneral', label: 'Extralaboral', color: '#f59e0b', bg: '#fffbeb' },
        { key: 'stress', label: 'Estr\u00e9s', color: '#ef4444', bg: '#fef2f2' }
    ];

    let html = '<div class="bat-trend-card"><h3 style="font-size:15px;margin-bottom:12px;">\ud83d\udcc8 Tendencia por a\u00f1o</h3><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">';
    for (const t of types) {
        const vals = years.map(y => pctAvg(byYear(y), t.key));
        const last = vals[vals.length - 1];
        const prev = vals[vals.length - 2];
        const diff = last - prev;
        let arrow, arrowColor;
        if (diff > 0) { arrow = '\u2191'; arrowColor = '#ef4444'; }
        else if (diff < 0) { arrow = '\u2193'; arrowColor = '#22c55e'; }
        else { arrow = '\u2192'; arrowColor = '#94a3b8'; }
        const maxVal = Math.max(...vals, 1);
        html += '<div style="background:' + t.bg + ';border-radius:8px;padding:12px;border:1px solid ' + t.color + '22;text-align:center;">';
        html += '<div style="font-weight:700;font-size:13px;color:#1e293b;margin-bottom:6px;">' + t.label + '</div>';
        html += '<div style="font-size:22px;font-weight:800;color:' + arrowColor + ';line-height:1.2;">' + arrow + ' ' + (diff > 0 ? '+' : '') + diff + '%</div>';
        html += '<div style="font-size:10px;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.3px;">vs a\u00f1o anterior</div>';
        for (let i = 0; i < years.length; i++) {
            const pct = vals[i];
            const barPct = Math.round((pct / maxVal) * 100);
            let barColor;
            if (i === 0) {
                barColor = clasificarCritico(pct).color;
            } else {
                const prevPct = vals[i - 1];
                if (pct > prevPct) barColor = '#ef4444';
                else if (pct < prevPct) barColor = '#22c55e';
                else barColor = clasificarCritico(pct).color;
            }
            html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">';
            html += '<span style="font-size:11px;font-weight:600;color:#64748b;width:30px;text-align:right;">' + years[i] + '</span>';
            html += '<div style="flex:1;height:10px;background:#e2e8f0;border-radius:5px;overflow:hidden;">';
            html += '<div style="width:' + barPct + '%;height:100%;background:' + barColor + ';border-radius:5px;"></div></div>';
            html += '<span style="font-size:11px;font-weight:700;color:' + barColor + ';width:32px;text-align:left;">' + pct + '%</span>';
            html += '</div>';
        }
        html += '</div>';
    }
    html += '</div></div>';
    container.innerHTML = html;
}

function renderGroupedCompare(canvasId, summaryKey, baterias, riskOrder) {
    destroyChart(canvasId);
    const ctx = getChartCtx(canvasId);
    if (!ctx) return;

    const allRiskKeys = new Set();
    baterias.forEach(b => { Object.keys(b.summary[summaryKey]||{}).forEach(k => allRiskKeys.add(k)); });
    const order = riskOrder || RISK_ORDER;
    const riskLabels = order.filter(r => allRiskKeys.has(r));
    if (riskLabels.length === 0) return;

    const sorted = [...baterias].sort((a, b) => (a.meta.year || '0') > (b.meta.year || '0') ? 1 : -1);

    const datasets = sorted.map((b, i) => ({
        label: bLabelShort(b),
        data: riskLabels.map(r => {
            const t = b.meta.totalRows;
            const val = (b.summary[summaryKey] && b.summary[summaryKey][r]) || 0;
            return t ? Math.round((val / t) * 100 * 10) / 10 : 0;
        }),
        backgroundColor: CHART_COLORS[i % CHART_COLORS.length] + 'cc',
        borderColor: CHART_COLORS[i % CHART_COLORS.length],
        borderWidth: 1, borderRadius: 3
    }));

    state.charts[canvasId] = new Chart(ctx, {
        type: 'bar',
        data: { labels: riskLabels, datasets },
        options: {
            responsive: true, maintainAspectRatio: true,
            scales: {
                x: { ticks: { font: { size: 10 } } },
                y: { beginAtZero: true, max: 100, ticks: { font: { size: 10 }, callback: v => v + '%' } }
            },
            plugins: {
                legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 12, padding: 10 } },
                tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y + '%' } }
            }
        }
    });
}
