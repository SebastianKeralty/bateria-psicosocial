<script>
// ============================================================
// STATE — Constants, State Object, Utilities
// ============================================================
const RISK_COLORS = {
    "Sin riesgo":        { bg: "#bbf7d0", text: "#166534", cls: "risk-sr" },
    "Riesgo bajo":       { bg: "#fef08a", text: "#854d0e", cls: "risk-rb" },
    "Riesgo medio":      { bg: "#fed7aa", text: "#9a3412", cls: "risk-rm" },
    "Riesgo alto":       { bg: "#fca5a5", text: "#991b1b", cls: "risk-ra" },
    "Riesgo muy alto":   { bg: "#f87171", text: "#7f1d1d", cls: "risk-rma" },
    "Riesgo muy bajo":   { bg: "#dbeafe", text: "#1e40af", cls: "risk-mb" },
    "Dato perdido":      { bg: "#e2e8f0", text: "#94a3b8", cls: "risk-error" },
    "ERROR":             { bg: "#e2e8f0", text: "#475569", cls: "risk-error" }
};
const RISK_ORDER = ["Sin riesgo","Riesgo bajo","Riesgo medio","Riesgo alto","Riesgo muy alto"];
const STRESS_ORDER = ["Sin riesgo","Riesgo medio","Riesgo alto","Riesgo muy alto"];
const CHART_COLORS = [
    "#1a73e8","#34a853","#fbbc04","#ea4335","#8e24aa",
    "#00acc1","#ff7043","#9ccc65","#ab47bc","#26a69a"
];

const state = {
    bateriaActiva: null,
    bateriasComparativa: [],
    charts: {},
    planes: [],
    _drillBatteryData: null,
    _drillComparativaBaterias: null,
    _drillRows: null,
    _drillSummary: null,
    _drillType: null,
    _viewMode: 'table',
    _detailSortDir: 1,
    _sortDir: 1,
    _compSortCol: null,
    _compSortDir: 1,
    _compViewMode: 'cards',
    _compDimSortDir: 0
};

function destroyChart(key) {
    if (state.charts[key]) { state.charts[key].destroy(); delete state.charts[key]; }
}

function getChartCtx(id) {
    const el = document.getElementById(id);
    if (!el) return null;
    return el.getContext('2d');
}

// ============================================================
// TAB SWITCHING
// ============================================================
const tabLabels = {
    inicio: 'Inicio',
    baterias: 'Baterías',
    dashboard: 'Dashboard',
    comparativa: 'Comparativa',
    reportes: 'Reportes',
    informacion: 'Información'
};

document.querySelectorAll('.side-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        const tab = this.dataset.tab;
        document.getElementById('tab-' + tab).classList.add('active');
        document.getElementById('topbarTitle').textContent = tabLabels[tab] || tab;
        if (tab === 'dashboard' && state.bateriaActiva) {
            var batteryId = state.bateriaActiva.meta && state.bateriaActiva.meta.id;
            if (!batteryId) {
                // Subida local sin id de Drive — renderizar directamente
                _renderDashboardTab();
            } else {
                google.script.run
                    .withSuccessHandler(function(exists) {
                        if (!exists) {
                            state.bateriaActiva = null;
                            document.getElementById('topbarBadge').style.display = 'none';
                            document.getElementById('btnExport').style.display = 'none';
                            document.getElementById('btnExportJSON').style.display = 'none';
                            document.getElementById('dashContent').style.display = 'none';
                            document.getElementById('dashNoData').style.display = 'block';
                            return;
                        }
                        _renderDashboardTab();
                    })
                    .withFailureHandler(function() { _renderDashboardTab(); })
                    .verificarBateria(batteryId);
            }
        } else if (tab === 'inicio') {
            document.getElementById('topbarBadge').style.display = 'none';
            document.getElementById('btnExport').style.display = 'none';
            document.getElementById('btnExportJSON').style.display = 'none';
        } else if (tab === 'baterias') {
            document.getElementById('topbarBadge').style.display = 'none';
            document.getElementById('btnExport').style.display = 'none';
            document.getElementById('btnExportJSON').style.display = 'none';
            renderBaterias();
        } else if (tab === 'informacion') {
            document.getElementById('topbarBadge').style.display = 'none';
            document.getElementById('btnExport').style.display = 'none';
            document.getElementById('btnExportJSON').style.display = 'none';
        } else if (tab === 'reportes') {
            document.getElementById('topbarBadge').style.display = 'none';
            document.getElementById('btnExport').style.display = 'none';
            document.getElementById('btnExportJSON').style.display = 'none';
            var noData = document.getElementById('reportNoData');
            var content = document.getElementById('reportContent');
            var info = document.getElementById('reportFileInfo');
            var img1 = document.getElementById('reportesImg1');
            var img2 = document.getElementById('reportesImg2');
            if (!noData || !content) return;
            if (state.bateriaActiva && state.bateriaActiva.meta) {
                noData.style.display = 'none';
                content.style.display = 'block';
                if (info) info.textContent = 'Datos: ' + state.bateriaActiva.meta.fileName + ' (' + state.bateriaActiva.meta.totalRows + ' registros)';
                try { setTimeout(function(){ actualizarPreview(); }, 100); } catch(e) {}
                if (img2) {
                    img2.src = 'https://lh3.googleusercontent.com/d/1MqNARuQ44Oj-bs-gZs-8xWNF2puqgvuP=w800';
                    img2.setAttribute('data-original', 'https://lh3.googleusercontent.com/d/1MqNARuQ44Oj-bs-gZs-8xWNF2puqgvuP=w800');
                    img2.setAttribute('data-hover', 'https://lh3.googleusercontent.com/d/1IYw0VYt_ohAnJU-Be3S--E-1wLBsbYKX=w800');
                }
            } else {
                noData.style.display = 'block';
                content.style.display = 'none';
                if (img1) {
                    img1.src = 'https://lh3.googleusercontent.com/d/1-5SEn_tyPxCNJ2BA5pX1FZGkc-UsK9I7=w800';
                    img1.setAttribute('data-original', 'https://lh3.googleusercontent.com/d/1-5SEn_tyPxCNJ2BA5pX1FZGkc-UsK9I7=w800');
                    img1.setAttribute('data-hover', 'https://lh3.googleusercontent.com/d/1OoZ6wz27aVM0j1Hy8tD3VjdVUv-YQxb8=w800');
                }
            }
        } else if (tab === 'comparativa') {
            const sel = getSelectedBaterias();
            const vis = sel.length > 0 ? 'inline-flex' : 'none';
            document.getElementById('btnExport').style.display = vis;
            document.getElementById('btnExportJSON').style.display = vis;
        } else {
            document.getElementById('topbarBadge').style.display = 'none';
            document.getElementById('btnExport').style.display = 'none';
            document.getElementById('btnExportJSON').style.display = 'none';
        }
    });
});

function irADashboard() {
    const btn = document.querySelector('.side-btn[data-tab="dashboard"]');
    if (btn) btn.click();
}

function _renderDashboardTab() {
    document.getElementById('topbarBadge').style.display = 'inline';
    document.getElementById('topbarBadge').textContent = state.bateriaActiva.meta.fileName + ' (' + state.bateriaActiva.meta.totalRows + ' reg.)';
    document.getElementById('btnExport').style.display = 'inline-flex';
    document.getElementById('btnExportJSON').style.display = 'inline-flex';
    setTimeout(function() {
        const dashEl = document.getElementById('dashContent');
        if (dashEl && dashEl.style.display !== 'none') {
            const filtered = getFilteredRows();
            const s = state.bateriaActiva ? computeSummary(filtered) : null;
            if (s) renderChartsDashboard(filtered, s);
        }
    }, 200);
}

// ============================================================
// UTILITIES
// ============================================================
function riskColor(riskLevel) {
    return RISK_COLORS[riskLevel] || RISK_COLORS["ERROR"];
}

function getRiskClass(val) {
    const c = riskColor(val);
    return c ? c.cls : 'risk-error';
}

function orderRiskKeys(dist) {
    if (!dist) return [];
    const keys = Object.keys(dist);
    // Check which order has more matches
    const nStress = STRESS_ORDER.filter(k => keys.includes(k)).length;
    const nRegular = RISK_ORDER.filter(k => keys.includes(k)).length;
    if (nStress > nRegular && nStress > 0) {
        return STRESS_ORDER.filter(k => keys.includes(k));
    }
    if (nRegular > 0) {
        return RISK_ORDER.filter(k => keys.includes(k));
    }
    return keys;
}

function abrirDocumento(fileId, titulo) {
    const modal = document.getElementById('driveViewerModal');
    const frame = document.getElementById('driveViewerFrame');
    const title = document.getElementById('driveViewerTitle');
    const link = document.getElementById('driveViewerLink');
    if (!modal || !frame) return;
    frame.src = 'https://drive.google.com/file/d/' + fileId + '/preview';
    title.textContent = titulo || 'Documento';
    link.href = 'https://drive.google.com/file/d/' + fileId + '/view';
    modal.style.display = 'flex';
}

function cerrarDriveViewer() {
    const modal = document.getElementById('driveViewerModal');
    const frame = document.getElementById('driveViewerFrame');
    if (modal) modal.style.display = 'none';
    if (frame) setTimeout(() => { frame.src = ''; }, 300);
}

function toggleAccordion(header) {
    const body = header.nextElementSibling;
    const isOpen = body.classList.contains('open');
    document.querySelectorAll('.info-body.open').forEach(el => {
        el.classList.remove('open');
        el.style.maxHeight = '0';
    });
    if (!isOpen) {
        body.classList.add('open');
        body.style.maxHeight = body.scrollHeight + 80 + 'px';
    }
}

function toTitleCase(str) {
    const keepLower = ['de','del','la','las','lo','los','el','ella','ellos','y','e','o','a','en','con','por','para','sin','sobre','entre','desde','hasta','al','un','una','su','sus'];
    return str.split(' ').map((word, i) => {
        const w = word.toLowerCase();
        if (i > 0 && keepLower.includes(w)) return w;
        return w.charAt(0).toUpperCase() + w.slice(1);
    }).join(' ');
}

function getFilterOptions(rows, col) {
    const set = new Set();
    for (const r of rows) {
        const v = r[col];
        if (v !== undefined && v !== null && v !== "") set.add(String(v).trim());
    }
    return Array.from(set).sort();
}

function populateFilter(selectId, col, rows) {
    const sel = document.getElementById(selectId);
    if (!sel) return;
    const current = sel.value;
    sel.innerHTML = '<option value="">Todos</option>';
    const opts = getFilterOptions(rows, col);
    const normArea = (s) => s.replace(/^[\d\s]+[\.\s]*/g, '').replace(/\s+/g, ' ').trim().toLowerCase();
    const used = new Set();
    opts.forEach(o => {
        const v = col === "16. Área donde trabaja" ? normArea(o) : o;
        if (!v || used.has(v)) return;
        used.add(v);
        const opt = document.createElement('option');
        opt.value = v;
        opt.textContent = col === "16. Área donde trabaja" ? v.replace(/\b\w/g, c => c.toUpperCase()) : o;
        sel.appendChild(opt);
    });
    if (current) sel.value = current;
}
</script>
