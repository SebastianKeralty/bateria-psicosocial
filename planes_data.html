/**
 * Genera el HTML de checkboxes.
 */
function generarChecklistAcciones(dimension, nivel, accionesGuardadas = []) {
  let dimLimpia = dimension.replace(" (I)", "").replace(" (T)", "").replace("(I)", "").replace("(T)", "").trim();
  let keyMatch = "";

  for (let key in MATRIZ_RECOMENDACIONES) {
    if (dimLimpia.toLowerCase() === key.toLowerCase() || 
        dimLimpia.toLowerCase().includes(key.toLowerCase()) || 
        key.toLowerCase().includes(dimLimpia.toLowerCase())) {
      keyMatch = key;
      break;
    }
  }

  let nivelNorm = nivel.trim();
  if (nivelNorm.toLowerCase().includes("muy alto")) nivelNorm = "Muy Alto";
  else if (nivelNorm.toLowerCase().includes("bajo")) nivelNorm = "Bajo";
  else if (nivelNorm.toLowerCase().includes("sin riesgo")) nivelNorm = "Sin Riesgo";
  else if (nivelNorm.toLowerCase().includes("medio")) nivelNorm = "Medio";
  else if (nivelNorm.toLowerCase().includes("alto")) nivelNorm = "Alto";

  let recomendadas = keyMatch ? (MATRIZ_RECOMENDACIONES[keyMatch][nivelNorm] || []) : [];
  
  if (recomendadas.length === 0) {
    return '<div style="padding:20px;text-align:center;"><p style="font-size:12px;color:#64748b;">No hay planes pre-establecidos para esta combinación en la matriz.</p></div>';
  }

  let html = "";
  recomendadas.forEach((accion) => {
    let isChecked = accionesGuardadas.includes(accion) ? "checked" : "";
    html += `
      <div class="check-item" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-bottom:1px solid #f1f5f9;cursor:pointer;transition:all 0.3s cubic-bezier(0.22,1,0.36,1);border-radius:8px;margin:0 -4px;"
           onclick="this.querySelector('input').click()"
           onmouseover="this.style.background='linear-gradient(135deg,#f0fdf4,#dcfce7)';this.style.padding='12px 16px';this.style.margin='2px -8px';this.style.boxShadow='0 4px 12px rgba(34,197,94,0.15)';this.style.transform='scale(1.02)';this.style.borderColor='rgba(34,197,94,0.2)';"
           onmouseout="this.style.background='transparent';this.style.padding='10px 12px';this.style.margin='0 -4px';this.style.boxShadow='none';this.style.transform='scale(1)';this.style.borderColor='transparent';">
        <label class="ck">
          <input type="checkbox" value="${accion.replace(/"/g, '&quot;')}" ${isChecked} onclick="event.stopPropagation()">
          <span class="ck-box"></span>
        </label>
        <span style="font-size:13px;color:#1e293b;font-weight:500;line-height:1.4;flex:1;">${accion}</span>
      </div>
    `;
  });

  return html;
}

function getAccionesSeleccionadas() {
  let checkboxes = document.querySelectorAll('#planAccionesChecklist input[type="checkbox"]:checked');
  let seleccionadas = [];
  checkboxes.forEach(cb => seleccionadas.push(cb.value));
  return seleccionadas;
}
