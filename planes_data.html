function normalizeText(text) {
  if (!text) return '';
  var s = text.toLowerCase();
  s = s.replace(/[áàäâ]/g, 'a').replace(/[éèëê]/g, 'e').replace(/[íìïî]/g, 'i').replace(/[óòöô]/g, 'o').replace(/[úùüû]/g, 'u').replace(/ñ/g, 'n');
  s = s.replace(/^\[.*?\]\s*/, '');
  s = s.replace(/\(i\)$/g, '').replace(/\(t\)$/g, '');
  s = s.replace(/\s+/g, ' ').trim();
  return s;
}

function generarChecklistAcciones(dimension, nivel, accionesGuardadas) {
  accionesGuardadas = accionesGuardadas || [];
  var dimNorm = normalizeText(dimension);
  var keyMatch = '';

  for (var key in MATRIZ_RECOMENDACIONES) {
    var kNorm = normalizeText(key);
    if (kNorm === dimNorm || dimNorm.indexOf(kNorm) !== -1 || kNorm.indexOf(dimNorm) !== -1) {
      keyMatch = key;
      break;
    }
  }

  var nivelNorm = nivel ? nivel.trim() : '';
  if (nivelNorm.toLowerCase().indexOf('muy alto') !== -1) nivelNorm = 'Muy Alto';
  else if (nivelNorm.toLowerCase().indexOf('bajo') !== -1) nivelNorm = 'Bajo';
  else if (nivelNorm.toLowerCase().indexOf('sin riesgo') !== -1) nivelNorm = 'Sin Riesgo';
  else if (nivelNorm.toLowerCase().indexOf('medio') !== -1) nivelNorm = 'Medio';
  else if (nivelNorm.toLowerCase().indexOf('alto') !== -1) nivelNorm = 'Alto';

  var recomendadas = keyMatch ? (MATRIZ_RECOMENDACIONES[keyMatch][nivelNorm] || []) : [];
  
  if (recomendadas.length === 0) {
    return '<div style="padding:20px;text-align:center;"><p style="font-size:12px;color:#64748b;">No hay planes pre-establecidos para esta combinacion.</p></div>';
  }

  var html = '';
  var accentColor = '#16a34a';
  for (var i = 0; i < recomendadas.length; i++) {
    var accion = recomendadas[i];
    var isChecked = accionesGuardadas.indexOf(accion) !== -1 ? 'checked' : '';
    var delay = (0.03 * (i + 1)).toFixed(3);
    html += '<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid #f1f5f9;border-radius:10px;margin:0 -2px;transition:all 0.3s cubic-bezier(0.22,1,0.36,1);animation:planItemIn 0.35s ease-out forwards;opacity:0;animation-delay:' + delay + 's;" onmouseover="this.style.background=\'#f0fdf4\';this.style.transform=\'translateX(4px)\';this.style.boxShadow=\'0 2px 8px rgba(34,197,94,0.08)\';" onmouseout="this.style.background=\'transparent\';this.style.transform=\'translateX(0)\';this.style.boxShadow=\'none\';">' +
        '<input type="checkbox" value="' + accion.replace(/"/g, '&quot;') + '" ' + isChecked + ' style="width:18px;height:18px;cursor:pointer;accent-color:' + accentColor + ';flex-shrink:0;transition:transform 0.2s ease;" onchange="this.style.transform=this.checked?\'scale(1.2)\':\'scale(1)\';setTimeout(function(){this.style.transform=\'scale(1)\'}.bind(this),200);this.parentElement.style.background=this.checked?\'#f0fdf4\':\'transparent\'">' +
        '<span style="font-size:13px;color:#1e293b;font-weight:500;line-height:1.4;flex:1;cursor:pointer;transition:color 0.2s ease;" onmouseover="this.style.color=\'#16a34a\'" onmouseout="this.style.color=\'#1e293b\'" onclick="this.previousElementSibling.click()">' + accion + '</span>' +
      '</div>';
  }

  return html;
}

function getAccionesSeleccionadas() {
  var checkboxes = document.querySelectorAll('#planAccionesChecklist input[type="checkbox"]:checked');
  var seleccionadas = [];
  for (var i = 0; i < checkboxes.length; i++) {
    seleccionadas.push(checkboxes[i].value);
  }
  return seleccionadas;
}
