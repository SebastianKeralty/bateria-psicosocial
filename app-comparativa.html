<script>
// COMPARATIVA
// ============================================================
let compBatteryIdCounter = 0;

function bLabel(b) {
    const m = b.meta;
    const name = m.name || m.fileName.replace(/\.(xlsx?|xlsb)$/i, '');
    const year = m.year ? ' ' + m.year : '';
    return name + year;
}

function bLabelShort(b, max) {
    const l = bLabel(b);
    const m = max || 20;
    return l.length > m ? l.slice(0, m-2) + '..' : l;
}

function procesarComparativa(file) {
    mostrarStatus('compStatus', 'Leyendo archivo...', 'info');
    showCompBatterySkeleton();
    const compFile = document.getElementById('comparativaFile');
    if (compFile) compFile.value = '';
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const result = procesarExcel(new Uint8Array(e.target.result), file.name);
            if (!result.rows || result.rows.length === 0) {
                hideCompBatterySkeleton();
                mostrarStatus('compStatus', 'No se encontraron datos en las hojas esperadas.', 'error');
                return;
            }
            const id = ++compBatteryIdCounter;
            const baseName = file.name.replace(/\.(xlsx?|xlsb)$/i, '');
            result.meta.id = id;
            result.meta.name = baseName;
            result.meta.year = new Date().getFullYear() + '';
            state.bateriasComparativa.push(result);
            hideCompBatterySkeleton();
            mostrarStatus('compStatus', '✔ ' + baseName + ' (' + result.meta.totalRows + ' reg.) agregada.', 'success');
            renderBatteryList();
            fadeInCards('batteryList');
            actualizarComparativa();
        } catch(err) {
            hideCompBatterySkeleton();
            mostrarStatus('compStatus', 'Error: ' + err.message, 'error');
            console.error(err);
        }
    };
    reader.onerror = function() {
        hideCompBatterySkeleton();
        mostrarStatus('compStatus', 'Error al leer el archivo', 'error');
    };
    reader.readAsArrayBuffer(file);
}

function updateBatteryMeta(id, field, value) {
    const b = state.bateriasComparativa.find(x => x.meta.id === id);
    if (b && b.meta[field] !== value) { b.meta[field] = value; actualizarComparativa(); }
}

function getStressPctFromBattery(b) {
    const stressDist = b.summary.stress || {};
    const total = b.summary.total || 0;
    if (!total) return 0;
    const crit = (stressDist["Riesgo alto"] || 0) + (stressDist["Riesgo muy alto"] || 0);
    return Math.round((crit / total) * 100);
}

function renderBatteryList() {
    const container = document.getElementById('batteryList');
    const listContainer = document.getElementById('batteryListContainer');
    const batteryCard = document.getElementById('batteryCard');

    if (state.bateriasComparativa.length === 0) {
        listContainer.style.display = 'none';
        if (batteryCard) batteryCard.style.display = 'none';
        var emptyEl = document.getElementById('compEmptyState');
        if (emptyEl) {
            emptyEl.style.display = '';
            var staggers = emptyEl.querySelectorAll('.stagger-1, .stagger-2, .stagger-3, .stagger-4');
            staggers.forEach(function(el) {
                el.style.animation = 'none';
                el.style.opacity = '0';
            });
            void emptyEl.offsetHeight;
            staggers.forEach(function(el) {
                var delay = el.classList.contains('stagger-1') ? 0.1 : el.classList.contains('stagger-2') ? 0.2 : el.classList.contains('stagger-3') ? 0.3 : 0.4;
                el.style.animation = 'cardAppear 0.6s ease-out ' + delay + 's forwards';
            });
        }
        return;
    }
    if (batteryCard) batteryCard.style.display = 'block';
    listContainer.style.display = 'block';
    listContainer.classList.add('comp-fade-in');
    var empty = document.getElementById('compEmptyState');
    if (empty) empty.style.display = 'none';

    const sorted = [...state.bateriasComparativa].sort((a, b) => (parseInt(a.meta.year) || 0) - (parseInt(b.meta.year) || 0));

    container.innerHTML = sorted.map(b => {
        const m = b.meta;
        const s = b.summary;
        const pctIntra = pctCriticoDist(s.intraGeneral, s.total);
        const pctExtra = pctCriticoDist(s.extraGeneral, s.total);
        const pctStress = getStressPctFromBattery(b);
        const barGradient = (pct) => {
            const r = clasificarCritico(pct);
            const g = {
                'Sin riesgo': 'linear-gradient(135deg, #0ea5e9, #38bdf8)',
                'Riesgo bajo': 'linear-gradient(135deg, #14b8a6, #2dd4bf)',
                'Riesgo medio': 'linear-gradient(135deg, #f59e0b, #fbbf24)',
                'Riesgo alto': 'linear-gradient(135deg, #f97316, #fb923c)',
                'Riesgo muy alto': 'linear-gradient(135deg, #dc2626, #f87171)'
            };
            return g[r.label] || r.color;
        };
        const getRiskLabel = (pct) => clasificarCritico(pct).label;
        const gIntra = barGradient(pctIntra);
        const gExtra = barGradient(pctExtra);
        const gStress = barGradient(pctStress);
        const cIntra = clasificarCritico(pctIntra).color;
        const cExtra = clasificarCritico(pctExtra).color;
        const cStress = clasificarCritico(pctStress).color;
        const titleCase = s => s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
        return `<div class="bat-card" style="padding:0;overflow:hidden;">
            <div class="bat-card-header" style="padding:24px 24px 16px;background:linear-gradient(135deg,rgba(99,102,241,0.08)0%,rgba(168,85,247,0.06)100%);text-align:center;">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                    <input class="bat-name-input" value="${(m.name || '').replace(/"/g,'&quot;')}" onchange="updateBatteryMeta(${m.id},'name',this.value)" onclick="event.stopPropagation();" placeholder="Nombre de la batería" style="flex:1;min-width:0;font-size:18px;font-weight:700;text-align:center;border:none;background:transparent;color:#1e293b;padding:4px 8px;border-radius:6px;">
                    <button class="btn-remove" onclick="event.stopPropagation();eliminarBateriaDeComparativa(${m.id})" title="Eliminar" style="flex-shrink:0;font-size:16px;margin-left:8px;">✕</button>
                </div>
                <div style="display:flex;justify-content:center;gap:12px;margin-top:12px;align-items:center;">
                    <input class="bat-year-input" value="${m.year || ''}" onchange="updateBatteryMeta(${m.id},'year',this.value)" onclick="event.stopPropagation();" placeholder="2026" style="width:60px;text-align:center;font-size:13px;font-weight:600;padding:4px 8px;border-radius:6px;">
                </div>
                <div style="margin-top:10px;font-size:14px;font-weight:700;color:#6366f1;">
                    👤 ${m.totalRows.toLocaleString()} encuestados
                </div>
            </div>
            <div class="bat-card-body" style="padding:20px 24px;">
                <div style="text-align:center;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;">Resultados de Riesgo</div>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;">
                    <div style="text-align:center;">
                        <div style="font-size:12px;font-weight:700;color:#475569;margin-bottom:8px;letter-spacing:0.5px;">INTRALABORAL</div>
                        <div style="font-size:32px;font-weight:800;color:${cIntra};line-height:1;">${pctIntra}%</div>
                        <div style="font-size:10px;font-weight:600;color:${cIntra};margin-top:4px;">${titleCase(getRiskLabel(pctIntra))}</div>
                        <div class="bat-risk-bar-bg" style="height:8px;margin-top:8px;border-radius:4px;"><div class="bat-risk-bar-fill" style="width:${pctIntra}%;background:${gIntra};border-radius:4px;"></div></div>
                    </div>
                    <div style="text-align:center;">
                        <div style="font-size:12px;font-weight:700;color:#475569;margin-bottom:8px;letter-spacing:0.5px;">EXTRALABORAL</div>
                        <div style="font-size:32px;font-weight:800;color:${cExtra};line-height:1;">${pctExtra}%</div>
                        <div style="font-size:10px;font-weight:600;color:${cExtra};margin-top:4px;">${titleCase(getRiskLabel(pctExtra))}</div>
                        <div class="bat-risk-bar-bg" style="height:8px;margin-top:8px;border-radius:4px;"><div class="bat-risk-bar-fill" style="width:${pctExtra}%;background:${gExtra};border-radius:4px;"></div></div>
                    </div>
                    <div style="text-align:center;">
                        <div style="font-size:12px;font-weight:700;color:#475569;margin-bottom:8px;letter-spacing:0.5px;">ESTRÉS</div>
                        <div style="font-size:32px;font-weight:800;color:${cStress};line-height:1;">${pctStress}%</div>
                        <div style="font-size:10px;font-weight:600;color:${cStress};margin-top:4px;">${titleCase(getRiskLabel(pctStress))}</div>
                        <div class="bat-risk-bar-bg" style="height:8px;margin-top:8px;border-radius:4px;"><div class="bat-risk-bar-fill" style="width:${pctStress}%;background:${gStress};border-radius:4px;"></div></div>
                    </div>
                </div>
            </div>
        </div>`;
    }).join('');
}

function eliminarBateriaDeComparativa(id) {
    state.bateriasComparativa = state.bateriasComparativa.filter(b => b.meta.id !== id);
    renderBatteryList();
    actualizarComparativa();
}

function limpiarComparativa() {
    state.bateriasComparativa = [];
    hideCompBatterySkeleton();
    hideCompChartSkeletons();
    renderBatteryList();
    actualizarComparativa();
    document.getElementById('compStatus').style.display = 'none';
}

function getSelectedBaterias() {
    return state.bateriasComparativa; // no checkboxes — all always selected
}

function pctCriticoDist(dist, total) {
    if (!dist || !total) return 0;
    return Math.round((((dist["Riesgo alto"]||0)+(dist["Riesgo muy alto"]||0))/total)*100);
}

function actualizarComparativa() {
    const selected = getSelectedBaterias();
    const container = document.getElementById('compContent');
    const hint = document.getElementById('compHint');

    if (selected.length < 2) {
        container.style.display = 'none';
        if (hint) hint.textContent = selected.length === 1 ? 'Selecciona al menos una bater\u00eda m\u00e1s para comparar.' : 'Carga al menos 2 bater\u00edas y selecci\u00f3nalas para ver la comparativa.';
        return;
    }
    container.style.display = 'block';
    if (hint) hint.textContent = 'Comparando ' + selected.length + ' bater\u00edas.';
    document.getElementById('btnExport').style.display = 'inline-flex';
    document.getElementById('btnExportJSON').style.display = 'inline-flex';

    showCompChartSkeletons();

    // Defer chart rendering to next frame so skeletons paint first
    requestAnimationFrame(function() {
        requestAnimationFrame(function() {
            renderTrendCard(selected);
            renderGroupedCompare('groupedIntra', 'intraGeneral', selected);
            renderGroupedCompare('groupedExtra', 'extraGeneral', selected);
            renderGroupedCompare('groupedStress', 'stress', selected, STRESS_ORDER);
            hideCompChartSkeletons();
        });
    });
}

function renderTrendCard(baterias) {
    const container = document.getElementById('trendCard');
    const body = document.getElementById('trendCardBody');
    const sorted = [...baterias].sort((a, b) => (parseInt(a.meta.year) || 0) - (parseInt(b.meta.year) || 0));
    if (sorted.length < 2) { container.style.display = 'none'; return; }
    const years = [...new Set(sorted.map(b => b.meta.year).filter(Boolean))].sort();
    if (years.length < 2) { container.style.display = 'none'; return; }
    container.style.display = 'block';

    const byYear = (year) => sorted.filter(b => b.meta.year === year);
    const pctAvg = (list, key) => {
        if (!list.length) return 0;
        const sum = list.reduce((acc, b) => acc + pctCriticoDist(b.summary[key], b.summary.total), 0);
        return Math.round(sum / list.length);
    };

    const dims = [
        { key: 'intraGeneral', label: 'Intralaboral', color: '#6366f1', bg: '#eef2ff' },
        { key: 'extraGeneral', label: 'Extralaboral', color: '#f59e0b', bg: '#fffbeb' },
        { key: 'stress',       label: 'Estr\u00e9s',  color: '#ef4444', bg: '#fef2f2' }
    ];

    var html = '<div class="trend-dims">';
    dims.forEach(function(t, idx) {
        var vals = years.map(function(y) { return pctAvg(byYear(y), t.key); });
        var last = vals[vals.length - 1];
        var prev = vals[vals.length - 2];
        var diff = last - prev;
        var arrow, arrowColor, arrowClass;
        if (diff > 0) { arrow = '\u2191'; arrowColor = '#ef4444'; arrowClass = 'is-up'; }
        else if (diff < 0) { arrow = '\u2193'; arrowColor = '#22c55e'; arrowClass = 'is-down'; }
        else { arrow = '\u2192'; arrowColor = '#94a3b8'; arrowClass = ''; }

        html += '<div class="trend-dim-card" style="animation-delay:' + (idx * 0.12) + 's;">';
        html += '<div class="tdc-accent" style="background:' + t.color + ';"></div>';
        html += '<div class="tdc-label">' + t.label + '</div>';
        html += '<div style="display:flex;align-items:center;justify-content:center;gap:2px;">';
        html += '<span class="tdc-arrow ' + arrowClass + '" style="color:' + arrowColor + ';">' + arrow + '</span>';
        html += '<span class="tdc-diff" style="color:' + arrowColor + ';">' + (diff > 0 ? '+' : '') + diff + '%</span>';
        html += '</div>';
        html += '<div class="tdc-vs">vs a\u00f1o anterior</div>';
        html += '<div class="tdc-bars">';
        var maxVal = Math.max.apply(null, vals.concat([1]));
        vals.forEach(function(pct, i) {
            var barPct = Math.round((pct / maxVal) * 100);
            var barColor;
            if (i === 0) {
                barColor = clasificarCritico(pct).color;
            } else {
                var prevPct = vals[i - 1];
                if (pct > prevPct) barColor = '#ef4444';
                else if (pct < prevPct) barColor = '#22c55e';
                else barColor = clasificarCritico(pct).color;
            }
            html += '<div class="tdc-bar-row">';
            html += '<span class="tdc-bar-year">' + years[i] + '</span>';
            html += '<div class="tdc-bar-track"><div class="tdc-bar-fill" style="--w:' + barPct + '%;width:0;background:' + barColor + ';"></div></div>';
            html += '<span class="tdc-bar-pct" style="color:' + barColor + ';">' + pct + '%</span>';
            html += '</div>';
        });
        html += '</div></div>';
    });
    html += '</div>';
    body.innerHTML = html;
}

function renderGroupedCompare(canvasId, summaryKey, baterias, riskOrder) {
    destroyChart(canvasId);
    const ctx = getChartCtx(canvasId);
    if (!ctx) return;

    const allRiskKeys = new Set();
    baterias.forEach(b => { Object.keys(b.summary[summaryKey]||{}).forEach(k => allRiskKeys.add(k)); });
    const order = riskOrder || RISK_ORDER;
    const riskLabels = order.filter(r => allRiskKeys.has(r));
    if (riskLabels.length === 0) return;

    const sorted = [...baterias].sort((a, b) => (parseInt(a.meta.year) || 0) - (parseInt(b.meta.year) || 0));

    const datasets = sorted.map((b, i) => ({
        label: bLabelShort(b),
        data: riskLabels.map(r => {
            const t = b.meta.totalRows;
            const val = (b.summary[summaryKey] && b.summary[summaryKey][r]) || 0;
            return t ? Math.round((val / t) * 100 * 10) / 10 : 0;
        }),
        backgroundColor: CHART_COLORS[i % CHART_COLORS.length] + 'cc',
        borderColor: CHART_COLORS[i % CHART_COLORS.length],
        borderWidth: 1, borderRadius: 3
    }));

    state.charts[canvasId] = new Chart(ctx, {
        type: 'bar',
        data: { labels: riskLabels, datasets },
        options: {
            responsive: true, maintainAspectRatio: true,
            scales: {
                x: { ticks: { font: { size: 10 } } },
                y: { beginAtZero: true, max: 100, ticks: { font: { size: 10 }, callback: v => v + '%' } }
            },
            plugins: {
                legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 12, padding: 10 } },
                tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y + '%' } }
            }
        }
    });
}

function abrirDrillComparativa(type) {
    if (state.bateriasComparativa.length === 0) return;
    const b = state.bateriasComparativa[0];
    closeDrillModal();
    showDrillFromComparativa(type, b);
}

function renderComparativaDrillModal(type) {
    const body = document.getElementById('modalBody');
    const baterias = state._drillComparativaBaterias || [];
    if (!baterias.length) { body.innerHTML = '<p style="color:#94a3b8;padding:40px;text-align:center;">Sin datos</p>'; return; }

    const summaryKey = type === 'intra' ? 'intraGeneral' : type === 'extra' ? 'extraGeneral' : 'stress';
    const riskOrder = type === 'stress' ? STRESS_ORDER : RISK_ORDER;

    // ── Build filters ──
    buildComparativaDrillFilters(type, baterias);

    // ── Render content ──
    renderComparativaDrillContent(baterias, summaryKey, riskOrder);
}

function buildComparativaDrillFilters(type, baterias) {
    const container = document.getElementById('modalFilters');
    container.innerHTML = '';

    const allRows = [];
    baterias.forEach(b => { if (b.rows) allRows.push(...b.rows); });

    // ── Single row: selects + search + clear ──
    const bar = document.createElement('div');
    bar.className = 'mf-quick-bar';
    bar.style.cssText = 'display:flex;flex-wrap:wrap;align-items:center;gap:5px;';

    const addSelect = (id, placeholder, col) => {
        const sel = document.createElement('select');
        sel.id = id;
        const optAll = document.createElement('option');
        optAll.value = ''; optAll.textContent = placeholder;
        sel.appendChild(optAll);
        const opts = getFilterOptions(allRows, col);
        const normArea = (s) => s.replace(/^[\d\s]+[\.\s]*/g, '').replace(/\s+/g, ' ').trim().toLowerCase();
        const used = new Set();
        opts.forEach(o => {
            const v = col === "16. Área donde trabaja" ? normArea(o) : o;
            if (!v || used.has(v)) return;
            used.add(v);
            const opt = document.createElement('option');
            opt.value = v;
            opt.textContent = col === "16. Área donde trabaja" ? v.replace(/\b\w/g, c => c.toUpperCase()) : o;
            sel.appendChild(opt);
        });
        sel.onchange = aplicarFiltrosComparativaDrill;
        bar.appendChild(sel);
    };

    // Forma
    const formaSel = document.createElement('select');
    formaSel.id = 'mfForma';
    ['', 'A', 'B'].forEach(v => {
        const opt = document.createElement('option');
        opt.value = v;
        opt.textContent = v ? 'Forma ' + v : 'Forma: Todas';
        formaSel.appendChild(opt);
    });
    formaSel.onchange = aplicarFiltrosComparativaDrill;
    bar.appendChild(formaSel);

    addSelect('mfSexo', 'Sexo: Todos', '2. Sexo');
    addSelect('mfArea', '\u00c1rea: Todas', 'Unidad de An\u00e1lisis');

    // Dominio (intra only)
    if (type === 'intra') {
        const selDom = document.createElement('select');
        selDom.id = 'mfDominio';
        const optAllDom = document.createElement('option');
        optAllDom.value = ''; optAllDom.textContent = 'Dominio: Todos';
        selDom.appendChild(optAllDom);
        const firstSummary = baterias[0] ? baterias[0].summary : null;
        const intraDims = firstSummary ? firstSummary.dimensions.filter(d => !d.name.startsWith('[Extra]') && !d.name.startsWith('[Global]') && !d.name.startsWith('[Stress]')) : [];
        const availDomains = Object.keys(DOMAIN_DIMS).filter(d => DOMAIN_DIMS[d].some(dim => intraDims.some(a => a.name === dim)));
        availDomains.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d; opt.textContent = toTitleCase(d);
            selDom.appendChild(opt);
        });
        selDom.onchange = function() {
            rebuildComparativaDimensionOptions(type, baterias);
        };
        bar.appendChild(selDom);

        // Dimensión (intra)
        const dimSel = document.createElement('select');
        dimSel.id = 'mfDimension';
        const optAllDim = document.createElement('option');
        optAllDim.value = ''; optAllDim.textContent = 'Dimensi\u00f3n: Todas';
        dimSel.appendChild(optAllDim);
        intraDims.sort((a, b) => a.name.localeCompare(b.name)).forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.name; opt.textContent = d.name;
            dimSel.appendChild(opt);
        });
        dimSel.onchange = aplicarFiltrosComparativaDrill;
        bar.appendChild(dimSel);
    }

    // Dimensión (extra only)
    if (type === 'extra') {
        const dimSel = document.createElement('select');
        dimSel.id = 'mfDimension';
        const optAllDim = document.createElement('option');
        optAllDim.value = ''; optAllDim.textContent = 'Dimensi\u00f3n: Todas';
        dimSel.appendChild(optAllDim);
        const firstSummary = baterias[0] ? baterias[0].summary : null;
        const extraDims = firstSummary ? firstSummary.dimensions.filter(d => d.name.startsWith('[Extra]')).map(d => d.name.replace('[Extra] ', '')) : [];
        extraDims.sort().forEach(d => {
            const opt = document.createElement('option');
            opt.value = d; opt.textContent = d;
            dimSel.appendChild(opt);
        });
        dimSel.onchange = aplicarFiltrosComparativaDrill;
        bar.appendChild(dimSel);
    }

    // Categoría + Pregunta (stress only)
    if (type === 'stress') {
        const catSel = document.createElement('select');
        catSel.id = 'mfStressCat';
        const optAllCat = document.createElement('option');
        optAllCat.value = ''; optAllCat.textContent = 'Categor\u00eda: Todas';
        catSel.appendChild(optAllCat);
        Object.keys(STRESS_CAT_QS).forEach(c => {
            const opt = document.createElement('option');
            opt.value = c; opt.textContent = c;
            catSel.appendChild(opt);
        });
        catSel.onchange = aplicarFiltrosComparativaDrill;
        bar.appendChild(catSel);

        const qSel = document.createElement('select');
        qSel.id = 'mfStressQ';
        const optAllQ = document.createElement('option');
        optAllQ.value = ''; optAllQ.textContent = 'Pregunta: Todas';
        qSel.appendChild(optAllQ);
        for (let i = 1; i <= 31; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            const txt = (STRESS_QUESTIONS[i] || '');
            opt.textContent = i + '. ' + (txt.length > 45 ? txt.substring(0, 42) + '...' : txt);
            qSel.appendChild(opt);
        }
        qSel.onchange = aplicarFiltrosComparativaDrill;
        bar.appendChild(qSel);
    }

    // ── Search chip ──
    const searchWrap = document.createElement('div');
    searchWrap.style.cssText = 'position:relative;display:flex;align-items:center;margin-left:auto;';
    const searchIcon = document.createElement('span');
    searchIcon.style.cssText = 'position:absolute;left:10px;color:#94a3b8;pointer-events:none;display:flex;';
    searchIcon.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>';
    const searchInput = document.createElement('input');
    searchInput.type = 'text';
    searchInput.id = 'mfBusqueda';
    searchInput.placeholder = 'Buscar\u2026';
    searchInput.style.cssText = 'padding:5px 10px 5px 26px;border:none;border-radius:20px;background:#f1f5f9;font-size:12px;width:120px;outline:none;transition:all 0.25s;';
    let debounceTimer;
    searchInput.oninput = function() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(aplicarFiltrosComparativaDrill, 300);
    };

    toggleBtn.onmouseleave = function() { if (this._open) return; this.style.background = '#f1f5f9'; };
    toggleBtn.onclick = function() {

        { id: 'mfCiudadTrab', label: 'Ciudad trabajo', col: '11. Lugar de trabajo: Ciudad' },

        const used = new Set();

        opts.forEach(o => {

            });

function rebuildComparativaDimensionOptions(type, baterias) {
    const domain = document.getElementById('mfDominio')?.value;
    const dimSel = document.getElementById('mfDimension');
    if (!dimSel) return;
    const currentVal = dimSel.value;
    dimSel.innerHTML = '<option value="">Dimensi\u00f3n: Todas</option>';
    const firstSummary = baterias[0] ? baterias[0].summary : null;
    let dims = firstSummary ? firstSummary.dimensions.filter(d => !d.name.startsWith('[Extra]') && !d.name.startsWith('[Global]') && !d.name.startsWith('[Stress]')) : [];
    if (domain && DOMAIN_DIMS[domain]) {
        dims = dims.filter(d => DOMAIN_DIMS[domain].includes(d.name));
    }
    dims.sort((a, b) => a.name.localeCompare(b.name)).forEach(d => {
        const opt = document.createElement('option');
        const dimName = d && d.name ? String(d.name) : '';
        opt.value = dimName; opt.textContent = dimName;
        dimSel.appendChild(opt);
    });
    if (currentVal) dimSel.value = currentVal;
    aplicarFiltrosComparativaDrill();
}

function aplicarFiltrosComparativaDrill() {
    const baterias = state._drillComparativaBaterias;
    if (!baterias) return;

    const forma = document.getElementById('mfForma')?.value;
    const sexo = document.getElementById('mfSexo')?.value;
    const area = document.getElementById('mfArea')?.value;
    const q = document.getElementById('mfBusqueda')?.value?.trim().toLowerCase();

    const advFields = [
        { id: 'mfEstadoCivil', col: '4. Estado civil' },
        { id: 'mfNivelEstudios', col: '5. Nivel estudios' },
        { id: 'mfEstrato', col: '8. Estrato' },
        { id: 'mfTipoVivienda', col: '9. Tipo vivienda' },
        { id: 'mfTipoCargo', col: '14. Tipo de cargo' },
        { id: 'mfAntiguedadEmp', col: '12. Antigüedad en la empresa' },
        { id: 'mfAntiguedadCargo', col: '15. Antigüedad en el cargo' },
        { id: 'mfTipoContrato', col: '17. Tipo de contrato' },
        { id: 'mfHorasDiarias', col: '18. Horas diarias de trabajo' },
        { id: 'mfTipoSalario', col: '19. Tipo de salario' },
        { id: 'mfNivelCargo', col: 'Nivel de cargo del trabajador' },
        { id: 'mfAreaTrabajo', col: '16. Área donde trabaja' },
        { id: 'mfCiudadRes', col: '7. Lugar de residencia: Ciudad' },
        { id: 'mfDptoRes', col: '7. Lugar de residencia: Departamento' },
        { id: 'mfCiudadTrab', col: '11. Lugar de trabajo: Ciudad' },
        { id: 'mfDptoTrab', col: '11. Lugar de trabajo: Departamento' }
    ];

    const searchCols = ["ID", "Nombre completo del trabajador", "13. Cargo", "No. Encuesta"];

    const _normArea = (s) => s.replace(/^[\d\s]+[\.\s]*/g, '').replace(/\s+/g, ' ').trim().toLowerCase();
    const activeAdv = advFields.map(f => ({
        f, val: document.getElementById(f.id)?.value
    })).filter(x => x.val);

    const filtered = baterias.map(b => {
        let rows = b.rows || [];

        if (q || forma || sexo || area) {
            rows = rows.filter(r => {
                if (q && !searchCols.some(col => String(r[col] || '').trim().toLowerCase().includes(q))) return false;
                if (forma && String(r["_forma"] || '').trim() !== forma) return false;
                if (sexo && String(r["2. Sexo"] || '').trim() !== sexo) return false;
                if (area && String(r["Unidad de Análisis"] || '').trim() !== area) return false;
                return true;
            });
        }

        if (activeAdv.length > 0) {
            rows = rows.filter(r => {
                for (const { f, val } of activeAdv) {
                    const cell = String(r[f.col] || '').trim();
                    if (f.col === "16. Área donde trabaja") {
                        if (_normArea(cell) !== val) return false;
                    } else {
                        if (cell !== val) return false;
                    }
                }
                return true;
            });
        }

        return { battery: b, rows, summary: computeSummary(rows) };
    });

    const type = state._drillType;
    const summaryKey = type === 'intra' ? 'intraGeneral' : type === 'extra' ? 'extraGeneral' : 'stress';
    const riskOrder = type === 'stress' ? STRESS_ORDER : RISK_ORDER;
    renderComparativaDrillContent(filtered, summaryKey, riskOrder);
}

function renderComparativaDrillContent(filteredBaterias, summaryKey, riskOrder) {
    const body = document.getElementById('modalBody');
    destroyChart('comparativaLineChart');
    destroyChart('comparativaBarChart');
    destroyChart('compRadarCombined');
    destroyChart('compLineCombined');
    body.innerHTML = '';

    if (!filteredBaterias.length) { body.innerHTML = '<p style="color:#94a3b8;padding:40px;text-align:center;">Sin datos</p>'; return; }

    const drillType = summaryKey === 'intraGeneral' ? 'intra' : summaryKey === 'extraGeneral' ? 'extra' : 'stress';

    // Normalize: handle both { battery, rows, summary } and raw battery objects
    const baterias = filteredBaterias.map(fb => fb.battery ? fb : { battery: fb, rows: fb.rows, summary: fb.summary });

    // ── Compute shared data ──
    const dimFilter = document.getElementById('mfDimension')?.value;
    const domainFilter = document.getElementById('mfDominio')?.value;
    let availableDims = baterias[0].summary.dimensions.filter(d => d.risk && Object.keys(d.risk).length > 0);
    if (drillType === 'intra') availableDims = availableDims.filter(d => !d.name.startsWith('[Extra]') && !d.name.startsWith('[Global]') && !d.name.startsWith('[Stress]'));
    else if (drillType === 'extra') availableDims = availableDims.filter(d => d.name.startsWith('[Extra]'));
    else if (drillType === 'stress') {
        availableDims = availableDims.filter(d => d.name.startsWith('[Stress]'));
        const questions = baterias[0].summary.stressQuestions || [];
        for (const q of questions) {
            const num = parseInt(q.name.replace('Estrés ', ''));
            const text = STRESS_QUESTIONS[num] || '';
            availableDims.push({
                name: q.name,
                fullName: `${num}. ${text}`,
                risk: q.risk,
                avgT: null,
                _isStressQuestion: true
            });
        }
    }
    if (domainFilter && DOMAIN_DIMS[domainFilter]) {
        availableDims = availableDims.filter(d => DOMAIN_DIMS[domainFilter].includes(d.name));
    }
    if (dimFilter) {
        availableDims = availableDims.filter(d => {
            const dName = drillType === 'extra' ? d.name.replace('[Extra] ', '') : d.name;
            return dName === dimFilter;
        });
    }
    if (drillType === 'stress') {
        const catFilter = document.getElementById('mfStressCat')?.value;
        const qFilter = document.getElementById('mfStressQ')?.value;
        if (catFilter) {
            const qNums = STRESS_CAT_QS[catFilter] || [];
            availableDims = availableDims.filter(d => {
                if (d._isStressQuestion) {
                    const num = parseInt(d.name.replace('Estr\u00e9s ', ''));
                    return qNums.includes(num);
                }
                return d.name === '[Stress] ' + catFilter;
            });
        }
        if (qFilter) {
            const qNum = parseInt(qFilter);
            availableDims = availableDims.filter(d => {
                if (d._isStressQuestion) return parseInt(d.name.replace('Estr\u00e9s ', '')) === qNum;
                return false;
            });
        }
    }
    if (availableDims.length === 0) { body.innerHTML = '<p style="color:#94a3b8;padding:40px;text-align:center;">Sin dimensiones</p>'; return; }

    // Compute critical % per battery per dimension
    const critPctMap = {};
    for (const fb of baterias) {
        const id = fb.battery.meta.id;
        critPctMap[id] = {};
        for (const dim of availableDims) {
            let match;
            if (dim._isStressQuestion) {
                match = fb.summary.stressQuestions.find(q => q.name === dim.name);
            } else {
                match = fb.summary.dimensions.find(dd => dd.name === dim.name);
            }
            const riskDist = match ? match.risk : {};
            const total = Object.values(riskDist).reduce((a, b) => a + b, 0);
            const crit = (riskDist["Riesgo alto"] || 0) + (riskDist["Riesgo muy alto"] || 0);
            critPctMap[id][dim.name] = total ? Math.round(crit / total * 100) : 0;
        }
    }

    // Sort batteries ASC by year (oldest → newest left → right)
    const sortedBaterias = [...baterias].sort((a, b) => (parseInt(a.battery.meta.year) || 0) - (parseInt(b.battery.meta.year) || 0));

    // ── CHART MODE ──
    if (state._compViewMode === 'chart') {
        renderComparativaLineChart(sortedBaterias, availableDims, critPctMap, summaryKey, riskOrder);
        return;
    }

    // ── CARDS ──
    let cardsHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:18px;">';
    for (const fb of baterias) {
        const b = fb.battery;
        const s = fb.summary;
        const m = b.meta;
        const dist = s[summaryKey] || {};
        const distTotal = riskOrder.reduce((sum, r) => sum + (dist[r] || 0), 0);
        const critCount = (dist["Riesgo alto"] || 0) + (dist["Riesgo muy alto"] || 0);
        const totalRows = s.total || distTotal;
        const critPct = totalRows ? Math.round(critCount / totalRows * 100) : 0;
        const critColor = clasificarCritico(critPct).color;

        cardsHtml += '<div class="drill-card">';
        cardsHtml += '<div style="font-weight:700;font-size:15px;color:#1e293b;margin-bottom:4px;">' + (m.name || 'Sin nombre') + '</div>';
        cardsHtml += '<div style="margin-bottom:12px;"><span style="background:linear-gradient(135deg,#6366f1,#a78bfa);color:#fff;border-radius:6px;padding:2px 14px;font-size:12px;font-weight:700;display:inline-block;">' + (m.year || '?') + '</span></div>';
        const titleCase = s => s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
        cardsHtml += '<div style="margin-bottom:2px;font-size:34px;font-weight:800;color:' + critColor + ';line-height:1.1;">' + critPct + '%</div>';
        cardsHtml += '<div style="font-size:12px;font-weight:600;color:' + critColor + ';margin-bottom:6px;letter-spacing:0.5px;">' + titleCase(clasificarCritico(critPct).label) + '</div>';
        cardsHtml += '<div style="font-size:12px;color:#64748b;margin-bottom:12px;">👤 ' + totalRows.toLocaleString() + ' encuestados</div>';
        cardsHtml += '<div style="height:1px;background:#e2e8f0;margin-bottom:10px;"></div>';
        cardsHtml += '<div style="text-align:left;">';
        for (const r of riskOrder) {
            const cnt = dist[r] || 0;
            const pct = distTotal ? Math.round(cnt / distTotal * 100) : 0;
            const rc = riskColor(r);
            if (pct > 0) {
                cardsHtml += '<div class="bat-risk-row" style="margin-bottom:2px;">';
                cardsHtml += '<span class="lbl" style="font-size:11px;width:90px;">' + titleCase(r) + '</span>';
                cardsHtml += '<div class="bat-risk-bar-bg"><div class="bat-risk-bar-fill" style="width:' + pct + '%;background:' + (rc ? rc.bg : '#e2e8f0') + '"></div></div>';
                cardsHtml += '<span class="pct" style="font-size:11px;color:' + (rc ? rc.text : '#475569') + '">' + pct + '%</span>';
                cardsHtml += '</div>';
            }
        }
        cardsHtml += '</div></div>';
    }
    cardsHtml += '</div>';
    body.innerHTML = cardsHtml;

    // ── Sort dimensions ──
    const sortedDims = [...availableDims];
    if (state._compSortCol) {
        sortedDims.sort((a, b) => {
            let va, vb;
            if (state._compSortCol === 'dim') {
                va = a.name; vb = b.name;
                return va.localeCompare(vb) * state._compSortDir;
            } else if (state._compSortCol === 'trend') {
                const ni = sortedBaterias.length - 1, oi = sortedBaterias.length - 2;
                if (oi < 0) return 0;
                const idN = sortedBaterias[ni]?.battery?.meta?.id;
                const idO = sortedBaterias[oi]?.battery?.meta?.id;
                va = (critPctMap[idN]?.[a.name] || 0) - (critPctMap[idO]?.[a.name] || 0);
                vb = (critPctMap[idN]?.[b.name] || 0) - (critPctMap[idO]?.[b.name] || 0);
                return (va - vb) * state._compSortDir;
            } else {
                va = critPctMap[state._compSortCol]?.[a.name] || 0;
                vb = critPctMap[state._compSortCol]?.[b.name] || 0;
                return (va - vb) * state._compSortDir;
            }
        });
    }

    // ── Heatmap with sortable headers ──
    const sortInd = (col) => state._compSortCol === col ? (state._compSortDir === 1 ? ' ▴' : ' ▾') : '';

    let html = '<div class="table-wrap" style="margin-top:12px;"><table style="width:100%;border-collapse:collapse;font-size:12px;">';
    html += '<thead><tr style="background:#f1f5f9;">';
    html += '<th onclick="sortComparativaHeatmap(\'dim\')" style="cursor:pointer;padding:6px 8px;text-align:left;border-bottom:1px solid #e2e8f0;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.3px;color:#475569;user-select:none;">Dimensión' + sortInd('dim') + '</th>';
    for (const fb of sortedBaterias) {
        const colId = fb.battery.meta.id;
        const bLabel = (fb.battery.meta.year || '') + ' ' + (fb.battery.meta.name || '').substring(0,12);
        html += '<th onclick="sortComparativaHeatmap(\'' + colId + '\')" style="cursor:pointer;padding:6px 8px;text-align:center;border-bottom:1px solid #e2e8f0;font-weight:600;font-size:11px;white-space:nowrap;color:#475569;user-select:none;">' + bLabel.trim() + sortInd(colId) + '</th>';
    }
    html += '<th onclick="sortComparativaHeatmap(\'trend\')" style="cursor:pointer;padding:6px 8px;text-align:center;border-bottom:1px solid #e2e8f0;font-weight:600;font-size:11px;white-space:nowrap;color:#475569;user-select:none;">Tendencia' + sortInd('trend') + '</th>';
    html += '</tr></thead><tbody>';

    let rowNum = 0;
    for (const dim of sortedDims) {
        const rowBg = rowNum % 2 === 0 ? '#fff' : '#f8fafc';
        const displayName = (dim.fullName || dim.name).replace('[Extra] ', '').replace('[Stress] ', '');
        html += '<tr style="background:' + rowBg + ';"><td style="padding:5px 8px;border-bottom:1px solid #f1f5f9;font-weight:600;color:#1e293b;font-size:12px;">' + displayName + '</td>';
        for (const fb of sortedBaterias) {
            let match;
            if (dim._isStressQuestion) {
                match = fb.summary.stressQuestions.find(q => q.name === dim.name);
            } else {
                match = fb.summary.dimensions.find(dd => dd.name === dim.name);
            }
            const riskDist = match ? match.risk : {};
            const total = Object.values(riskDist).reduce((a, b) => a + b, 0);
            const crit = (riskDist["Riesgo alto"] || 0) + (riskDist["Riesgo muy alto"] || 0);
            const cp = total ? Math.round(crit / total * 100) : 0;
            const titleCase = s => s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
            const baremo = clasificarCritico(cp);
            html += '<td style="padding:5px 6px;border-bottom:1px solid #f1f5f9;text-align:center;background:' + baremo.bg + ';">';
            html += '<span style="font-weight:600;font-size:11px;color:' + baremo.color + ';">' + titleCase(baremo.label) + '</span>';
            html += '<br><span style="font-size:10px;color:' + baremo.color + ';font-weight:500;">' + cp + '% crit.</span>';
            html += '</td>';
        }

        // Trend column (compare rightmost = newest vs second-to-last)
        if (sortedBaterias.length >= 2) {
            const ni = sortedBaterias.length - 1, oi = sortedBaterias.length - 2;
            const newest = critPctMap[sortedBaterias[ni].battery.meta.id]?.[dim.name] || 0;
            const older = critPctMap[sortedBaterias[oi].battery.meta.id]?.[dim.name] || 0;
            let arrow, arrowColor;
            if (newest > older) { arrow = '↑'; arrowColor = '#ef4444'; }
            else if (newest < older) { arrow = '↓'; arrowColor = '#22c55e'; }
            else { arrow = '→'; arrowColor = '#94a3b8'; }
            const diff = newest - older;
            html += '<td style="padding:5px 6px;border-bottom:1px solid #f1f5f9;text-align:center;font-weight:700;font-size:13px;color:' + arrowColor + ';">' + arrow + ' <span style="font-size:10px;font-weight:600;">' + (diff > 0 ? '+' : '') + diff + '%</span></td>';
        } else {
            html += '<td style="padding:5px 6px;border-bottom:1px solid #f1f5f9;text-align:center;color:#94a3b8;font-size:11px;">—</td>';
        }

        html += '</tr>';
        rowNum++;
    }
    html += '</tbody></table></div>';
    body.innerHTML += html;
}

function renderComparativaLineChart(sortedBaterias, availableDims, critPctMap, summaryKey, riskOrder) {
    const body = document.getElementById('modalBody');
    body.innerHTML = '';

    var sortedDims = availableDims.slice();
    var dimSortKey = state._compDimSortDir || 0;
    if (dimSortKey !== 0) {
        var firstId = sortedBaterias[0].battery.meta.id;
        sortedDims.sort(function(a, b) {
            var va = critPctMap[firstId]?.[a.name] || 0;
            var vb = critPctMap[firstId]?.[b.name] || 0;
            return dimSortKey === 1 ? va - vb : vb - va;
        });
    }

    var sortBar = document.createElement('div');
    sortBar.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;';
    sortBar.innerHTML = '<span style="font-size:12px;font-weight:600;color:#475569;">Dimensiones: </span>' +
        '<button id="sortDimsBtn" style="padding:4px 12px;border:1px solid #cbd5e1;border-radius:6px;background:white;font-size:11px;font-weight:600;color:#475569;cursor:pointer;">' +
        ({'0':'📊 Orden original','1':'⬆️ Menor a mayor','-1':'⬇️ Mayor a menor'}[String(dimSortKey)]||'📊 Orden original') + '</button>';
    sortBar.querySelector('button').onclick = function() {
        var cur = state._compDimSortDir || 0;
        state._compDimSortDir = cur === 0 ? 1 : cur === 1 ? -1 : 0;
        aplicarFiltrosComparativaDrill();
    };
    body.appendChild(sortBar);

    // Bar chart
    var dimLabels = sortedDims.map(function(d) {
        var l = (d.fullName||d.name).replace('[Extra] ','').replace('[Stress] ','');
        return l.length > 25 ? l.substring(0,22)+'...' : l;
    });
    var barCanv = document.createElement('canvas');
    barCanv.id = 'comparativaBarChart';
    barCanv.style.cssText = 'width:100%;height:260px;margin-bottom:10px;max-height:260px;';
    body.appendChild(barCanv);
    destroyChart('comparativaBarChart');
    state.charts['comparativaBarChart'] = new Chart(barCanv.getContext('2d'), {
        type: 'bar',
        data: {
            labels: dimLabels,
            datasets: sortedBaterias.map(function(fb, i) { return {
                label: (fb.battery.meta.year||'') + ' ' + (fb.battery.meta.name||'').substring(0,10),
                data: sortedDims.map(function(dim) { return critPctMap[fb.battery.meta.id]?.[dim.name]||0; }),
                backgroundColor: CHART_COLORS[i % CHART_COLORS.length] + 'cc',
                borderColor: CHART_COLORS[i % CHART_COLORS.length], borderWidth: 1, borderRadius: 3
            };})
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            onHover: function(e) {
                var point = e.chart.getElementsAtEventForMode(e, 'index', {intersect: false}, false);
                e.native.target.style.cursor = point.length ? 'pointer' : 'default';
            },
            scales: { x: { ticks: { font: {size:9} }, grid: {display:false} }, y: { beginAtZero:true, max:100, ticks: {font:{size:9}, callback: function(v) { return v+'%';} } } },
            plugins: {
                legend: { position:'bottom', labels: {font:{size:9}, boxWidth:10, padding:6} },
                tooltip: {
                    mode: 'index',
                    intersect: false,
                    backgroundColor: 'rgba(255,255,255,0.95)',
                    titleColor: '#1e293b',
                    bodyColor: '#475569',
                    borderColor: '#e2e8f0',
                    borderWidth: 1,
                    padding: 10,
                    cornerRadius: 8,
                    callbacks: {
                        title: function(items) { return items[0].label; },
                        label: function(ctx) {
                            var val = ctx.parsed.y;
                            var baremo = clasificarCritico(val);
                            return ' ' + ctx.dataset.label + ': ' + val + '% [' + baremo.label + ']';
                        }
                    }
                }
            },
            hover: {
                mode: 'index',
                intersect: false,
                animationDuration: 200
            }
        }
    });

    // Radar + Line side by side
    var bottomRow = document.createElement('div');
    bottomRow.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:6px;max-height:300px;';
    body.appendChild(bottomRow);

    // ── Radar ──
    var rCol = document.createElement('div');
    rCol.style.cssText = 'max-height:300px;overflow:hidden;';
    rCol.innerHTML = '<div style="font-size:12px;font-weight:700;color:#475569;margin-bottom:4px;">📡 Radar</div>';
    var radarCanv = document.createElement('canvas');
    radarCanv.id = 'compRadarCombined';
    radarCanv.style.cssText = 'width:100%;height:260px;';
    rCol.appendChild(radarCanv);
    bottomRow.appendChild(rCol);

    var rDims = sortedDims.slice(0, 8);
    var rLabels = rDims.map(function(d) {
        var l = (d.fullName||d.name).replace('[Extra] ','').replace('[Stress] ','');
        return l.length > 18 ? l.substring(0,16)+'…' : l;
    });
    destroyChart('compRadarCombined');
    state.charts['compRadarCombined'] = new Chart(radarCanv.getContext('2d'), {
        type: 'radar',
        data: {
            labels: rLabels,
            datasets: sortedBaterias.map(function(fb, i) { return {
                label: (fb.battery.meta.year||'') + ' ' + (fb.battery.meta.name||'').substring(0,8),
                data: rDims.map(function(dim) { return critPctMap[fb.battery.meta.id]?.[dim.name]||0; }),
                backgroundColor: CHART_COLORS[i % CHART_COLORS.length] + '22',
                borderColor: CHART_COLORS[i % CHART_COLORS.length],
                borderWidth: 2,
                pointBackgroundColor: CHART_COLORS[i % CHART_COLORS.length],
                pointRadius: 3
            };})
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            onHover: function(e) {
                var point = e.chart.getElementsAtEventForMode(e, 'nearest', {intersect: true}, false);
                e.native.target.style.cursor = point.length ? 'pointer' : 'default';
            },
            scales: { r: { beginAtZero: true, max: 100, ticks: { font: {size:9}, backdropColor:'transparent' }, grid: {color:'#e2e8f0'}, angleLines: {color:'#e2e8f0'}, pointLabels: {font:{size:9}} } },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(255,255,255,0.95)',
                    titleColor: '#1e293b',
                    bodyColor: '#475569',
                    borderColor: '#e2e8f0',
                    borderWidth: 1,
                    padding: 8,
                    cornerRadius: 8,
                    callbacks: {
                        label: function(ctx) {
                            var val = ctx.parsed.r;
                            var baremo = clasificarCritico(val);
                            return ' ' + ctx.dataset.label + ': ' + val + '% [' + baremo.label + ']';
                        }
                    }
                }
            },
            hover: { animationDuration: 200 }
        }
    });

    // ── Line chart ──
    var lCol = document.createElement('div');
    lCol.style.cssText = 'max-height:300px;overflow:hidden;';
    lCol.innerHTML = '<div style="font-size:12px;font-weight:700;color:#475569;margin-bottom:4px;">📈 Tendencia</div>';
    var lineCanv = document.createElement('canvas');
    lineCanv.id = 'compLineCombined';
    lineCanv.style.cssText = 'width:100%;height:260px;';
    lCol.appendChild(lineCanv);
    bottomRow.appendChild(lCol);

    var lineLabels = sortedBaterias.map(function(fb) { return fb.battery.meta.year || fb.battery.meta.name || '?'; });
    var lineDatasets = rDims.map(function(dim, i) {
        var label = (dim.fullName||dim.name).replace('[Extra] ','').replace('[Stress] ','');
        return {
            label: label.length > 20 ? label.substring(0,18)+'…' : label,
            data: sortedBaterias.map(function(fb) { return critPctMap[fb.battery.meta.id]?.[dim.name]||0; }),
            borderColor: CHART_COLORS[i % CHART_COLORS.length],
            backgroundColor: CHART_COLORS[i % CHART_COLORS.length] + '22',
            pointBackgroundColor: CHART_COLORS[i % CHART_COLORS.length],
            pointRadius: 3,
            pointHoverRadius: 5,
            borderWidth: 2,
            tension: 0.3,
            fill: false
        };
    });
    destroyChart('compLineCombined');
    state.charts['compLineCombined'] = new Chart(lineCanv.getContext('2d'), {
        type: 'line',
        data: { labels: lineLabels, datasets: lineDatasets },
        options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { intersect: false, mode: 'index' },
            onHover: function(e) {
                var point = e.chart.getElementsAtEventForMode(e, 'index', {intersect: false}, false);
                e.native.target.style.cursor = point.length ? 'pointer' : 'default';
            },
            scales: {
                x: { ticks: { font: {size:10} }, grid: {display:false} },
                y: { beginAtZero: true, max: 100, ticks: { font: {size:9}, callback: function(v) { return v+'%';} }, grid: {color:'#f1f5f9'} }
            },
            plugins: {
                legend: { position:'bottom', labels: {font:{size:8}, boxWidth:8, padding:4} },
                tooltip: {
                    mode: 'index',
                    intersect: false,
                    backgroundColor: 'rgba(255,255,255,0.95)',
                    titleColor: '#1e293b',
                    bodyColor: '#475569',
                    borderColor: '#e2e8f0',
                    borderWidth: 1,
                    padding: 8,
                    cornerRadius: 8,
                    itemSort: function(a, b) { return b.parsed.y - a.parsed.y; },
                    callbacks: {
                        label: function(ctx) {
                            var val = ctx.parsed.y;
                            var baremo = clasificarCritico(val);
                            return ' ' + ctx.dataset.label + ': ' + val + '% [' + baremo.label + ']';
                        }
                    }
                }
            },
            hover: { mode: 'index', intersect: false, animationDuration: 200 }
        }
    });
}
</script>
