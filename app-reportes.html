<script>
// ============================================================
// REPORTES — PDF, Word, PPT, Init
// ============================================================
function renderComparisonTable(baterias) {
    const container = document.getElementById('comparisonTable');
    const dims = baterias[0].summary.dimensions.filter(d => d.risk && Object.keys(d.risk).length > 0 && !d.name.startsWith('[Stress] '));
    if (dims.length === 0) { container.innerHTML = '<p style="color:#94a3b8;">Sin datos</p>'; return; }

    let html = '<div class="table-wrap"><table><thead><tr><th>Dimensi\u00f3n</th>';
    baterias.forEach(b => { html += `<th>${bLabelShort(b)}</th>`; });
    html += '</tr></thead><tbody>';

    for (const dim of dims) {
        html += `<tr><td><strong>${dim.name.length > 50 ? dim.name.slice(0,47)+'...' : dim.name}</strong></td>`;
        for (const b of baterias) {
            const match = b.summary.dimensions.find(dd => dd.name === dim.name);
            const tVal = match && match.avgT !== null ? match.avgT : '-';
            const riskDist = match ? match.risk : {};
            const dominantRisk = orderRiskKeys(riskDist).reduce((a, b) => (riskDist[a]||0) > (riskDist[b]||0) ? a : b, '-');
            const rc = riskColor(dominantRisk);
            const titleCase = s => s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
            html += `<td><span class="badge ${rc ? rc.cls : 'risk-error'}">${titleCase(dominantRisk)}</span> <span style="color:#64748b;font-size:12px;">${tVal !== '-' ? 'T:'+tVal : ''}</span></td>`;
        }
        html += '</tr>';
    }
    html += '</tbody></table></div>';
    container.innerHTML = html;
}

// ============================================================
// REPORTES
// ============================================================
function _showReportStatus(msg, tipo) {
    const el = document.getElementById('reportStatus');
    if (!el) return;
    el.textContent = msg;
    el.className = 'status-msg ' + tipo;
    el.style.display = 'block';
}

function _captureChart(canvasId) {
    const canvas = document.getElementById(canvasId);
    if (!canvas || !canvas.getContext) return null;
    try { return canvas.toDataURL('image/png'); } catch(e) { return null; }
}

function _dataUrlToBytes(dataUrl) {
    const bin = atob(dataUrl.split(',')[1]);
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    return buf;
}

function _downloadBlob(blob, name) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 10000);
}

let _reportHistory = [];

function _addToHistory(filename) {
}

function _buildPreview() {
    var pdfTrack = document.getElementById('previewTrackPdf');
    var pptTrack = document.getElementById('previewTrackPpt');
    if (pdfTrack && !pdfTrack.children.length) {
        var pageColors = ['#16a34a','#f59e0b','#3b82f6','#8b5cf6','#ec4899','#14b8a6'];
        var pagePcts = [42, 28, 58, 35, 45, 50];
        var makePage = function(idx) {
            var c = pageColors[idx % 6];
            var p = pagePcts[idx % 6];
            return '<div class="preview-page" style="width:100%;min-height:120px;padding:10px 12px;margin-bottom:8px;"><div style="font-size:8px;font-weight:700;color:#374151;margin-bottom:6px;">Pag ' + (idx+1) + '</div><div style="height:4px;background:#e2e8f0;border-radius:2px;margin-bottom:4px;width:70%;"></div><div style="height:16px;background:' + c + ';border-radius:4px;margin-bottom:6px;width:100%;"></div><div style="height:4px;background:' + c + ';border-radius:2px;width:55%;opacity:0.4;margin-bottom:4px;"></div><div style="font-size:8px;font-weight:700;color:' + c + ';">' + p + '%</div></div>';
        };
        var buildCol = function(startIdx, step, anim) {
            var h = '';
            for (var i = 0; i < 4; i++) {
                h += makePage(startIdx + i * step);
            }
            return '<div style="flex:1;display:flex;flex-direction:column;animation:' + anim + ' 12s linear infinite;" onmouseover="this.style.animationPlayState=\'paused\'" onmouseout="this.style.animationPlayState=\'running\'">' + h + h + '</div>';
        };
        pdfTrack.innerHTML = buildCol(0, 1, 'scrollUp') + buildCol(3, -1, 'scrollDown') + buildCol(5, 1, 'scrollUp');
        pdfTrack.style.display = 'flex';
        pdfTrack.style.flexDirection = 'row';
        pdfTrack.style.gap = '10px';
        pdfTrack.style.padding = '4px 0';
    }
    if (pptTrack && !pptTrack.children.length) {
        var slides = [
            { t: 'PORTADA', s: 'Keralty Vital', d: [42, 28, 58], bg: '#14532d' },
            { t: 'INTRALABORAL', s: '4 Dominios', d: [42, 35, 50], bg: '#1e40af' },
            { t: 'EXTRALABORAL', s: '7 Dimensiones', d: [28, 18, 38], bg: '#7c3aed' },
            { t: 'ESTRES', s: '4 Categorias', d: [58, 30, 45], bg: '#be123c' },
            { t: 'CONCLUSIONES', s: 'Recomendaciones', d: [55, 40, 62], bg: '#b45309' },
            { t: 'RESULTADOS', s: 'Generales', d: [38, 25, 48], bg: '#0f766e' }
        ];
        var h = '';
        for (var i = 0; i < 6; i++) {
            var s = slides[i];
            var prom = Math.round((s.d[0]+s.d[1]+s.d[2])/3);
            var bars =
                '<div style="display:flex;gap:8px;margin-top:10px;">' +
                    '<div style="flex:1;text-align:center;"><div style="font-size:15px;font-weight:900;color:white;">' + s.d[0] + '</div><div style="height:8px;background:rgba(255,255,255,0.15);border-radius:4px;overflow:hidden;margin-top:4px;"><div style="height:100%;width:' + s.d[0] + '%;background:#22c55e;border-radius:4px;"></div></div><div style="font-size:8px;color:rgba(255,255,255,0.5);margin-top:3px;">Intra</div></div>' +
                    '<div style="flex:1;text-align:center;"><div style="font-size:15px;font-weight:900;color:white;">' + s.d[1] + '</div><div style="height:8px;background:rgba(255,255,255,0.15);border-radius:4px;overflow:hidden;margin-top:4px;"><div style="height:100%;width:' + s.d[1] + '%;background:#fbbf24;border-radius:4px;"></div></div><div style="font-size:8px;color:rgba(255,255,255,0.5);margin-top:3px;">Extra</div></div>' +
                    '<div style="flex:1;text-align:center;"><div style="font-size:15px;font-weight:900;color:white;">' + s.d[2] + '</div><div style="height:8px;background:rgba(255,255,255,0.15);border-radius:4px;overflow:hidden;margin-top:4px;"><div style="height:100%;width:' + s.d[2] + '%;background:#60a5fa;border-radius:4px;"></div></div><div style="font-size:8px;color:rgba(255,255,255,0.5);margin-top:3px;">Stress</div></div>' +
                '</div>';
            h += '<div class="preview-slide" style="width:280px;min-height:250px;padding:18px 20px;margin-right:22px;background:linear-gradient(135deg,' + s.bg + ',' + s.bg + 'cc);flex-shrink:0;border:1px solid rgba(255,255,255,0.15);"><div style="position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 20% 80%,rgba(255,255,255,0.08),transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(0,0,0,0.1),transparent 50%);"></div><div style="position:relative;z-index:1;"><div style="font-size:14px;font-weight:800;color:white;letter-spacing:0.5px;">' + s.t + '</div><div style="font-size:8px;color:rgba(255,255,255,0.5);margin-bottom:8px;">' + s.s + '</div><div style="font-size:32px;font-weight:900;color:white;line-height:1.1;">' + prom + '%</div><div style="font-size:8px;color:rgba(255,255,255,0.4);margin-bottom:6px;">psicosocial</div>' + bars + '</div></div>';
        }
        pptTrack.innerHTML = h + h;
    }
}

function actualizarPreview() {
    _buildPreview();
    var sel = document.getElementById('reportFormat');
    if (!sel) return;
    var pdfTrack = document.getElementById('previewTrackPdf');
    var pptTrack = document.getElementById('previewTrackPpt');
    if (!pdfTrack || !pptTrack) return;
    if (sel.value === 'pdf' || sel.value === 'word') {
        pdfTrack.style.display = 'flex';
        pptTrack.style.display = 'none';
    } else {
        pdfTrack.style.display = 'none';
        pptTrack.style.display = 'flex';
    }
}

function _getSelectedSections() {
    return {
        resumen: document.getElementById('rptResumen')?.checked ?? true,
        intra: document.getElementById('rptIntra')?.checked ?? true,
        extra: document.getElementById('rptExtra')?.checked ?? true,
        stress: document.getElementById('rptStress')?.checked ?? true,
        dimTable: document.getElementById('rptDimTable')?.checked ?? true
    };
}

function _loadLib(url) {
    return new Promise((resolve, reject) => {
        if (document.querySelector('script[src="' + url + '"]')) { resolve(); return; }
        const s = document.createElement('script');
        s.src = url; s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
    });
}



function generarReporte() {
    if (!state.bateriaActiva) {
        _showReportStatus('No hay datos cargados.', 'error');
        return;
    }
    const fmt = document.getElementById('reportFormat').value;
    const btn = document.getElementById('btnGenerarReporte');
    btn.disabled = true; btn.style.opacity = '0.6';
    _showReportStatus('Generando reporte...', 'info');

    setTimeout(async () => {
        try {
            const data = state.bateriaActiva;
            const s = data.summary;
            const baseName = data.meta.fileName.replace(/\.(xlsx?|xlsb)$/i, '');
            const sections = _getSelectedSections();
            const charts = {
                intra: _captureChart('intraBars'),
                extra: _captureChart('extraBars'),
                stress: _captureChart('stressBars')
            };

            if (fmt === 'pdf') {
                await _loadLib('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
                _generarPDF(data, s, charts, baseName, sections);
            } else if (fmt === 'word') {
                await _loadLib('https://cdn.jsdelivr.net/npm/docx/build/index.umd.min.js');
                await _generarWord(data, s, charts, baseName, sections);
            } else if (fmt === 'ppt') {
                await _loadLib('https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js');
                await _generarPPT(data, s, charts, baseName, sections);
            }

            _showReportStatus('Reporte generado: ' + baseName + '.' + fmt, 'success');
            _addToHistory(baseName + '.' + fmt);
        } catch (err) {
            _showReportStatus('Error: ' + err.message, 'error');
            console.error(err);
        }
        btn.disabled = false; btn.style.opacity = '1';
    }, 150);
}

// ── PDF ──
function _generarPDF(data, s, charts, baseName, sections) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');
    const pw = 190; // page width - margins
    const margin = 10;
    let y = margin;

    const addText = (text, size, opts) => {
        if (y > 270) { doc.addPage(); y = margin; }
        doc.setFontSize(size || 11);
        doc.text(text, margin, y, opts || {});
        y += (size || 11) * 0.5;
    };

    const addLine = () => {
        if (y > 275) { doc.addPage(); y = margin; }
        doc.setDrawColor(200, 200, 200);
        doc.line(margin, y, margin + pw, y);
        y += 4;
    };

    const addImg = (dataUrl, maxH) => {
        if (!dataUrl) return;
        const imgH = maxH || 60;
        const imgW = pw;
        if (y + imgH > 275) { doc.addPage(); y = margin; }
        try { doc.addImage(dataUrl, 'PNG', margin, y, imgW, imgH); y += imgH + 4; } catch(e) {}
    };

    // Title
    doc.setFontSize(18);
    doc.text('Bater\u00eda Psicosocial - Reporte', 105, y + 6, { align: 'center' });
    y += 14;
    doc.setFontSize(10);
    doc.text('Archivo: ' + data.meta.fileName, margin, y);
    y += 5;
    doc.text('Forma: ' + data.meta.forma + ' | Encuestados: ' + s.total, margin, y);
    y += 5;
    doc.text('Generado: ' + new Date().toLocaleDateString('es-CO'), margin, y);
    y += 8;
    addLine();

    if (sections.resumen) {
        doc.setFontSize(14);
        doc.text('Resumen Ejecutivo', margin, y); y += 8;
        doc.setFontSize(11);

        const pct = (dist) => {
            if (!dist) return 0;
            return Math.round((((dist["Riesgo alto"]||0)+(dist["Riesgo muy alto"]||0))/s.total)*100);
        };
        const intraP = pct(s.intraGeneral);
        const extraP = pct(s.extraGeneral);
        const stressP = pct(s.stress);

        doc.setFont(undefined, 'bold');
        doc.text('Intralaboral: ' + intraP + '% cr\u00edtico', margin, y); y += 5;
        doc.text('Extralaboral: ' + extraP + '% cr\u00edtico', margin, y); y += 5;
        doc.text('Estr\u00e9s: ' + stressP + '% cr\u00edtico', margin, y); y += 5;
        doc.setFont(undefined, 'normal');

        // Risk distribution table for summary
        y += 2;
        addLine();
    }

    if (sections.intra && charts.intra) {
        doc.setFontSize(14);
        doc.text('Intralaboral', margin, y); y += 8;
        addImg(charts.intra, 55);
        addLine();
    }

    if (sections.extra && charts.extra) {
        doc.setFontSize(14);
        doc.text('Extralaboral', margin, y); y += 8;
        addImg(charts.extra, 55);
        addLine();
    }

    if (sections.stress && charts.stress) {
        doc.setFontSize(14);
        doc.text('Estr\u00e9s', margin, y); y += 8;
        addImg(charts.stress, 55);
        addLine();
    }

    if (sections.dimTable) {
        doc.setFontSize(14);
        doc.text('Dimensiones', margin, y); y += 8;
        doc.setFontSize(8);

        const dims = s.dimensions.filter(d => d.risk && Object.keys(d.risk).length > 0);
        for (let i = 0; i < dims.length; i += 20) {
            if (i > 0) { doc.addPage(); y = margin; }
            const chunk = dims.slice(i, i + 20);
            const colW = [70, 24, 24, 24, 24, 24];
            const headers = ['Dimensi\u00f3n', 'SR', 'RB', 'RM', 'RA', 'RMA'];

            // header
            doc.setFont(undefined, 'bold');
            let x = margin;
            headers.forEach((h, j) => {
                doc.text(h, x + 1, y);
                x += colW[j];
            });
            y += 3;
            doc.line(margin, y, margin + colW.reduce((a,b)=>a+b,0), y);
            y += 2;
            doc.setFont(undefined, 'normal');

            for (const d of chunk) {
                if (y > 275) { doc.addPage(); y = margin; }
                const name = d.name.length > 45 ? d.name.slice(0, 42) + '...' : d.name;
                let x = margin;
                doc.text(name, x + 1, y);
                x += colW[0];
                for (const r of ['Sin riesgo','Riesgo bajo','Riesgo medio','Riesgo alto','Riesgo muy alto']) {
                    const v = d.risk[r] || 0;
                    doc.text(String(v), x + 4, y);
                    x += colW[1];
                }
                y += 4;
            }
        }
    }

    const fn = 'Reporte_' + baseName + '.pdf';
    doc.save(fn);
}

// ── WORD ──
async function _generarWord(data, s, charts, baseName, sections) {
    const {
        Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
        ImageRun, AlignmentType, WidthType, BorderStyle, HeadingLevel
    } = window.docx;

    const children = [];
    const push = (el) => children.push(el);
    const heading = (txt, lvl) => push(new Paragraph({ heading: lvl || HeadingLevel.HEADING_1, children: [new TextRun({ text: txt, bold: true })] }));
    const para = (txt, opts) => push(new Paragraph({ children: [new TextRun({ text: txt, ...opts })] }));

    // Title
    push(new Paragraph({ spacing: { after: 200 }, alignment: AlignmentType.CENTER, children: [
        new TextRun({ text: 'Bater\u00eda Psicosocial - Reporte', bold: true, size: 28 })
    ]}));
    para('Archivo: ' + data.meta.fileName, { size: 22 });
    para('Forma: ' + data.meta.forma + ' | Encuestados: ' + s.total, { size: 22 });
    para('Generado: ' + new Date().toLocaleDateString('es-CO'), { size: 22 });

    // Summary
    if (sections.resumen) {
        heading('Resumen Ejecutivo', HeadingLevel.HEADING_1);
        const pct = (dist) => {
            if (!dist) return 0;
            return Math.round((((dist["Riesgo alto"]||0)+(dist["Riesgo muy alto"]||0))/s.total)*100);
        };
        para('Intralaboral: ' + pct(s.intraGeneral) + '% cr\u00edtico');
        para('Extralaboral: ' + pct(s.extraGeneral) + '% cr\u00edtico');
        para('Estr\u00e9s: ' + pct(s.stress) + '% cr\u00edtico');
    }

    // Sections with chart images
    const addChartSection = async (title, chartKey) => {
        if (!charts[chartKey]) return;
        heading(title, HeadingLevel.HEADING_1);
        const imgBuf = _dataUrlToBytes(charts[chartKey]);
        push(new Paragraph({ children: [
            new ImageRun({ data: imgBuf, transformation: { width: 500, height: 150 } })
        ]}));
    };

    if (sections.intra) await addChartSection('Intralaboral', 'intra');
    if (sections.extra) await addChartSection('Extralaboral', 'extra');
    if (sections.stress) await addChartSection('Estr\u00e9s', 'stress');

    // Dimensions table
    if (sections.dimTable) {
        heading('Dimensiones', HeadingLevel.HEADING_1);
        const dims = s.dimensions.filter(d => d.risk && Object.keys(d.risk).length > 0);
        if (dims.length > 0) {
            const riskLevels = ['Sin riesgo','Riesgo bajo','Riesgo medio','Riesgo alto','Riesgo muy alto'];
            const headerRow = new TableRow({
                tableHeader: true,
                children: ['Dimensi\u00f3n', ...riskLevels].map(h =>
                    new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: h, bold: true, size: 18 })] })] })
                )
            });
            const rows = dims.slice(0, 50).map(d =>
                new TableRow({
                    children: [d.name.slice(0, 50), ...riskLevels.map(r => String(d.risk[r] || 0))].map(c =>
                        new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: c, size: 16 })] })] })
                    )
                })
            );
            push(new Table({ rows: [headerRow, ...rows] }));
        }
    }

    const doc = new Document({ sections: [{ children }] });
    const blob = await Packer.toBlob(doc);
    _downloadBlob(blob, 'Reporte_' + baseName + '.docx');
}

// ── PPT ──
function _pctCriticoDist(dist, total) {
    if (!dist || !total) return 0;
    return Math.round((((dist["Riesgo alto"]||0)+(dist["Riesgo muy alto"]||0))/total)*100);
}

function _getAreasFromRows(rows) {
    const areas = new Set();
    rows.forEach(r => { const a = (r["Unidad de Análisis"] || '').trim(); if (a) areas.add(a); });
    return Array.from(areas).sort();
}

function _loadImageAsBase64(url) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
            const c = document.createElement('canvas');
            c.width = img.width; c.height = img.height;
            c.getContext('2d').drawImage(img, 0, 0);
            resolve(c.toDataURL('image/png'));
        };
        img.onerror = reject;
        img.src = url;
    });
}

async function _generarPPT(data, s, charts, baseName, sections) {
    const pptx = new PptxGenJS();
    pptx.defineLayout({ name: 'WIDE', width: 13.33, height: 7.5 });
    pptx.layout = 'WIDE';

    let logoData = null;
    try {
        logoData = await _loadImageAsBase64('https://lh3.googleusercontent.com/d/1UCkhtVxKgwT_KcjHFZPpxH05QqKiufeP=w400');
    } catch(e) { console.warn('Logo could not be loaded', e); }

    // ── Keralty Color Palette ──
    const C = {
        lime: 'A5CF47', cian: '00B5E2', blue: '004C97',
        electric: '0066FF', turquoise: '00C897',
        white: 'FFFFFF', offWhite: 'F1F5F9', gray: '64748B', grayLight: 'CBD5E1', dark: '1E293B',
        riskRed: 'EF4444', riskOrange: 'F97316', riskYellow: 'EAB308', riskGreen: '22C55E'
    };

    // ── Clean Background ──
    const addBg = (slide) => {
        slide.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 13.33, h: 7.5, fill: { color: C.offWhite } });
        slide.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 13.33, h: 0.06, fill: { color: C.blue } });
    };

    // ── Logo helper ──
    const addLogoSml = (slide) => {
        if (logoData) slide.addImage({ data: logoData, x: 12.3, y: 0.2, w: 0.7, h: 0.85, transparency: 40 });
    };

    // ── Slide Number ──
    const addNum = (slide, num, total) => {
        slide.addShape(pptx.ShapeType.roundRect, { x: 12.1, y: 6.85, w: 0.95, h: 0.4, fill: { color: C.blue }, rectRadius: 0.1 });
        slide.addText(num + '/' + total, { x: 12.1, y: 6.85, w: 0.95, h: 0.4, fontSize: 10, color: C.white, bold: true, align: 'center', valign: 'middle', fontFace: 'Montserrat' });
    };

    // ── Title Band (solid dark blue) ──
    const addTitleBand = (slide, title, sub) => {
        addLogoSml(slide);
        slide.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 13.33, h: sub ? 0.95 : 0.7, fill: { color: C.blue } });
        slide.addText(title, { x: 0.5, y: 0.05, w: 11, h: 0.5, fontSize: 22, bold: true, color: C.white, fontFace: 'Montserrat', align: 'left' });
        if (sub) {
            slide.addText(sub, { x: 0.5, y: 0.55, w: 11, h: 0.3, fontSize: 11, color: C.lime, fontFace: 'Open Sans', align: 'left' });
        }
    };

    // ── Card (white with border & shadow) ──
    const addCard = (slide, x, y, w, h) => {
        slide.addShape(pptx.ShapeType.roundRect, {
            x, y, w, h,
            fill: { color: C.white },
            line: { color: C.grayLight, width: 0.5 },
            shadow: { type: 'outer', blur: 4, offset: 2, color: '000000', opacity: 0.08 },
            rectRadius: 0.2
        });
    };

    // ── Pill Bar ──
    const addPillBar = (slide, x, y, w, pct, color) => {
        slide.addShape(pptx.ShapeType.roundRect, { x, y, w, h: 0.28, fill: { color: C.grayLight }, rectRadius: 0.14 });
        if (pct > 0) {
            slide.addShape(pptx.ShapeType.roundRect, { x, y, w: w * Math.min(pct / 100, 1), h: 0.28, fill: { color }, rectRadius: 0.14 });
        }
    };

    // ── Stacked Bar ──
    const addStackedBar = (slide, x, y, w, h, dist) => {
        if (!dist) return;
        const keys = orderRiskKeys(dist);

                slide.addText(name, { x: 0.5, y: by, w: 3, h: 0.3, fontSize: 8, color: C.dark, valign: 'middle', fontFace: 'Open Sans' });
                addPillBar(slide, 3.8, by + 0.04, 5.5, critPct, barColor);
                slide.addText(critPct + '%', { x: 9.5, y: by, w: 1, h: 0.3, fontSize: 9, bold: true, color: barColor, valign: 'middle', fontFace: 'Montserrat' });
            });
        }
        addNum(slide, 7, totalSlidesNum);
    }

    // ═══ SLIDE 8: ESTR\u00c9S ═══
    {
        const slide = pptx.addSlide();
        addBg(slide);
        addTitleBand(slide, 'Estr\u00e9s', 'Categor\u00edas de s\u00edntomas y distribuci\u00f3n por pregunta');

        const stressDims = s.dimensions.filter(d => d.name.startsWith('[Stress]') && d.risk);
        const stressQuestions = s.stressQuestions || [];
        const stressDist = s.stress || {};

        let yPos = 1.2;

        if (stressDims.length > 0) {
            slide.addText('Categor\u00edas de Estr\u00e9s', { x: 0.5, y: yPos, w: 5, h: 0.3, fontSize: 11, bold: true, color: C.riskRed, fontFace: 'Montserrat' });
            yPos += 0.35;
            stressDims.forEach((d, i) => {
                const name = d.name.replace('[Stress] ', '');
                const total = Object.values(d.risk).reduce((a, b) => a + b, 0);
                const critPct = total ? Math.round(((d.risk["Riesgo alto"]||0)+(d.risk["Riesgo muy alto"]||0))/total*100) : 0;
                const by = yPos + i * 0.3;
                slide.addText(name, { x: 0.5, y: by, w: 1.8, h: 0.25, fontSize: 8, color: C.dark, valign: 'middle', fontFace: 'Open Sans' });
                addStackedBar(slide, 2.5, by + 0.02, 5.2, 0.2, d.risk);
                slide.addText(critPct + '%', { x: 7.9, y: by, w: 0.6, h: 0.25, fontSize: 8, bold: true, color: critPct > 50 ? C.riskRed : C.riskOrange, valign: 'middle', fontFace: 'Montserrat' });
            });
            yPos += stressDims.length * 0.3 + 0.25;
        }

        if (stressQuestions.length > 0) {
            slide.addText('Distribuci\u00f3n por Pregunta de Estr\u00e9s (top ' + Math.min(15, stressQuestions.length) + ')', { x: 0.5, y: yPos, w: 12, h: 0.3, fontSize: 11, bold: true, color: C.riskRed, fontFace: 'Montserrat' });
            yPos += 0.35;

            const sortedQs = [...stressQuestions].map(q => {
                const total = Object.values(q.risk).reduce((a, b) => a + b, 0);
                const critPct = total ? Math.round(((q.risk["Riesgo alto"]||0)+(q.risk["Riesgo muy alto"]||0))/total*100) : 0;
                return { name: q.name, risk: q.risk, _crit: critPct, _total: total };
            }).sort((a, b) => b._crit - a._crit).slice(0, 15);

            sortedQs.forEach((q, i) => {
                const by = yPos + i * 0.32;
                slide.addText(q.name, { x: 0.5, y: by, w: 1.8, h: 0.28, fontSize: 6.5, color: C.dark, valign: 'middle', fontFace: 'Open Sans' });
                addStackedBar(slide, 2.4, by + 0.02, 6.5, 0.22, q.risk);
                const critColor = q._crit > 50 ? C.riskRed : q._crit > 30 ? C.riskOrange : C.lime;
                slide.addText(q._crit + '%', { x: 9.1, y: by, w: 0.6, h: 0.28, fontSize: 7, bold: true, color: critColor, valign: 'middle', fontFace: 'Montserrat' });
                const keys = orderRiskKeys(q.risk);
                const detail = keys.filter(k => (q.risk[k] || 0) > 0).map(k => { var rv = q.risk[k]; var rp = q._total ? Math.round(rv / q._total * 100) : 0; return rv + ' (' + rp + '%)'; }).join(' ');
                slide.addText(detail, { x: 9.8, y: by, w: 3.2, h: 0.28, fontSize: 6, color: C.gray, valign: 'middle', fontFace: 'Open Sans' });
            });
        }

        addNum(slide, 8, totalSlidesNum);
    }

    // ═══ SLIDE 9: PLANES ESTRAT\u00c9GICOS ═══
    {
        const slide = pptx.addSlide();
        addBg(slide);
        addTitleBand(slide, 'Planes Estrat\u00e9gicos Recomendados');
        const planItems = [
            { t: 'Objetivo Estrat\u00e9gico', c: C.blue },
            { t: 'Acciones Clave', c: C.cian },
            { t: 'Responsable', c: C.riskOrange },
            { t: 'Plazo', c: C.electric },
            { t: 'Indicador de Seguimiento (KPI)', c: C.turquoise }
        ];
        planItems.forEach((item, i) => {
            const yB = 1.2 + i * 1.15;
            addCard(slide, 0.4, yB, 12.53, 0.95);
            slide.addText(item.t, { x: 0.7, y: yB + 0.1, w: 3, h: 0.3, fontSize: 12, bold: true, color: item.c, fontFace: 'Montserrat' });
            slide.addText('', { x: 4, y: yB + 0.1, w: 8.5, h: 0.3, fontSize: 10, italic: true, color: C.gray, fontFace: 'Open Sans' });
        });
        addNum(slide, 9, totalSlidesNum);
    }

    // ═══ SLIDE 10: AN\u00c1LISIS POR \u00c1REAS ═══
    if (areas.length > 0) {
        for (let ai = 0; ai < areas.length; ai += 2) {
            const slide = pptx.addSlide();
            addBg(slide);
            addTitleBand(slide, 'An\u00e1lisis por \u00c1reas', '\u00c1rea ' + (ai + 1) + ' a ' + Math.min(ai + 2, areas.length) + ' de ' + areas.length);

            for (let j = 0; j < 2 && ai + j < areas.length; j++) {
                const areaName = areas[ai + j];
                const areaRows = data.rows.filter(r => (r["Unidad de An\u00e1lisis"] || '').trim() === areaName);
                const areaSummary = computeSummary(areaRows);
                if (!areaSummary) continue;

                const xOff = j * 6.5;
                addCard(slide, 0.2 + xOff, 1.25, 6.3, 5.8);

                slide.addText(areaName, { x: 0.4 + xOff, y: 1.35, w: 5.9, h: 0.35, fontSize: 13, bold: true, color: C.blue, align: 'center', fontFace: 'Montserrat' });
                slide.addText(areaSummary.total + ' encuestados' + (areaSummary.total === 1 ? ' (1 persona)' : ''), { x: 0.4 + xOff, y: 1.7, w: 5.9, h: 0.25, fontSize: 9, color: C.gray, align: 'center', fontFace: 'Open Sans' });

                const riskItems = [
                    { l: 'Intralaboral', p: _pctCriticoDist(areaSummary.intraGeneral, areaSummary.total), c: C.riskOrange, dist: areaSummary.intraGeneral },
                    { l: 'Extralaboral', p: _pctCriticoDist(areaSummary.extraGeneral, areaSummary.total), c: C.cian, dist: areaSummary.extraGeneral },
                    { l: 'Estr\u00e9s', p: _pctCriticoDist(areaSummary.stress, areaSummary.total), c: C.riskRed, dist: areaSummary.stress }
                ];

                riskItems.forEach((ri, riIdx) => {
                    const ry = 2.15 + riIdx * 0.5;
                    slide.addText(ri.l, { x: 0.4 + xOff, y: ry, w: 1.5, h: 0.3, fontSize: 9, color: C.dark, valign: 'middle', fontFace: 'Open Sans' });
                    addRiskBar(slide, 2 + xOff, ry + 0.04, 2.5, ri.p, ri.c);
                    slide.addText(ri.p + '%', { x: 4.6 + xOff, y: ry, w: 0.5, h: 0.3, fontSize: 10, bold: true, color: ri.c, valign: 'middle', fontFace: 'Montserrat' });
                    if (areaSummary.total <= 3 && ri.dist) {
                        const keys = orderRiskKeys(ri.dist);
                        const tot = keys.reduce((a, k) => a + (ri.dist[k] || 0), 0);
                        const detail = keys.filter(k => (ri.dist[k] || 0) > 0).map(k => ri.dist[k] + ' ' + k).join(', ');
                        if (detail) slide.addText(detail, { x: 5.2 + xOff, y: ry, w: 1, h: 0.3, fontSize: 7, color: C.gray, valign: 'middle', fontFace: 'Open Sans' });
                    }
                });

                const topCriticas = areaSummary.topCriticas.slice(0, 3);
                if (topCriticas.length > 0) {
                    slide.addText('Factores m\u00e1s cr\u00edticos:', { x: 0.4 + xOff, y: 3.7, w: 5.9, h: 0.3, fontSize: 9, bold: true, color: C.dark, fontFace: 'Montserrat' });
                    topCriticas.forEach((tc, tcIdx) => {
                        const ty = 4.05 + tcIdx * 0.55;
                        slide.addShape(pptx.ShapeType.roundRect, { x: 0.4 + xOff, y: ty, w: 5.9, h: 0.48, fill: { color: C.offWhite }, line: { color: C.grayLight, width: 0.3 }, rectRadius: 0.08 });
                        const dn = tc.name.replace('[Global] ', '').replace('[Extra] ', '').replace('[Stress] ', '');
                        slide.addText((tcIdx + 1) + '. ' + dn, { x: 0.5 + xOff, y: ty + 0.02, w: 5.6, h: 0.25, fontSize: 8, bold: true, color: C.dark, fontFace: 'Open Sans' });
                        slide.addText(tc.pctAlto + '% cr\u00edtico', { x: 0.5 + xOff, y: ty + 0.26, w: 5.6, h: 0.2, fontSize: 8, color: tc.pctAlto > 50 ? C.riskRed : tc.pctAlto > 30 ? C.riskOrange : C.gray, fontFace: 'Open Sans' });
                    });
                }
            }
            addNum(slide, 10, totalSlidesNum);
        }
    }

    // ═══ SLIDE 11: CONCLUSIONES ═══
    {
        const slide = pptx.addSlide();
        addBg(slide);
        addTitleBand(slide, 'Conclusiones y Recomendaciones');
        addCard(slide, 0.4, 1.2, 12.53, 1.6);
        slide.addText('Conclusiones', { x: 0.7, y: 1.35, w: 12, h: 0.35, fontSize: 14, bold: true, color: C.blue, fontFace: 'Montserrat' });
        slide.addText('', { x: 0.7, y: 1.8, w: 12, h: 0.8, fontSize: 11, italic: true, color: C.gray, fontFace: 'Open Sans' });
        addCard(slide, 0.4, 3.1, 12.53, 1.6);
        slide.addText('Recomendaciones', { x: 0.7, y: 3.25, w: 12, h: 0.35, fontSize: 14, bold: true, color: C.riskOrange, fontFace: 'Montserrat' });
        slide.addText('', { x: 0.7, y: 3.7, w: 12, h: 0.8, fontSize: 11, italic: true, color: C.gray, fontFace: 'Open Sans' });
        addCard(slide, 0.4, 5.0, 12.53, 1.6);
        slide.addText('Plan de Intervenci\u00f3n', { x: 0.7, y: 5.15, w: 12, h: 0.35, fontSize: 14, bold: true, color: C.cian, fontFace: 'Montserrat' });
        slide.addText('', { x: 0.7, y: 5.6, w: 12, h: 0.8, fontSize: 11, italic: true, color: C.gray, fontFace: 'Open Sans' });
        addNum(slide, 11, totalSlidesNum);
    }

    pptx.writeFile({ fileName: 'Reporte_' + baseName + '.pptx' });
}

// ============================================================
// INIT - drag & drop support
document.querySelectorAll('.upload-area').forEach(zone => {
    const input = zone.querySelector('input[type="file"]');
    if (!input) return;

    input.addEventListener('click', e => e.stopPropagation());
    zone.addEventListener('click', () => input.click());

    zone.addEventListener('dragover', e => {
        e.preventDefault();
        zone.classList.add('drag-over');
    });
    zone.addEventListener('dragleave', e => {
        zone.classList.remove('drag-over');
    });
    zone.addEventListener('drop', function(e) {
        e.preventDefault();
        zone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (!file) return;
        const dt = new DataTransfer();
        dt.items.add(file);
        input.files = dt.files;
        input.dispatchEvent(new Event('change'));
    });
});
</script>
