<script>
function exportarDatosJSON() {
    const tab = document.querySelector('.tab-content.active');
    if (!tab) return;

    const id = tab.id;
    var data;

    if (id === 'tab-dashboard') {
        if (!state.bateriaActiva) return;
        data = buildDashboardExport(state.bateriaActiva);
    } else if (id === 'tab-comparativa') {
        const sel = getSelectedBaterias();
        if (sel.length < 1) return;
        data = buildComparativaExport(sel);
    } else {
        return;
    }

    const baseName = id === 'tab-dashboard'
        ? state.bateriaActiva.meta.fileName.replace(/\.(xlsx?|xlsb)$/i, '')
        : 'Comparativa_Baterias';
    downloadJSON(data, baseName);
}

function downloadJSON(data, baseName) {
    const btn = document.getElementById('btnExport');
    const origHtml = btn.innerHTML;
    btn.classList.add('loading');
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Exportando...';

    setTimeout(function () {
        const text = _buildPPTText(data);
        const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.download = baseName + '.txt';
        link.href = url;
        link.click();
        URL.revokeObjectURL(url);
        btn.classList.remove('loading');
        btn.innerHTML = origHtml;
    }, 100);
}

function exportarJSON() {
    const tab = document.querySelector('.tab-content.active');
    if (!tab) return;

    const id = tab.id;
    var data;

    if (id === 'tab-dashboard') {
        if (!state.bateriaActiva) return;
        data = buildDashboardExport(state.bateriaActiva);
    } else if (id === 'tab-comparativa') {
        const sel = getSelectedBaterias();
        if (sel.length < 1) return;
        data = buildComparativaExport(sel);
    } else {
        return;
    }

    const baseName = id === 'tab-dashboard'
        ? state.bateriaActiva.meta.fileName.replace(/\.(xlsx?|xlsb)$/i, '')
        : 'Comparativa_Baterias';
    downloadJSONFile(data, baseName);
}

function downloadJSONFile(data, baseName) {
    const btn = document.getElementById('btnExportJSON');
    const origHtml = btn.innerHTML;
    btn.classList.add('loading');
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Exportando...';

    setTimeout(function () {
        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.download = baseName + '.json';
        link.href = url;
        link.click();
        URL.revokeObjectURL(url);
        btn.classList.remove('loading');
        btn.innerHTML = origHtml;
    }, 100);
}

function getActiveFilters() {
    const filters = {};
    var s = document.getElementById('dfSexo');
    if (s && s.value) filters.sexo = s.value;
    s = document.getElementById('dfTipoCargo');
    if (s && s.value) filters.tipoCargo = s.value;
    s = document.getElementById('dfAreaTrabajo');
    if (s && s.value) filters.areaTrabajo = s.value;
    s = document.getElementById('dfTipoContrato');
    if (s && s.value) filters.tipoContrato = s.value;
    s = document.getElementById('dfEstrato');
    if (s && s.value) filters.estrato = s.value;
    s = document.getElementById('dfAntiguedadCargo');
    if (s && s.value) filters.antiguedadCargo = s.value;
    return filters;
}

function riskHighCount(dist) {
    return (dist['Riesgo alto'] || 0) + (dist['Riesgo muy alto'] || 0);
}

function pctRiskByDimension(rows, summary) {
    return summary.dimensions.map(function (d) {
        var pct = summary.total > 0 ? Math.round((riskHighCount(d.risk) / summary.total) * 1000) / 10 : 0;
        return { name: d.name, pctCritico: pct, avgT: d.avgT };
    }).sort(function (a, b) { return b.pctCritico - a.pctCritico; });
}

function buildDashboardExport(battery) {
    var sum = battery.summary;
    var rows = battery.rows;
    var total = sum.total;

    var sexGroups = {};
    rows.forEach(function (r) {
        var sex = String(r['2. Sexo'] || 'Sin dato').trim();
        if (!sexGroups[sex]) sexGroups[sex] = [];
        sexGroups[sex].push(r);
    });
    var bySex = [];
    Object.keys(sexGroups).forEach(function (sex) {
        var grp = sexGroups[sex];
        var s = computeSummary(grp);
        bySex.push({
            grupo: sex,
            total: grp.length,
            intraCritico: pctCriticoDist(s.intraGeneral, grp.length),
            extraCritico: pctCriticoDist(s.extraGeneral, grp.length),
            stressCritico: getStressPct({ summary: s })
        });
    });

    var areaGroups = {};
    var areaNameMap = {};
    var normArea = function (a) { return a.replace(/^[\d\s]+[\.\s]*/g, '').replace(/\s+/g, ' ').trim().toLowerCase(); };
    rows.forEach(function (r) {
        var orig = String(r['16. \u00c1rea donde trabaja'] || 'Sin dato').trim();
        var key = normArea(orig);
        if (!areaGroups[key]) { areaGroups[key] = []; areaNameMap[key] = orig; }
        areaGroups[key].push(r);
    });
    var byArea = [];
    Object.keys(areaGroups)
        .filter(function (a) { return areaGroups[a].length >= 5; })
        .forEach(function (areaKey) {
            var grp = areaGroups[areaKey];
            var s = computeSummary(grp);
            var topDims = pctRiskByDimension(grp, s).slice(0, 3).map(function (d) { return d.name; });
            byArea.push({
                area: areaNameMap[areaKey] || areaKey,
                total: grp.length,
                intraCritico: pctCriticoDist(s.intraGeneral, grp.length),
                extraCritico: pctCriticoDist(s.extraGeneral, grp.length),
                stressCritico: getStressPct({ summary: s }),
                topDimensionesCriticas: topDims
            });
        });

    var contractGroups = {};
    rows.forEach(function (r) {
        var c = String(r['17. Tipo de contrato'] || 'Sin dato').trim();
        if (!contractGroups[c]) contractGroups[c] = [];
        contractGroups[c].push(r);
    });
    var byContrato = [];
    Object.keys(contractGroups).forEach(function (c) {
        var grp = contractGroups[c];
        var s = computeSummary(grp);
        byContrato.push({
            contrato: c,
            total: grp.length,
            intraCritico: pctCriticoDist(s.intraGeneral, grp.length),
            extraCritico: pctCriticoDist(s.extraGeneral, grp.length),
            stressCritico: getStressPct({ summary: s })
        });
    });

    var cargoGroups = {};
    rows.forEach(function (r) {
        var c = String(r['14. Tipo de cargo'] || 'Sin dato').trim();
        if (!cargoGroups[c]) cargoGroups[c] = [];
        cargoGroups[c].push(r);
    });
    var byCargo = [];
    Object.keys(cargoGroups).forEach(function (c) {
        var grp = cargoGroups[c];
        var s = computeSummary(grp);
        byCargo.push({
            cargo: c,
            total: grp.length,
            intraCritico: pctCriticoDist(s.intraGeneral, grp.length),
            extraCritico: pctCriticoDist(s.extraGeneral, grp.length),
            stressCritico: getStressPct({ summary: s })
        });
    });

    var dimToDomain = {};
    Object.keys(DOMAIN_DIMS).forEach(function (domain) {
        DOMAIN_DIMS[domain].forEach(function (dim) {
            dimToDomain[dim.toLowerCase()] = domain;
        });
    });
    var dimensionBreakdown = [];
    (sum.dimensions || []).forEach(function (d) {
        var pct = total > 0 ? Math.round((riskHighCount(d.risk) / total) * 1000) / 10 : 0;
        var nivel = d.avgT >= 70 ? 'Muy Alto' : d.avgT >= 55 ? 'Alto' : d.avgT >= 30 ? 'Medio' : 'Bajo';
        dimensionBreakdown.push({
            dimension: d.name,
            dominio: dimToDomain[d.name.toLowerCase()] || 'Intralaboral',
            pctCritico: pct,
            avgT: d.avgT,
            nivel: nivel
        });
    });

    var stressBreakdown = [];
    (sum.stressQuestions || []).forEach(function (q) {
        var pct = total > 0 ? Math.round((riskHighCount(q.risk) / total) * 1000) / 10 : 0;
        stressBreakdown.push({ pregunta: q.name, pctCritico: pct });
    });

    return {
        version: '1.0',
        type: 'dashboard',
        exportDate: new Date().toISOString(),
        battery: {
            fileName: battery.meta.fileName,
            forma: battery.meta.forma,
            totalRows: battery.meta.totalRows
        },
        filters: getActiveFilters(),
        summary: {
            total: sum.total,
            intraGeneral: sum.intraGeneral,
            extraGeneral: sum.extraGeneral,
            stress: sum.stress,
            demographics: sum.demographics,
            topCriticas: (sum.topCriticas || []).slice(0, 10)
        },
        bySex: bySex,
        byArea: byArea,
        byCargo: byCargo,
        byContrato: byContrato,
        dimensionBreakdown: dimensionBreakdown,
        stressBreakdown: stressBreakdown
    };
}

function buildComparativaExport(selected) {
    var baterias = selected.map(function (b) {
        return {
            meta: b.meta,
            summary: b.summary,
            rows: b.rows
        };
    });

    var sorted = [].concat(selected).sort(function (a, b) {
        return (parseInt(a.meta.year) || 0) - (parseInt(b.meta.year) || 0);
    });

    var allDimNames = [];
    if (selected.length > 0) {
        allDimNames = selected[0].summary.dimensions.map(function (d) { return d.name; });
    }

    var sideBySide = allDimNames.map(function (dimName) {
        var entry = { dimension: dimName };
        baterias.forEach(function (b, i) {
            var dim = b.summary.dimensions.find(function (d) { return d.name === dimName; });
            entry['bateria_' + i] = dim
                ? {
                    avgT: dim.avgT,
                    pctCritico: b.summary.total > 0 ? Math.round((riskHighCount(dim.risk) / b.summary.total) * 1000) / 10 : 0,
                    risk: dim.risk
                }
                : null;
        });
        return entry;
    });

    var deltas = [];
    for (var i = 1; i < sorted.length; i++) {
        var a = sorted[i - 1], b = sorted[i];
        var d = {
            from: a.meta.year || a.meta.fileName,
            to: b.meta.year || b.meta.fileName,
            intraDelta: pctCriticoDist(b.summary.intraGeneral, b.summary.total) - pctCriticoDist(a.summary.intraGeneral, a.summary.total),
            extraDelta: pctCriticoDist(b.summary.extraGeneral, b.summary.total) - pctCriticoDist(a.summary.extraGeneral, a.summary.total),
            stressDelta: getStressPct({ summary: b.summary }) - getStressPct({ summary: a.summary })
        };
        deltas.push(d);
    }

    var trends = {};
    ['intraGeneral', 'extraGeneral', 'stress'].forEach(function (key) {
        var vals = sorted.map(function (b) {
            return key === 'stress'
                ? getStressPct({ summary: b.summary })
                : pctCriticoDist(b.summary[key], b.summary.total);
        });
        var last = vals[vals.length - 1];
        var first = vals[0];
        var dir = last > first ? 'empeor\u00f3' : last < first ? 'mejor\u00f3' : 'estable';
        var change = last - first;
        trends[key] = { valores: vals, cambio: Math.round(change * 10) / 10, direccion: dir };
    });

    return {
        version: '1.0',
        type: 'comparativa',
        exportDate: new Date().toISOString(),
        totalBaterias: baterias.length,
        comparativa: {
            overview: trends,
            sideBySideDimensiones: sideBySide,
            deltas: deltas
        },
        baterias: baterias
    };
}

function toggleSort() {
    state._sortDir = state._sortDir === 'desc' ? 'asc' : 'desc';
    aplicarFiltrosModal();
}

function rebuildDimensionOptions(type) {
    const dimSel = document.getElementById('mfDimension');
    if (!dimSel) return;
    const domain = document.getElementById('mfDominio')?.value || '';
    const currentVal = dimSel.value;
    dimSel.innerHTML = '<option value="">Dimensi\u00f3n: Todas</option>';
    let availDims = [];
    if (type === 'intra') {
        availDims = (state._drillSummary.dimensions || [])
            .filter(d => !d.name.startsWith('[Extra]') && !d.name.startsWith('[Global]') && !d.name.startsWith('[Stress]'));
        if (domain) {
            const domainDims = DOMAIN_DIMS[domain] || [];
            availDims = availDims.filter(d => domainDims.includes(d.name));
        }
        availDims = availDims.map(d => d.name);
    } else {
        availDims = (state._drillSummary.dimensions || [])
            .filter(d => d.name.startsWith('[Extra]'))
            .map(d => d.name.replace('[Extra] ', ''));
    }
    availDims.sort().forEach(d => {
        const opt = document.createElement('option');
        opt.value = d; opt.textContent = d;
        dimSel.appendChild(opt);
    });
    if (currentVal) {
        // restore if still valid
        if (Array.from(dimSel.options).some(o => o.value === currentVal)) {
            dimSel.value = currentVal;
        }
    }
}
