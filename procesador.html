function applyMap(row, colName, dictionary) {
    let originalVal = row[colName];
    if (originalVal === null || originalVal === undefined || originalVal === "") return;
    let strVal = String(originalVal).trim();
    let formatVal = strVal.charAt(0).toUpperCase() + strVal.slice(1).toLowerCase();
    if (dictionary.hasOwnProperty(formatVal)) {
        row[colName] = dictionary[formatVal];
    } else if (formatVal === "Anulado" || formatVal === "Anulada") {
        row[colName] = "Anulada";
    }
}

function clasificarRiesgo(val, rangos) {
    if (val === "" || isNaN(val) || val === null) return "ERROR";
    let v = Math.round(parseFloat(val) * 1000000) / 1000000;
    for (let r of rangos) {
        if (r[0] === 0) {
            if (v >= r[0] && v <= r[1]) return r[2];
        } else {
            if (v > r[0] && v <= r[1]) return r[2];
        }
    }
    return "ERROR";
}

function sumCols(row, prefix, cols) {
    let sum = 0;
    for (let c of cols) {
        let val = row[`${prefix} ${c}`];
        let num = parseFloat(val);
        if (!isNaN(num)) sum += num;
    }
    return sum;
}

function sumDirectCols(row, cols) {
    let sum = 0;
    for (let c of cols) {
        let val = row[c];
        let num = parseFloat(val);
        if (!isNaN(num)) sum += num;
    }
    return sum;
}

function meanCols(row, prefix, cols) {
    let sum = 0;
    let count = 0;
    for (let c of cols) {
        let val = row[`${prefix} ${c}`];
        let num = parseFloat(val);
        if (!isNaN(num)) { sum += num; count++; }
    }
    return count > 0 ? (sum / count) : 0;
}

function crearRangos(arr, labels) {
    let res = [];
    for (let i = 0; i < arr.length - 1; i++) {
        res.push([arr[i], arr[i+1], labels[i]]);
    }
    return res;
}

function normalizeColumnName(name) {
    if (!name) return "";
    return String(name).normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
}

function findColumnValue(row, targetName) {
    const normTarget = normalizeColumnName(targetName);
    for (let key in row) {
        if (normalizeColumnName(key) === normTarget) return row[key];
    }
    return undefined;
}

function filterColumns(df, requestedCols) {
    let stringCols = Object.keys(df[0] || {}).filter(k => typeof df[0][k] === 'string' && !requestedCols.includes(k));
    let finalCols = [...requestedCols, ...stringCols];
    return df.map(row => {
        let newRow = {};
        finalCols.forEach(col => { if(row[col] !== undefined) newRow[col] = row[col]; });
        return newRow;
    });
}

function getColumnDistribution(rows, colName) {
    const dist = {};
    for (const row of rows) {
        const val = row[colName];
        if (val !== undefined && val !== null && val !== "") {
            dist[val] = (dist[val] || 0) + 1;
        }
    }
    return dist;
}

function getAverageTScore(rows, colName) {
    let sum = 0, count = 0;
    for (const row of rows) {
        const val = parseFloat(row[colName]);
        if (!isNaN(val)) { sum += val; count++; }
    }
    return count > 0 ? Math.round((sum / count) * 10) / 10 : 0;
}

function computeSummary(rows) {
    if (!rows || rows.length === 0) return null;
    const total = rows.length;
    const first = rows[0];

    const isFormB = first["INTRALABORAL(I)"] !== undefined;
    const isFormA = !isFormB && first["INTRALABORAL"] !== undefined && typeof first["INTRALABORAL"] === 'string';

    const getRiskDistribution = (col) => getColumnDistribution(rows, col);
    const getAvg = (col) => getAverageTScore(rows, col);

    const riskLevels = ["Sin riesgo", "Riesgo bajo", "Riesgo medio", "Riesgo alto", "Riesgo muy alto"];
    const stressLevels = ["Sin riesgo", "Riesgo medio", "Riesgo alto", "Riesgo muy alto"];

    const summary = { total, isFormA, isFormB };

    // Demographics
    summary.demographics = {
        sexo: getRiskDistribution("2. Sexo"),
        unidadAnalisis: getRiskDistribution("Unidad de Análisis"),
        tipoCargo: getRiskDistribution("14. Tipo de cargo"),
        tipoContrato: getRiskDistribution("17. Tipo de contrato"),
        areaTrabajo: getRiskDistribution("16. Área donde trabaja"),
        estrato: getRiskDistribution("8. Estrato")
    };

    // Intralaboral general
    if (isFormB) {
        summary.intraGeneral = getRiskDistribution("INTRALABORAL(I)");
    } else if (isFormA) {
        summary.intraGeneral = getRiskDistribution("INTRALABORAL (I)");
    }

    // Extralaboral general
    summary.extraGeneral = getRiskDistribution("PUNTAJE BRUTO TOTAL (I)");

    // Stress
    summary.stress = getRiskDistribution("Interpretación");

    // Dimensions
    summary.dimensions = [];

    if (isFormB) {
        const tCols = [
            "Caracteristicas Liderazgo (T)", "Relaciones Sociales (T)", "Retroal. Desempeño (T)",
            "Control y autonomia sobre el trabajo (T)", "Oportunidades para el desarrollo (T)",
            "Participación y manejo del cambIo (T)", "Claridad de rol (T)", "Capacitación (T)",
            "Demandas cuantitativas (T)", "demandas de carga mental (T)", "Demandas emocionales (T)",
            "Demandas ambientales y de esfuerzo fisico (T)", "Demandas de jornada laboral (T)",
            "Influencia sobre el entorno extra (T)", "Reconocimiento y compensación (T)",
            "Recompensas de pertenencia y trabajo (T)"
        ];
        for (const col of tCols) {
            const name = col.replace(" (T)", "");
            const riskCol = col.replace(" (T)", " (I)");
            summary.dimensions.push({
                name,
                avgT: getAvg(col),
                risk: getRiskDistribution(riskCol)
            });
        }
        const globalCols = [
            "LIDERAZGO Y RELACIONES SOCIALES (T)", "CONTROL SOBRE EL TRABAJO (T)",
            "DEMANDAS DEL TRABAJO (T)", "RECOMPENSAS (T)", "INTRALABORAL(T)"
        ];
        for (const col of globalCols) {
            const name = col.replace("(T)", "").trim();
            const riskCol = (col.endsWith("(T)") ? col.slice(0, -3) + "(I)" : col.replace("(T)", "(I)"));
            let rc = riskCol;
            if (col === "INTRALABORAL(T)") rc = "INTRALABORAL(I)";
            summary.dimensions.push({
                name: `[Global] ${name}`,
                avgT: getAvg(col),
                risk: getRiskDistribution(rc)
            });
        }
    } else if (isFormA) {
        const dims = [
            "Caracteristicas Liderazgo", "Relaciones Sociales", "Retroal. Desempeño", "Relación colaboradores",
            "Control y autonomia sobre el trabajo", "Oportunidades para el desarrollo",
            "Participación y manejo del cambIo", "Claridad de rol", "Capacitación",
            "Demandas cuantitativas", "demandas de carga mental", "Demandas emocionales",
            "Exigencias de responsabilidad", "Demandas ambientales y de esfuerzo fisico",
            "Demandas de jornada laboral", "Consistencia de rol", "Influencia sobre el entorno extra",
            "Reconocimiento y compensación", "Recompensas de pertenencia y trabajo"
        ];
        for (const name of dims) {
            const tCol = `${name} (T)`;
            summary.dimensions.push({
                name,
                avgT: getAvg(tCol),
                risk: getRiskDistribution(name + " (I)")
            });
        }
        const globalCols = [
            "LIDERAZGO Y RELACIONES SOCIALES", "CONTROL SOBRE EL TRABAJO",
            "DEMANDAS DEL TRABAJO", "RECOMPENSAS", "INTRALABORAL"
        ];
        for (const name of globalCols) {
            const tCol = `${name} (T)`;
            summary.dimensions.push({
                name: `[Global] ${name}`,
                avgT: getAvg(tCol),
                risk: getRiskDistribution(name + " (I)")
            });
        }
    }

    // Extra dimensions
    const extraDims = [
        "Tiempo fuera del trabajo (I)", "Relaciones familiares (I)", "Comunicación y relaciones (I)",
        "Situación económica familia (I)", "Características de la vivienda (I)",
        "influencia del entorno extralaboral (I)", "Desplazamiento casa-trabajo (I)"
    ];
    for (const rc of extraDims) {
        summary.dimensions.push({
            name: `[Extra] ${rc.replace(" (I)", "")}`,
            avgT: null,
            risk: getRiskDistribution(rc)
        });
    }

    // Stress categories
    const stressCatNames = [
        "Síntomas Fisiológicos",
        "Síntomas de Comportamiento Social",
        "Síntomas Intelectuales y Laborales",
        "Síntomas Psicoemocionales"
    ];
    for (const name of stressCatNames) {
        const col = `${name} (I)`;
        const dist = getRiskDistribution(col);
        if (Object.keys(dist).length > 0) {
            summary.dimensions.push({ name: `[Stress] ${name}`, avgT: null, risk: dist });
        }
    }

    // Stress per-question
    summary.stressQuestions = [];
    for (let i = 1; i <= 31; i++) {
        const col = `Estrés ${i} (I)`;
        const dist = getRiskDistribution(col);
        if (Object.keys(dist).length > 0) {
            summary.stressQuestions.push({ name: `Estrés ${i}`, risk: dist });
        }
    }

    // Top critical dimensions (highest % alto + muy alto)
    summary.topCriticas = summary.dimensions
        .filter(d => d.risk)
        .map(d => {
            const alto = (d.risk["Riesgo alto"] || 0) + (d.risk["Riesgo muy alto"] || 0);
            return { name: d.name, count: alto, pctAlto: Math.round((alto / total) * 100 * 10) / 10, avgT: d.avgT };
        })
        .sort((a, b) => b.pctAlto - a.pctAlto);

    return summary;
}

function procesarExcel(arrayBuffer, fileName) {
    const workbook = XLSX.read(arrayBuffer, { type: 'array' });
    let result = { meta: { fileName, forma: '', totalRows: 0 }, rows: [], summary: null };

    // Find sheet names case-insensitively
    const findSheet = (pattern) => {
        const lowerPattern = pattern.toLowerCase();
        return workbook.SheetNames.find(s => s.toLowerCase().includes(lowerPattern));
    };

    const sheetB = findSheet("FORMA B digitacion") || findSheet("FORMA B");
    const sheetA = findSheet("FORMA A Digitacion") || findSheet("FORMA A");

    if (sheetB) {
        const data = XLSX.utils.sheet_to_json(workbook.Sheets[sheetB], { defval: "" });
        result.rows = procesarFormaB(data);
        result.meta.forma = 'B';
    }
    
    if (sheetA) {
        const data = XLSX.utils.sheet_to_json(workbook.Sheets[sheetA], { defval: "" });
        const processedA = procesarFormaA(data);
        if (result.rows.length > 0) {
            result.rows = result.rows.concat(processedA);
            result.meta.forma = result.meta.forma === 'B' ? 'AB' : 'A';
        } else {
            result.rows = processedA;
            result.meta.forma = 'A';
        }
    }

    result.meta.totalRows = result.rows.length;
    result.summary = computeSummary(result.rows);
    return result;
}
